<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Saklıdoğa — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;--gddd:#04342C;
  --am:#BA7517;--aml:#FAEEDA;--amd:#854F0B;
  --rd:#E24B4A;--rdl:#FCEBEB;
  --bg:#fff;--bg2:#f7f7f5;--bg3:#efefeb;
  --t:#1a1a1a;--tm:#666;--th:#aaa;
  --br:rgba(0,0,0,0.08);--br2:rgba(0,0,0,0.16)
}
html,body{min-height:100%;background:var(--bg2)}
body{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--t);padding-bottom:72px}

.topbar{background:var(--gddd);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-logo{font-family:'Playfair Display',serif;font-size:17px;color:#9FE1CB}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-clock{font-size:10px;color:rgba(159,225,203,.45)}
.tbtn{background:rgba(159,225,203,.15);border:.5px solid rgba(159,225,203,.3);color:#9FE1CB;border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.tbtn.green{background:#9FE1CB;color:#04342C;border-color:#9FE1CB;font-weight:500}
.nbadge{background:var(--rd);color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;display:none}
.nbadge.on{display:inline-block;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

.page{display:none}
.page.active{display:block}

/* SUBTABS */
.stabs{display:flex;gap:6px;padding:10px 10px 4px;overflow-x:auto;scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:8px 14px;font-size:12px;border:.5px solid var(--br2);border-radius:8px;cursor:pointer;color:var(--tm);background:var(--bg);font-family:'DM Sans',sans-serif;white-space:nowrap;position:relative;transition:all .2s}
.stab.active{background:var(--g);color:#fff;border-color:var(--g);font-weight:500}
.sdot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--rd);border-radius:50%;display:none}
.sdot.on{display:block}
.scontent{display:none;padding:8px 10px 0}
.scontent.active{display:block}

/* ORDER CARDS */
.ocard{background:var(--bg);border:.5px solid var(--br);border-radius:13px;padding:12px 14px;margin-bottom:8px}
.oc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.oc-masa{font-size:14px;font-weight:600;color:var(--t)}
.oc-time{font-size:10px;color:var(--th)}
.oc-type{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:500;margin-left:5px}
.oc-type.loca{background:#E6F1FB;color:#185FA5}
.oc-type.sezlong{background:var(--aml);color:var(--amd)}
.oc-type.bungalov{background:var(--gl);color:var(--gd)}
.oc-type.masa{background:#F3F0FB;color:#5B35A8}
.oc-items{font-size:11px;color:var(--tm);line-height:1.8;margin-bottom:5px}
.oc-item-line{display:flex;flex-direction:column;margin-bottom:2px}
.oc-opt{font-size:10px;color:#6B35A8;background:#F0E6FB;padding:2px 7px;border-radius:5px;display:inline-block;margin-top:2px}
.oc-note{font-size:10px;color:var(--am);background:var(--aml);padding:2px 7px;border-radius:5px;display:inline-block;margin-top:2px;font-style:italic}
.oc-total{font-size:13px;font-weight:600;color:var(--g);margin-bottom:8px}
.sbtns{display:flex;gap:5px}
.sbtn{flex:1;padding:7px 2px;font-size:11px;border-radius:8px;border:.5px solid var(--br2);background:var(--bg2);color:var(--tm);cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s}
.sbtn.s1{background:#FFF8E6;color:var(--am);border-color:var(--am);font-weight:500}
.sbtn.s2{background:var(--gl);color:var(--gd);border-color:var(--g);font-weight:500}
.sbtn.s3{background:#E1F5EE;color:var(--gddd);border-color:var(--gddd);font-weight:500}

/* GARSON */
.gcard{background:var(--aml);border:.5px solid var(--am);border-radius:13px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.gc-l{display:flex;align-items:center;gap:10px}
.gc-ico{width:36px;height:36px;background:var(--am);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.gc-masa{font-size:13px;font-weight:500;color:var(--amd)}
.gc-time{font-size:10px;color:var(--am);margin-top:1px}
.gc-ok{background:var(--am);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* QR */
.qsec-ttl{font-size:11px;font-weight:500;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;padding:0 10px}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 10px;margin-bottom:4px}
.qcard{background:var(--bg);border:.5px solid var(--br);border-radius:12px;padding:12px 10px;text-align:center}
.qcard-name{font-size:11px;font-weight:500;color:var(--t);margin-top:6px;margin-bottom:2px}
.qcard-url{font-size:8px;color:var(--th);word-break:break-all}
.qprint-btn{display:flex;align-items:center;justify-content:center;gap:7px;margin:14px 10px 4px;padding:13px;background:var(--g);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;width:calc(100% - 20px)}

/* HESAP */
.date-row{display:flex;gap:6px;padding:8px 10px 4px;overflow-x:auto;scrollbar-width:none}
.date-row::-webkit-scrollbar{display:none}
.date-pill{flex-shrink:0;padding:5px 12px;border-radius:20px;border:.5px solid var(--br2);background:var(--bg);color:var(--tm);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s}
.date-pill.active{background:var(--g);color:#fff;border-color:var(--g);font-weight:500}
.hmcard{background:var(--bg);border:.5px solid var(--br);border-radius:12px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .2s}
.hmcard:active{border-color:var(--g)}
.hm-name{font-size:13px;font-weight:500;color:var(--t)}
.hm-cnt{font-size:11px;color:var(--tm);margin-top:2px}
.hm-tot{font-size:14px;font-weight:600;color:var(--g)}
.hd-back{display:flex;align-items:center;gap:6px;background:var(--bg);border:.5px solid var(--br2);color:var(--t);font-size:13px;cursor:pointer;padding:8px 14px;font-family:'DM Sans',sans-serif;border-radius:9px;margin-bottom:12px;width:fit-content;transition:border-color .2s}
.hd-back:active{border-color:var(--g)}
.hd-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--t);margin-bottom:6px}
.hd-date{font-size:11px;color:var(--tm);margin-bottom:14px}
.hd-section{font-size:11px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 6px}
.hd-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--br);font-size:12px}
.hd-rn{color:var(--t)}
.hd-rp{font-weight:500;color:var(--g)}
.hd-total{display:flex;justify-content:space-between;padding:14px 0 0;font-size:16px;font-weight:600;color:var(--t)}
.kapat-btn{width:100%;background:var(--rd);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:14px}

/* KALEM EKLE */
.kalem-btns{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.kalem-btn{padding:8px 14px;border:.5px solid var(--br2);border-radius:8px;background:var(--bg2);color:var(--t);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.kalem-btn:active{background:var(--gl);border-color:var(--g);color:var(--gd)}
.kalem-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:.5px solid var(--br);font-size:12px}
.kalem-nm{color:var(--am)}
.kalem-pr{font-weight:500;color:var(--am)}

/* RAPOR */
.rapor-card{background:var(--bg);border:.5px solid var(--br);border-radius:13px;padding:14px;margin-bottom:8px}
.rapor-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:.5px solid var(--br)}
.rapor-row:last-child{border-bottom:none}
.rapor-label{font-size:12px;color:var(--tm)}
.rapor-val{font-size:14px;font-weight:600;color:var(--t)}
.rapor-val.green{color:var(--g)}

/* ÜRÜNLER */
.ucat-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 0 6px}
.ucat-nm{font-size:12px;font-weight:500;color:var(--tm)}
.ucat-add{font-size:10px;color:var(--g);background:var(--gl);border:none;border-radius:6px;padding:3px 9px;cursor:pointer;font-family:'DM Sans',sans-serif}
.ucard{background:var(--bg);border:.5px solid var(--br);border-radius:12px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ucard.dragging{opacity:.4;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.drag-hdl{font-size:20px;color:var(--th);cursor:grab;flex-shrink:0}
.uc-img{width:44px;height:44px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;cursor:pointer;border:.5px solid var(--br);position:relative}
.uc-img img{width:100%;height:100%;object-fit:cover}
.uc-img-ov{position:absolute;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;border-radius:8px;font-size:15px;color:#fff}
.uc-img:hover .uc-img-ov,.uc-img:active .uc-img-ov{display:flex}
.uc-body{flex:1;min-width:0}
.uc-nm{font-size:12px;font-weight:500;color:var(--t);margin-bottom:2px}
.uc-pr{font-size:11px;color:var(--tm)}
.uc-opts{font-size:10px;color:#6B35A8;margin-top:2px}
.uc-acts{display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0}
.stoggle{padding:4px 10px;font-size:10px;border-radius:7px;cursor:pointer;border:.5px solid;font-weight:500;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s}
.stoggle.ok{background:var(--gl);color:var(--gd);border-color:var(--g)}
.stoggle.sold{background:var(--rdl);color:var(--rd);border-color:var(--rd)}
.edit-btn{background:var(--bg2);border:.5px solid var(--br2);color:var(--tm);border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.del-btn{background:none;border:none;color:var(--th);cursor:pointer;font-size:14px}

/* ŞİFRE */
.lock-screen{position:fixed;inset:0;background:var(--gddd);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;padding:30px 24px}
.lock-screen.hidden{display:none}
.lock-logo{font-family:'Playfair Display',serif;font-size:24px;color:#9FE1CB}
.lock-sub{font-size:12px;color:rgba(159,225,203,.5);margin-top:-10px}
.lock-box{background:rgba(255,255,255,.08);border:.5px solid rgba(159,225,203,.2);border-radius:16px;padding:24px;width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px}
.lock-inp{width:100%;padding:12px;border-radius:10px;border:.5px solid rgba(159,225,203,.3);background:rgba(255,255,255,.08);color:#9FE1CB;font-size:24px;font-family:'DM Sans',sans-serif;letter-spacing:8px;text-align:center}
.lock-inp:focus{outline:none;border-color:#9FE1CB}
.lock-inp::placeholder{letter-spacing:0;font-size:13px;color:rgba(159,225,203,.3)}
.lock-btn{width:100%;background:#9FE1CB;color:#04342C;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.lock-err{font-size:12px;color:#ff8a8a;text-align:center;display:none}
.lock-err.on{display:block}
.lock-cancel{background:none;border:none;color:rgba(159,225,203,.5);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.ov.open{opacity:1;pointer-events:all}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.ov.open .sheet{transform:translateY(0)}
.shandle{width:36px;height:4px;background:var(--br2);border-radius:2px;margin:14px auto 16px}
.sttl{font-family:'Playfair Display',serif;font-size:18px;padding:0 16px 13px;color:var(--t)}
.sbd{padding:0 16px 28px}
.fg{margin-bottom:12px}
.fl{font-size:11px;color:var(--tm);margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;padding:9px 11px;border:.5px solid var(--br2);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t)}
.fi:focus{outline:none;border-color:var(--g)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.img-up{border:.5px dashed var(--br2);border-radius:8px;padding:18px;text-align:center;cursor:pointer;background:var(--bg2);transition:border-color .2s}
.img-up:hover{border-color:var(--g)}
.img-up-ico{font-size:22px;display:block;margin-bottom:5px}
.img-up span{font-size:11px;color:var(--tm)}
.img-prev{width:100%;height:110px;object-fit:cover;border-radius:8px;display:none;margin-top:8px}
.save-btn{width:100%;background:var(--g);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px}
.opt-grp-wrap{background:var(--bg2);border-radius:10px;padding:10px;margin-bottom:8px}
.opt-grp-top{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.opt-grp-inp{flex:1;font-size:12px;padding:5px 8px;border:.5px solid var(--br2);border-radius:6px;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif}
.opt-grp-inp:focus{outline:none;border-color:var(--g)}
.opt-grp-del{background:var(--rdl);color:var(--rd);border:none;border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}
.opt-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.opt-chip{background:var(--bg);border:.5px solid var(--br2);border-radius:6px;padding:4px 8px;font-size:11px;display:flex;align-items:center;gap:5px}
.chip-del{background:none;border:none;color:var(--th);cursor:pointer;font-size:13px;line-height:1;padding:0}
.opt-add-row{display:flex;gap:5px}
.opt-ch-inp{flex:1;font-size:12px;padding:5px 8px;border:.5px solid var(--br2);border-radius:6px;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-width:0}
.opt-ch-inp:focus{outline:none;border-color:var(--g)}
.opt-ch-add{background:var(--gl);color:var(--gd);border:none;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}
.add-grp-btn{width:100%;background:var(--bg2);border:.5px dashed var(--br2);border-radius:8px;padding:9px;font-size:12px;color:var(--tm);cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:10px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:.5px solid var(--br);display:flex;z-index:90;padding-bottom:env(safe-area-inset-bottom,0px)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 10px;cursor:pointer;color:var(--th);font-size:9px;gap:2px;font-family:'DM Sans',sans-serif;position:relative;transition:color .2s}
.bni.active{color:var(--g)}
.bni-ico{font-size:20px}
.bnbadge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--rd);color:#fff;font-size:8px;min-width:15px;height:15px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px}
.bnbadge.on{display:flex}

.empty-st{text-align:center;padding:50px 20px;color:var(--th)}
.empty-ico{font-size:36px;margin-bottom:10px}
.empty-txt{font-size:13px;line-height:1.6}
.padded{padding:0 10px}

@media print{
  .bnav,.topbar,.stabs,.date-row{display:none!important}
  .qcard{page-break-inside:avoid}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo" id="tb-logo">Saklıdoğa</div>
  <div class="topbar-right">
    <span class="nbadge" id="nbadge"></span>
    <div class="topbar-clock" id="tb-clock"></div>
    <button class="tbtn green" id="tb-add-btn" style="display:none" onclick="openAddModal(null)">+ Ekle</button>
  </div>
</div>

<!-- SİPARİŞLER & GARSON -->
<div class="page active" id="page-siparis">
  <div class="stabs">
    <div class="stab active" id="stab-orders" onclick="switchSub('orders')">📋 Siparişler <span class="sdot" id="dot-orders"></span></div>
    <div class="stab" id="stab-garson" onclick="switchSub('garson')">🔔 Garson <span class="sdot" id="dot-garson"></span></div>
    <div class="stab" id="stab-msip" onclick="switchSub('msip')">➕ Sipariş Ekle</div>
  </div>
  <div class="scontent active" id="sc-orders"></div>
  <div class="scontent" id="sc-garson"></div>
  <div class="scontent" id="sc-msip" style="padding:10px"></div>
</div>

<!-- QR KODLAR -->
<div class="page" id="page-qr">
  <div id="qbody" style="padding-bottom:16px"></div>
</div>

<!-- ÜRÜNLER -->
<div class="page" id="page-urun">
  <div style="padding:0 10px 20px" id="ubody"></div>
</div>

<!-- HESAP & RAPOR -->
<div class="page" id="page-hesap">
  <div class="stabs">
    <div class="stab active" id="stab-hesap" onclick="switchHesap('hesap')">💳 Hesap</div>
    <div class="stab" id="stab-rapor" onclick="switchHesap('rapor')">📊 Rapor</div>
  </div>
  <div class="scontent active padded" id="sc-hesap"></div>
  <div class="scontent padded" id="sc-rapor"></div>
</div>

<!-- ŞİFRE -->
<div class="lock-screen hidden" id="lock-screen">
  <div class="lock-logo">Saklıdoğa</div>
  <div class="lock-sub">Yönetici Girişi</div>
  <div class="lock-box">
    <input class="lock-inp" id="lock-inp" type="password" placeholder="••••" maxlength="10" onkeydown="if(event.key==='Enter')checkPin()">
    <button class="lock-btn" onclick="checkPin()">Giriş Yap</button>
    <div class="lock-err" id="lock-err">Hatalı şifre!</div>
    <button class="lock-cancel" onclick="cancelLock()">← Geri dön</button>
  </div>
</div>

<!-- ÜRÜN EKLE/DÜZENLE MODAL -->
<div class="ov" id="urun-ov" onclick="closeUrunModal(event)">
  <div class="sheet">
    <div class="shandle"></div>
    <div class="sttl" id="urun-modal-ttl">Ürün Ekle</div>
    <div class="sbd">
      <input type="hidden" id="edit-id">
      <div class="fg"><label class="fl">Ürün Adı *</label><input class="fi" id="fn" type="text" placeholder="örn. Limonata"></div>
      <div class="fg"><label class="fl">Açıklama</label><input class="fi" id="fd" type="text" placeholder="Kısa açıklama"></div>
      <div class="fg"><label class="fl">Kategori</label><select class="fi" id="fcat" style="cursor:pointer"></select></div>
      <div class="frow">
        <div class="fg"><label class="fl">Fiyat (₺) *</label><input class="fi" id="fp" type="number" placeholder="0" min="0"></div>
        <div class="fg"><label class="fl">Menü Fiyatı (₺)</label><input class="fi" id="fp2" type="number" placeholder="boş bırak" min="0"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Emoji</label><input class="fi" id="femo" type="text" placeholder="🍔" maxlength="4"></div>
        <div class="fg"><label class="fl">Popüler?</label><select class="fi" id="fpop" style="cursor:pointer"><option value="0">Hayır</option><option value="1">Evet</option></select></div>
      </div>
      <div class="fg">
        <label class="fl">Fotoğraf</label>
        <div class="img-up" onclick="document.getElementById('fimg-file').click()">

// SES
function playSound(type){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    (type==='garson'?[440,550,440,550]:[600,800,1000,1200]).forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='sine';
      const t0=ac.currentTime+i*0.14;
      g.gain.setValueAtTime(0.3,t0);
      g.gain.exponentialRampToValueAtTime(0.001,t0+0.2);
      o.start(t0);o.stop(t0+0.2);
    });
  }catch(e){}
}

// Masa grid - 5'li satırlar, tek kalan ortada
function masaGridHtml(type){
  const items=MASALAR.filter(m=>m.type===type);
  let html='';
  for(let i=0;i<items.length;i+=5){
    const row=items.slice(i,i+5);
    const isLast=i+5>=items.length&&row.length<5;
    const leftPad=isLast?Math.floor((5-row.length)/2):0;
    html+=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:5px">`;
    for(let p=0;p<leftPad;p++)html+=`<div></div>`;
    row.forEach(m=>{
      const sel=msipMasa?.id===m.id;
      html+=`<button onclick="window.selMsipMasa('${m.id}','${m.name}','${m.type}')"
        style="padding:7px 2px;border-radius:8px;border:.5px solid ${sel?'var(--g)':'var(--br2)'};background:${sel?'var(--g)':'var(--bg2)'};color:${sel?'#fff':'var(--tm)'};cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif;font-weight:500;text-align:center">
        ${m.name}
      </button>`;
    });
    for(let p=0;p<(5-row.length-leftPad);p++)html+=`<div></div>`;
    html+=`</div>`;
  }
  return html;
}

window.msipQty=(id,delta,name,price)=>{

  else if(idx!==-1){msipSepet[idx].qty+=delta;if(msipSepet[idx].qty<=0)msipSepet.splice(idx,1);}

};

    id:r.key,
    masa:msipMasa.name,

    status:'hazirlaniyor',
    total,
    kaynakAdmin:true
  });
  alert('✓ Sipariş oluşturuldu!');
  msipMasa=null;msipSepet=[];
  switchSub('orders');
};

  if(hesapMasa){
    // DETAY SAYFASI
    const masaOrders=Object.values(orders).filter(o=>o.masaId===hesapMasa.id&&o.date===selDate&&o.status!=='kapali');
    const ekKalemler=Object.values(orders).filter(o=>o.masaId===hesapMasa.id&&o.date===selDate&&o._kalem);
    // Sipariş toplamı
    const sipTotal=masaOrders.reduce((s,o)=>s+o.total,0);
    // Ek kalemler toplamı
    const ekTotal=masaOrders.reduce((s,o)=>s+(o._kalemTotal||0),0);
    const genel=sipTotal+ekTotal;

    // Tüm sipariş kalemleri
    const itemMap={};
    masaOrders.forEach(o=>o.items.forEach(i=>{
      const key=i.name+(i.options?'-'+i.options:'');
      if(!itemMap[key])itemMap[key]={name:i.name+(i.options?' ('+i.options+')':''),qty:0,price:0};
      itemMap[key].qty+=i.qty;
      itemMap[key].price+=i.price*i.qty;
    }));

    // Ek kalemler
    const kalemMap={};
    masaOrders.forEach(o=>{
      if(o._kalemler){
        o._kalemler.forEach(k=>{
          if(!kalemMap[k.name])kalemMap[k.name]={name:k.name,qty:0,price:0};
          kalemMap[k.name].qty+=k.qty||1;
          kalemMap[k.name].price+=k.price*(k.qty||1);
        });
      }
    });

    el.innerHTML=`
      <button class="hd-back" onclick="window.geriHesap()">← Geri</button>
      <div class="hd-title">${hesapMasa.name}</div>
      <div class="hd-date">${selDate}</div>

      ${Object.values(itemMap).length?`
        <div class="hd-section">Siparişler</div>
        ${Object.values(itemMap).map(r=>`<div class="hd-row"><span class="hd-rn">${r.name} × ${r.qty}</span><span class="hd-rp">₺${r.price}</span></div>`).join('')}
      `:'<div style="font-size:12px;color:var(--th);padding:8px 0">Sipariş yok</div>'}

      ${Object.values(kalemMap).length?`
        <div class="hd-section">Ek Kalemler</div>
        ${Object.values(kalemMap).map(r=>`<div class="hd-row"><span class="kalem-nm">${r.name} × ${r.qty}</span><span class="kalem-pr">₺${r.price}</span></div>`).join('')}
      `:''}

      <div class="hd-section">Kalem Ekle</div>
      <div class="kalem-btns">
        ${KALEMLER.map(k=>`<button class="kalem-btn" onclick="addKalem('${hesapMasa.id}','${k.name}',${k.price})">+ ${k.name} (₺${k.price.toLocaleString()})</button>`).join('')}
      </div>

      <div class="hd-total"><span>Genel Toplam</span><span>₺${genel.toLocaleString()}</span></div>
      ${masaOrders.length?`<button class="kapat-btn" onclick="kapatiHesap('${hesapMasa.id}')">✓ Hesabı Kapat & Temizle</button>`:''}
    `;
    return;
  }

  // MASA LİSTESİ
  const aktif=MASALAR.filter(m=>Object.values(orders).some(o=>o.masaId===m.id&&o.status!=='kapali'&&o.date===selDate));
  el.innerHTML=dateSelector('setHesapDate')+(aktif.length?`<div style="font-size:11px;color:var(--th);margin:6px 0 8px">Hesap görmek için masa seçin</div>`+aktif.map(m=>{
    const masaOrds=Object.values(orders).filter(o=>o.masaId===m.id&&o.status!=='kapali'&&o.date===selDate);
    const sipTot=masaOrds.reduce((s,o)=>s+o.total,0);
    const ekTot=masaOrds.reduce((s,o)=>s+(o._kalemTotal||0),0);
    return `<div class="hmcard" data-id="${m.id}" data-name="${m.name}" data-type="${m.type}" onclick="window.selectHesapMasa(this)">
      <div><div class="hm-name">${m.name}</div><div class="hm-cnt">${masaOrds.length} sipariş</div></div>
      <div class="hm-tot">₺${(sipTot+ekTot).toLocaleString()}</div>
    </div>`;
  }).join(''):`<div class="empty-st"><div class="empty-ico">💳</div><div class="empty-txt">${selDate===today()?'Bugün açık hesap yok':'Bu tarihte açık hesap yok'}</div></div>`);
}

window.renderHesap=renderHesap;
window.setHesapDate=d=>{selDate=d;hesapMasa=null;renderHesap();};

window.addKalem=async(masaId,name,price)=>{
  // İlk aktif siparişi bul, yoksa yeni oluştur
  const masaOrds=Object.values(orders).filter(o=>o.masaId===masaId&&o.status!=='kapali'&&o.date===selDate);
  if(!masaOrds.length){alert('Bu masanın aktif siparişi yok');return;}
  const ord=masaOrds[0];
  const kalemler=[...(ord._kalemler||[]),{name,price,qty:1}];
  const kalemTotal=kalemler.reduce((s,k)=>s+k.price*(k.qty||1),0);
  await update(ref(db,'orders/'+ord.id),{_kalemler:kalemler,_kalemTotal:kalemTotal});
};

window.kapatiHesap=async masaId=>{
  const masaOrds=Object.values(orders).filter(o=>o.masaId===masaId&&o.status!=='kapali'&&o.date===selDate);
  for(const o of masaOrds) await update(ref(db,'orders/'+o.id),{status:'kapali'});
  hesapMasa=null; renderHesap();
};

function renderRapor(){
  const el=document.getElementById('sc-rapor');
  const list=Object.values(orders).filter(o=>o.date===selDate);
  const ciro=list.filter(o=>o.status==='kapali').reduce((s,o)=>s+(o.total||0)+(o._kalemTotal||0),0);
  const acik=list.filter(o=>o.status!=='kapali').reduce((s,o)=>s+(o.total||0)+(o._kalemTotal||0),0);
  const uc={};
  list.forEach(o=>o.items&&o.items.forEach(i=>{if(!uc[i.name])uc[i.name]=0;uc[i.name]+=i.qty;}));
  const top=Object.entries(uc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  el.innerHTML=dateSelector('setRaporDate')+`
    <div class="rapor-card" style="margin-top:8px">
      <div style="font-size:12px;font-weight:500;color:var(--tm);margin-bottom:10px">📊 ${selDate===today()?'Bugün':selDate}</div>
      <div class="rapor-row"><span class="rapor-label">Toplam Sipariş</span><span class="rapor-val">${list.length}</span></div>
      <div class="rapor-row"><span class="rapor-label">Tahsil Edilen</span><span class="rapor-val green">₺${ciro.toLocaleString()}</span></div>
      <div class="rapor-row"><span class="rapor-label">Açık Hesaplar</span><span class="rapor-val">₺${acik.toLocaleString()}</span></div>
      <div class="rapor-row"><span class="rapor-label">Toplam Ciro</span><span class="rapor-val green">₺${(ciro+acik).toLocaleString()}</span></div>
    </div>
    ${top.length?`<div class="rapor-card">
      <div style="font-size:12px;font-weight:500;color:var(--tm);margin-bottom:10px">🏆 En Çok Satanlar</div>
      ${top.map(([name,qty],i)=>`<div class="rapor-row"><span class="rapor-label">${i+1}. ${name}</span><span class="rapor-val">${qty} adet</span></div>`).join('')}
    </div>`:''}`;
}
window.setRaporDate=d=>{selDate=d;renderRapor();};

// ÜRÜNLER
function renderUrun(){
  const el=document.getElementById('ubody');
  if(!menuData||!menuData.length){
    el.innerHTML='<div class="empty-st"><div class="empty-ico">⏳</div><div class="empty-txt">Yükleniyor...</div></div>';
    return;
  }
  el.innerHTML=menuData.map(cat=>`
    <div>
      <div class="ucat-hd">
        <div class="ucat-nm">${cat.emoji} ${cat.name} (${(cat.items||[]).length})</div>
        <button class="ucat-add" onclick="openAddModal('${cat.id}')">+ Ekle</button>
      </div>
      ${(cat.items||[]).map((item,idx)=>`
        <div class="ucard" draggable="true" id="uc-${cat.id}-${idx}"
          ondragstart="dragStart('${cat.id}',${idx})"
          ondragover="dragOver(event)"
          ondrop="dragDrop('${cat.id}',${idx})"
          ondragend="dragEnd()">
          <div class="drag-hdl">⠿</div>
          <div class="uc-img" onclick="document.getElementById('uimg-${item.id}').click()">
            ${item.img?`<img src="${item.img}" alt="${item.name}">`:`<span>${item.emoji||'🍽️'}</span>`}
            <div class="uc-img-ov">📷</div>
          </div>
          <input type="file" accept="image/*" id="uimg-${item.id}" style="display:none" onchange="handleUrunImg('${item.id}',this)">
          <div class="uc-body">
            <div class="uc-nm">${item.name}</div>
            <div class="uc-pr">₺${item.price}${item.price2?' / Menü ₺'+item.price2:''}</div>
            ${item.options&&item.options.length?`<div class="uc-opts">🎯 ${item.options.map(o=>o.label+': '+o.choices.join(', ')).join(' | ')}</div>`:''}
          </div>
          <div class="uc-acts">
            <button class="edit-btn" onclick="openEditModal('${item.id}')">Düzenle</button>
            <button class="stoggle ${item.soldOut?'sold':'ok'}" onclick="toggleSold('${item.id}')">${item.soldOut?'Tükendi':'Mevcut'}</button>
            <button class="del-btn" onclick="delItem('${item.id}')">🗑️</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

window.dragStart=(c,i)=>{ dragSrcCat=c;dragSrcIdx=i;setTimeout(()=>document.getElementById(`uc-${c}-${i}`)?.classList.add('dragging'),0); };
window.dragOver=e=>e.preventDefault();
window.dragDrop=async(c,i)=>{
  if(dragSrcCat===null||dragSrcIdx===null)return;
  if(dragSrcCat===c&&dragSrcIdx===i){dragSrcCat=null;dragSrcIdx=null;return;}
  const src=menuData.find(x=>x.id===dragSrcCat);
  const dst=menuData.find(x=>x.id===c);
  if(!src||!dst)return;
  const [item]=src.items.splice(dragSrcIdx,1);
  dst.items.splice(i,0,item);
  dragSrcCat=null;dragSrcIdx=null;
  await set(ref(db,'menu'),menuData);
};
window.dragEnd=()=>document.querySelectorAll('.ucard').forEach(el=>el.classList.remove('dragging'));

window.handleUrunImg=(id,input)=>{
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=async()=>{
      const canvas=document.createElement('canvas');
      const MAX=400;let w=img.width,h=img.height;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.75);
      for(const c of menuData){const it=c.items?.find(i=>i.id==id);if(it){it.img=compressed;break;}}
      await set(ref(db,'menu'),menuData);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
};

window.toggleSold=async id=>{
  for(const c of menuData){const it=c.items?.find(i=>i.id==id);if(it){it.soldOut=!it.soldOut;break;}}
  await set(ref(db,'menu'),menuData);
};

window.delItem=async id=>{
  if(!confirm('Bu ürünü silmek istiyor musunuz?'))return;
  for(const c of menuData){const idx=c.items?.findIndex(i=>i.id==id);if(idx!==-1){c.items.splice(idx,1);break;}}
  await set(ref(db,'menu'),menuData);
};

window.updatePrice=(id,field,val)=>{
  const v=parseInt(val)||0;
  for(const c of menuData){const it=c.items?.find(i=>i.id==id);if(it){it[field]=v;break;}}
  clearTimeout(window._pt);
  window._pt=setTimeout(()=>set(ref(db,'menu'),menuData),800);
};

// ÜRÜN EKLE/DÜZENLE MODAL
window.openAddModal=catId=>{
  editId=null;
  addCatId=catId||menuData[0]?.id;
  optGrps=[];
  document.getElementById('urun-modal-ttl').textContent='Ürün Ekle';
  document.getElementById('edit-id').value='';
  ['fn','fd','fp','fp2','femo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fpop').value='0';
  document.getElementById('fimg').value='';
  document.getElementById('fimg-prev').style.display='none';
  document.getElementById('fcat').innerHTML=menuData.map(c=>`<option value="${c.id}"${c.id===addCatId?' selected':''}>${c.emoji} ${c.name}</option>`).join('');
  renderOptGrps();
  document.getElementById('urun-ov').classList.add('open');
};

window.openEditModal=id=>{
  const item=null;
  let foundItem=null,foundCat=null;
  for(const c of menuData){const it=c.items?.find(i=>i.id==id);if(it){foundItem=it;foundCat=c;break;}}
  if(!foundItem)return;
  editId=id;
  addCatId=foundCat.id;
  optGrps=JSON.parse(JSON.stringify(foundItem.options||[]));
  document.getElementById('urun-modal-ttl').textContent='Ürün Düzenle';
  document.getElementById('edit-id').value=id;
  document.getElementById('fn').value=foundItem.name||'';
  document.getElementById('fd').value=foundItem.desc||'';
  document.getElementById('fp').value=foundItem.price||0;
  document.getElementById('fp2').value=foundItem.price2||'';
  document.getElementById('femo').value=foundItem.emoji||'';
  document.getElementById('fpop').value=foundItem.popular?'1':'0';
  document.getElementById('fimg').value=foundItem.img||'';
  const prev=document.getElementById('fimg-prev');
  if(foundItem.img){prev.src=foundItem.img;prev.style.display='block';}
  else{prev.style.display='none';}
  document.getElementById('fcat').innerHTML=menuData.map(c=>`<option value="${c.id}"${c.id===foundCat.id?' selected':''}>${c.emoji} ${c.name}</option>`).join('');
  renderOptGrps();
  document.getElementById('urun-ov').classList.add('open');
};

window.closeUrunModal=e=>{
  if(!e||e.target===document.getElementById('urun-ov'))
    document.getElementById('urun-ov').classList.remove('open');
};

// SEÇENEK YÖNETİMİ
function syncOptGrps(){
  optGrps.forEach((g,gi)=>{
    const lbl=document.getElementById(`og-lbl-${gi}`);
    const req=document.getElementById(`og-req-${gi}`);
    if(lbl)g.label=lbl.value;
    if(req)g.required=req.value==='1';
  });
}

window.addOptGrp=()=>{
  syncOptGrps();
  optGrps.push({label:'',choices:[],required:true});
  renderOptGrps();
};

window.delOptGrp=idx=>{
  syncOptGrps();
  optGrps.splice(idx,1);
  renderOptGrps();
};

window.addOptChoice=idx=>{
  syncOptGrps();
  const inp=document.getElementById(`og-inp-${idx}`);
  const val=inp?.value.trim();
  if(!val)return;
  optGrps[idx].choices.push(val);
  inp.value='';
  renderOptGrps();
};

window.delOptChoice=(gi,ci)=>{
  syncOptGrps();
  optGrps[gi].choices.splice(ci,1);
  renderOptGrps();
};

function renderOptGrps(){
  const el=document.getElementById('opt-grps-admin');
  el.innerHTML=optGrps.map((g,gi)=>`
    <div class="opt-grp-wrap">
      <div class="opt-grp-top">
        <input class="opt-grp-inp" id="og-lbl-${gi}" placeholder="Grup adı (örn. Aroma)" value="${g.label}">
        <select id="og-req-${gi}" style="font-size:11px;padding:4px 6px;border:.5px solid var(--br2);border-radius:6px;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif">
          <option value="1" ${g.required?'selected':''}>Zorunlu</option>
          <option value="0" ${!g.required?'selected':''}>İsteğe bağlı</option>
        </select>
        <button class="opt-grp-del" onclick="delOptGrp(${gi})">Sil</button>
      </div>
      <div class="opt-chips">
        ${g.choices.map((ch,ci)=>`<div class="opt-chip"><span>${ch}</span><button class="chip-del" onclick="delOptChoice(${gi},${ci})">×</button></div>`).join('')}
      </div>
      <div class="opt-add-row">
        <input class="opt-ch-inp" id="og-inp-${gi}" placeholder="Seçenek ekle..." onkeydown="if(event.key==='Enter'){event.preventDefault();addOptChoice(${gi})}">
        <button class="opt-ch-add" onclick="addOptChoice(${gi})">Ekle</button>
      </div>
    </div>`).join('');
}

window.handleImg=input=>{
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=400;let w=img.width,h=img.height;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.75);
      document.getElementById('fimg').value=compressed;
      const prev=document.getElementById('fimg-prev');
      prev.src=compressed;prev.style.display='block';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
};

window.saveProduct=async()=>{
  syncOptGrps();
  const name=document.getElementById('fn').value.trim();
  if(!name){alert('Ürün adı gerekli');return;}
  const catId=document.getElementById('fcat').value;
  const price=parseInt(document.getElementById('fp').value)||0;
  const p2v=document.getElementById('fp2').value;
  const price2=p2v?parseInt(p2v):null;
  const desc=document.getElementById('fd').value.trim();
  const emoji=document.getElementById('femo').value||'🍽️';
  const popular=document.getElementById('fpop').value==='1';
  const img=document.getElementById('fimg').value;
  const options=optGrps.filter(g=>g.label.trim()&&g.choices.length>0);

  if(editId){
    // DÜZENLE
    for(const c of menuData){
      const it=c.items?.find(i=>i.id==editId);
      if(it){
        it.name=name;it.desc=desc;it.price=price;it.price2=price2;
        it.emoji=emoji;it.popular=popular;it.options=options;
        if(img) it.img=img;
        // Kategoriye taşı
        if(c.id!==catId){
          c.items.splice(c.items.indexOf(it),1);
          const dst=menuData.find(x=>x.id===catId);
          if(dst){if(!dst.items)dst.items=[];dst.items.push(it);}
        }
        break;
      }
    }
  } else {
    // YENİ EKLE
    const cat=menuData.find(c=>c.id===catId);
    if(!cat)return;
    if(!cat.items)cat.items=[];
    cat.items.push({id:'u'+Date.now(),name,desc,price,price2,emoji,popular,soldOut:false,img,options});
  }

  await set(ref(db,'menu'),menuData);
  document.getElementById('urun-ov').classList.remove('open');
};
</script>
