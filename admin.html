<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Saklıdoğa — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;--gddd:#04342C;
  --am:#BA7517;--aml:#FAEEDA;--amd:#854F0B;
  --rd:#E24B4A;--rdl:#FCEBEB;
  --bg:#fff;--bg2:#f7f7f5;--bg3:#efefeb;
  --t:#1a1a1a;--tm:#666;--th:#aaa;
  --br:rgba(0,0,0,0.08);--br2:rgba(0,0,0,0.16)
}
html,body{min-height:100%;background:var(--bg2)}
body{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--t);padding-bottom:72px}

/* BİLDİRİM */
.notif{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--g);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:10px;transform:translateY(-100%);transition:transform .4s;box-shadow:0 4px 20px rgba(29,158,117,.4)}
.notif.show{transform:translateY(0)}
.notif.garson{background:var(--am)}
.notif-ico{font-size:20px}
.notif-txt{flex:1;font-size:13px;font-weight:500}
.notif-kapat{background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:7px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-15deg)}75%{transform:rotate(15deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.blink{animation:blink .6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* TOPBAR */
.topbar{background:var(--gddd);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-logo{font-family:'Playfair Display',serif;font-size:17px;color:#9FE1CB}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-clock{font-size:10px;color:rgba(159,225,203,.45)}
.tbtn{background:rgba(159,225,203,.15);border:.5px solid rgba(159,225,203,.3);color:#9FE1CB;border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.tbtn.gr{background:#9FE1CB;color:#04342C;border-color:#9FE1CB;font-weight:500}
.nbadge{background:var(--rd);color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;display:none}
.nbadge.on{display:inline-block;animation:pulse 1s infinite}

/* PAGES */
.page{display:none}.page.active{display:block}

/* TABS */
.stabs{display:flex;gap:6px;padding:10px 10px 4px;overflow-x:auto;scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:8px 14px;font-size:12px;border:.5px solid var(--br2);border-radius:8px;cursor:pointer;color:var(--tm);background:var(--bg);font-family:'DM Sans',sans-serif;white-space:nowrap;position:relative;transition:all .2s}
.stab.active{background:var(--g);color:#fff;border-color:var(--g);font-weight:500}
.sdot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--rd);border-radius:50%;display:none}
.sdot.on{display:block}
.scontent{display:none;padding:8px 10px 0}
.scontent.active{display:block}

/* ORDER CARDS */
.ocard{background:var(--bg);border:.5px solid var(--br);border-radius:13px;padding:12px 14px;margin-bottom:8px}
.oc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.oc-masa{font-size:14px;font-weight:600;color:var(--t)}
.oc-time{font-size:10px;color:var(--th)}
.oc-badge{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:500;margin-left:5px}
.oc-badge.loca{background:#E6F1FB;color:#185FA5}
.oc-badge.sezlong{background:var(--aml);color:var(--amd)}
.oc-badge.bungalov{background:var(--gl);color:var(--gd)}
.oc-badge.masa{background:#F3F0FB;color:#5B35A8}
.oc-items{font-size:11px;color:var(--tm);line-height:1.9;margin-bottom:6px}
.oc-opt{font-size:10px;color:#6B35A8;background:#F0E6FB;padding:2px 6px;border-radius:4px;margin-left:4px}
.oc-note{font-size:10px;color:var(--am);background:var(--aml);padding:2px 6px;border-radius:4px;margin-left:4px;font-style:italic}
.oc-total{font-size:13px;font-weight:600;color:var(--g);margin-bottom:8px}
.sbtns{display:flex;gap:5px}
.sbtn{flex:1;padding:7px 2px;font-size:11px;border-radius:8px;border:.5px solid var(--br2);background:var(--bg2);color:var(--tm);cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s}
.sbtn.s1{background:#FFF8E6;color:var(--am);border-color:var(--am);font-weight:500}
.sbtn.s2{background:var(--gl);color:var(--gd);border-color:var(--g);font-weight:500}
.sbtn.s3{background:#E1F5EE;color:var(--gddd);border-color:var(--gddd);font-weight:500}

/* GARSON */
.gcard{background:var(--aml);border:.5px solid var(--am);border-radius:13px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.gc-l{display:flex;align-items:center;gap:10px}
.gc-ico{width:36px;height:36px;background:var(--am);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.gc-masa{font-size:13px;font-weight:500;color:var(--amd)}
.gc-time{font-size:10px;color:var(--am);margin-top:2px}
.gc-ok{background:var(--am);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* QR */
.qsec-ttl{font-size:11px;font-weight:500;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;padding:0 10px}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 10px;margin-bottom:4px}
.qcard{background:var(--bg);border:.5px solid var(--br);border-radius:12px;padding:12px 10px;text-align:center}
.qcard-name{font-size:11px;font-weight:500;color:var(--t);margin-top:6px;margin-bottom:2px}
.qcard-url{font-size:8px;color:var(--th);word-break:break-all}
.qprint-btn{display:flex;align-items:center;justify-content:center;gap:7px;margin:14px 10px 4px;padding:13px;background:var(--g);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;width:calc(100% - 20px)}

/* HESAP */
.date-row{display:flex;gap:6px;padding:8px 0 6px;overflow-x:auto;scrollbar-width:none}
.date-row::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:5px 12px;border-radius:20px;border:.5px solid var(--br2);background:var(--bg);color:var(--tm);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s}
.dpill.active{background:var(--g);color:#fff;border-color:var(--g);font-weight:500}
.hmcard{background:var(--bg);border:.5px solid var(--br);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .2s}
.hmcard:active{border-color:var(--g)}
.hm-name{font-size:14px;font-weight:600;color:var(--t)}
.hm-cnt{font-size:11px;color:var(--tm);margin-top:2px}
.hm-tot{font-size:15px;font-weight:600;color:var(--g)}
.hd-back{display:flex;align-items:center;gap:6px;background:var(--bg);border:.5px solid var(--br2);color:var(--t);font-size:13px;cursor:pointer;padding:8px 14px;font-family:'DM Sans',sans-serif;border-radius:9px;margin-bottom:14px;width:fit-content}
.hd-title{font-family:'Playfair Display',serif;font-size:19px;color:var(--t);margin-bottom:4px}
.hd-date{font-size:11px;color:var(--tm);margin-bottom:16px}
.hd-sec{font-size:11px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 7px}
.hd-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--br);font-size:13px}
.hd-rn{color:var(--t);flex:1}
.hd-rp{font-weight:600;color:var(--g);white-space:nowrap}
.hd-total-box{background:var(--gddd);border-radius:12px;padding:14px 16px;margin-top:16px;display:flex;justify-content:space-between;align-items:center}
.hd-total-lbl{font-size:14px;color:rgba(159,225,203,.8)}
.hd-total-val{font-size:20px;font-weight:600;color:#9FE1CB}
.kalem-btns{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.kalem-btn{padding:9px 14px;border:.5px solid var(--g);border-radius:9px;background:var(--gl);color:var(--gd);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.odeme-btn{width:100%;background:var(--g);color:#fff;border:none;border-radius:13px;padding:14px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px}

/* RAPOR */
.rapor-card{background:var(--bg);border:.5px solid var(--br);border-radius:13px;padding:14px;margin-bottom:8px}
.r-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:.5px solid var(--br)}
.r-row:last-child{border-bottom:none}
.r-lbl{font-size:12px;color:var(--tm)}
.r-val{font-size:14px;font-weight:600;color:var(--t)}
.r-val.green{color:var(--g)}

/* ÜRÜNLER */
.ucat-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 0 7px}
.ucat-nm{font-size:12px;font-weight:500;color:var(--tm)}
.ucat-add{font-size:10px;color:var(--g);background:var(--gl);border:none;border-radius:6px;padding:3px 9px;cursor:pointer;font-family:'DM Sans',sans-serif}
.ucard{background:var(--bg);border:.5px solid var(--br);border-radius:12px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ucard.dragging{opacity:.4;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.drag-h{font-size:20px;color:var(--th);cursor:grab;flex-shrink:0}
.uc-img{width:44px;height:44px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;cursor:pointer;border:.5px solid var(--br);position:relative}
.uc-img img{width:100%;height:100%;object-fit:cover}
.uc-img-ov{position:absolute;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;border-radius:8px;font-size:14px;color:#fff}
.uc-img:hover .uc-img-ov,.uc-img:active .uc-img-ov{display:flex}
.uc-body{flex:1;min-width:0}
.uc-nm{font-size:12px;font-weight:500;color:var(--t);margin-bottom:2px}
.uc-pr{font-size:11px;color:var(--tm)}
.uc-opts{font-size:10px;color:#6B35A8;margin-top:2px}
.uc-acts{display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0}
.stoggle{padding:4px 10px;font-size:10px;border-radius:7px;cursor:pointer;border:.5px solid;font-weight:500;font-family:'DM Sans',sans-serif;white-space:nowrap}
.stoggle.ok{background:var(--gl);color:var(--gd);border-color:var(--g)}
.stoggle.sold{background:var(--rdl);color:var(--rd);border-color:var(--rd)}
.edit-btn{background:var(--bg2);border:.5px solid var(--br2);color:var(--tm);border-radius:6px;padding:3px 9px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.del-btn{background:none;border:none;color:var(--th);cursor:pointer;font-size:15px}

/* ŞİFRE */
.lock-screen{position:fixed;inset:0;background:var(--gddd);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;padding:30px 24px}
.lock-screen.hidden{display:none}
.lock-logo{font-family:'Playfair Display',serif;font-size:26px;color:#9FE1CB}
.lock-sub{font-size:12px;color:rgba(159,225,203,.5);margin-top:-10px}
.lock-box{background:rgba(255,255,255,.08);border:.5px solid rgba(159,225,203,.2);border-radius:16px;padding:24px;width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px}
.lock-inp{width:100%;padding:13px;border-radius:10px;border:.5px solid rgba(159,225,203,.3);background:rgba(255,255,255,.08);color:#9FE1CB;font-size:26px;font-family:'DM Sans',sans-serif;letter-spacing:10px;text-align:center}
.lock-inp:focus{outline:none;border-color:#9FE1CB}
.lock-inp::placeholder{letter-spacing:0;font-size:13px;color:rgba(159,225,203,.3)}
.lock-btn{width:100%;background:#9FE1CB;color:#04342C;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.lock-err{font-size:12px;color:#ff8a8a;text-align:center;display:none}
.lock-err.on{display:block}
.lock-cancel{background:none;border:none;color:rgba(159,225,203,.5);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.ov.open{opacity:1;pointer-events:all}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.ov.open .sheet{transform:translateY(0)}
.shandle{width:36px;height:4px;background:var(--br2);border-radius:2px;margin:14px auto 16px}
.sttl{font-family:'Playfair Display',serif;font-size:18px;padding:0 16px 13px;color:var(--t)}
.sbd{padding:0 16px 28px;display:flex;flex-direction:column;gap:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;color:var(--tm);font-weight:500}
.fi{padding:9px 11px;border:.5px solid var(--br2);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);width:100%}
.fi:focus{outline:none;border-color:var(--g)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.img-up{border:.5px dashed var(--br2);border-radius:8px;padding:18px;text-align:center;cursor:pointer;background:var(--bg2)}
.img-up-ico{font-size:22px;display:block;margin-bottom:5px}
.img-up span{font-size:11px;color:var(--tm)}
.img-prev{width:100%;height:110px;object-fit:cover;border-radius:8px;display:none;margin-top:8px}
.save-btn{background:var(--g);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%}
.og-wrap{background:var(--bg2);border-radius:10px;padding:10px;margin-bottom:8px}
.og-top{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.og-inp{flex:1;font-size:12px;padding:5px 8px;border:.5px solid var(--br2);border-radius:6px;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif}
.og-inp:focus{outline:none;border-color:var(--g)}
.og-req{font-size:11px;padding:4px 6px;border:.5px solid var(--br2);border-radius:6px;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif}
.og-del{background:var(--rdl);color:var(--rd);border:none;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}
.og-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.og-chip{background:var(--bg);border:.5px solid var(--br2);border-radius:6px;padding:4px 8px;font-size:11px;display:flex;align-items:center;gap:4px}
.chip-x{background:none;border:none;color:var(--th);cursor:pointer;font-size:13px;line-height:1;padding:0}
.og-row{display:flex;gap:5px}
.og-ch-inp{flex:1;font-size:12px;padding:5px 8px;border:.5px solid var(--br2);border-radius:6px;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif}
.og-ch-inp:focus{outline:none;border-color:var(--g)}
.og-ch-add{background:var(--gl);color:var(--gd);border:none;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}
.add-og-btn{width:100%;background:var(--bg2);border:.5px dashed var(--br2);border-radius:8px;padding:9px;font-size:12px;color:var(--tm);cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:10px}

/* SİPARİŞ EKLE */
.msip-masa-group{margin-bottom:10px}
.msip-masa-lbl{font-size:10px;font-weight:500;color:var(--tm);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.msip-masa-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.msip-masa-btn{padding:8px 2px;border-radius:8px;border:.5px solid var(--br2);background:var(--bg2);color:var(--tm);cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif;font-weight:500;text-align:center;transition:all .2s}
.msip-masa-btn.sel{background:var(--g);color:#fff;border-color:var(--g)}
.msip-cat-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:4px 0}
.msip-cat-row::-webkit-scrollbar{display:none}
.msip-cat-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:.5px solid var(--br2);background:var(--bg2);color:var(--tm);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s}
.msip-cat-btn.active{background:var(--g);color:#fff;border-color:var(--g)}
.msip-urun{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:10px;padding:8px 10px;margin-bottom:5px}
.msip-urun-img{width:38px;height:38px;border-radius:7px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;border:.5px solid var(--br)}
.msip-urun-img img{width:100%;height:100%;object-fit:cover}
.msip-urun-body{flex:1;min-width:0}
.msip-urun-ad{font-size:12px;font-weight:500;color:var(--t)}
.msip-urun-fiyat{font-size:11px;color:var(--tm);margin-top:1px}
.msip-qty{display:flex;align-items:center;gap:6px;flex-shrink:0}
.msip-qb{width:26px;height:26px;border-radius:50%;border:.5px solid var(--br2);background:var(--bg);color:var(--t);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
.msip-qn{font-size:13px;font-weight:600;min-width:16px;text-align:center}
.msip-ek-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.msip-ek-btn{padding:10px 4px;border-radius:9px;border:.5px solid var(--br2);background:var(--bg2);color:var(--tm);cursor:pointer;text-align:center;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s;line-height:1.4}
.msip-ek-btn.sel{background:var(--gl);color:var(--gd);border-color:var(--g)}
.msip-sepet{background:var(--bg2);border-radius:10px;padding:10px;max-height:130px;overflow-y:auto}
.msip-sep-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--br);font-size:12px}
.msip-sep-item:last-child{border-bottom:none}
.msip-total{display:flex;justify-content:space-between;padding:10px 0 0;font-size:14px;font-weight:600;color:var(--t)}
.msip-gonder{width:100%;margin-top:12px;background:var(--g);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:.5px solid var(--br);display:flex;z-index:90;padding-bottom:env(safe-area-inset-bottom,0px)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 10px;cursor:pointer;color:var(--th);font-size:9px;gap:2px;font-family:'DM Sans',sans-serif;position:relative;transition:color .2s}
.bni.active{color:var(--g)}
.bni-ico{font-size:20px}
.bnbadge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--rd);color:#fff;font-size:8px;min-width:15px;height:15px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px}
.bnbadge.on{display:flex}
.empty-st{text-align:center;padding:50px 20px;color:var(--th)}
.empty-ico{font-size:38px;margin-bottom:10px}
.empty-txt{font-size:13px;line-height:1.6}
.padded{padding:0 10px}

const pad = n=>String(n).padStart(2,'0');
const dateStr = d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const today = ()=>dateStr(new Date());

const ftime = ()=>new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});

const getLast7 = ()=>Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return dateStr(d);});

// ─── BİLDİRİM ────────────────────────────────────────
let _nt=null;
function showNotif(txt,type){
  const b=document.getElementById('notif');if(!b)return;
  b.className='notif show'+(type==='garson'?' garson':'');
  document.getElementById('notif-ico').textContent=type==='garson'?'🔔':'🍽️';
  document.getElementById('notif-txt').textContent=txt;
  if(_nt)clearTimeout(_nt);
  _nt=setTimeout(closeNotif,6000);
  navigator.vibrate&&navigator.vibrate([200,100,200]);
}
window.closeNotif=()=>document.getElementById('notif')?.classList.remove('show');
function startBlink(el){el?.classList.add('blink');setTimeout(()=>el?.classList.remove('blink'),5000);}

// ─── SES ─────────────────────────────────────────────
function playSound(type){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    (type==='garson'?[440,550,440,550]:[600,800,1000,1200]).forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='sine';
      const t0=ac.currentTime+i*0.14;
      g.gain.setValueAtTime(0.3,t0);
      g.gain.exponentialRampToValueAtTime(0.001,t0+0.2);
      o.start(t0);o.stop(t0+0.2);
    });
  }catch(e){}
}

// ─── CLOCK ───────────────────────────────────────────
function updateClock(){
  const el=document.getElementById('tb-clock');
  if(el)el.textContent=new Date().toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,30000);updateClock();

// ─── FİREBASE ────────────────────────────────────────
onValue(ref(db,'orders'),snap=>{
  orders=snap.val()||{};
  const cnt=Object.values(orders).filter(o=>o.date===today()&&o.status!=='kapali').length;
  if(prevOrd!==null&&cnt>prevOrd){
    playSound('order');
    showNotif('Yeni sipariş geldi! 🍽️','siparis');
    startBlink(document.getElementById('bni-siparis'));
  }
  prevOrd=cnt;
  const pending=Object.values(orders).filter(o=>o.status==='hazirlaniyor'&&o.date===today()).length;
  document.getElementById('bnbadge').classList.toggle('on',pending>0);
  if(pending>0)document.getElementById('bnbadge').textContent=pending;
  document.getElementById('dot-orders').classList.toggle('on',pending>0);
  if(activeSub==='orders')renderOrders();
  if(activeHTab==='hesap'&&activePage==='hesap')renderHesap();
  if(activeHTab==='rapor'&&activePage==='hesap')renderRapor();
});

onValue(ref(db,'garson'),snap=>{
  garsonCalls=snap.val()||{};
  const cnt=Object.keys(garsonCalls).length;
  if(prevGar!==null&&cnt>prevGar){
    playSound('garson');
    showNotif('Garson çağrısı var! 🔔','garson');
    startBlink(document.getElementById('bni-siparis'));
  }
  prevGar=cnt;
  document.getElementById('dot-garson').classList.toggle('on',cnt>0);
  if(activeSub==='garson')renderGarson();
});

onValue(ref(db,'menu'),snap=>{
  const data=snap.val();
  if(data)menuData=data;
  if(activePage==='urun')renderUrun();
  if(activeSub==='msip')renderMsip();
});

// ─── SAYFA YÖNLENDİRME ───────────────────────────────
window.gotoPage=p=>{
  activePage=p;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.bni').forEach(el=>el.classList.remove('active'));
  document.getElementById('bni-'+p).classList.add('active');
  const logos={siparis:'📋 Siparişler & Garson',qr:'📱 QR Kodlar',urun:'⚙️ Ürün Yönetimi',hesap:'💳 Hesap & Rapor'};
  document.getElementById('tb-logo').textContent=logos[p];
  document.getElementById('tb-add').style.display=p==='urun'?'block':'none';
  if(p==='qr')renderQR();
  if(p==='urun')setTimeout(renderUrun,50);
  if(p==='hesap'){selDate=today();selMasa=null;renderHesap();}
};

window.doRequestLock=target=>{
  if(sessionStorage.getItem('adm')==='1'){gotoPage(target);return;}
  lockTarget=target;
  document.getElementById('lock-inp').value='';
  document.getElementById('lock-err').classList.remove('on');
  document.getElementById('lock-screen').classList.remove('hidden');
};
window.doCheckPin=()=>{
  if(document.getElementById('lock-inp').value===SIFRE){
    sessionStorage.setItem('adm','1');
    document.getElementById('lock-screen').classList.add('hidden');
    gotoPage(lockTarget);
  } else {
    document.getElementById('lock-err').classList.add('on');
    document.getElementById('lock-inp').value='';
    setTimeout(()=>document.getElementById('lock-err').classList.remove('on'),2000);
  }
};
window.doCancelLock=()=>document.getElementById('lock-screen').classList.add('hidden');

// ─── SİPARİŞ SEKMELER ────────────────────────────────
window.switchSub=sub=>{
  activeSub=sub;
  ['orders','garson','msip'].forEach(t=>{
    document.getElementById('stab-'+t)?.classList.toggle('active',t===sub);
    document.getElementById('sc-'+t)?.classList.toggle('active',t===sub);
  });
  if(sub==='orders'){document.getElementById('dot-orders')?.classList.remove('on');renderOrders();}
  if(sub==='garson'){document.getElementById('dot-garson')?.classList.remove('on');renderGarson();}
  if(sub==='msip'){msipMasa=null;msipSepet=[];msipActiveCat=menuData[0]?.id;renderMsip();}
};

// ─── SİPARİŞLER ──────────────────────────────────────
function renderOrders(){
  const el=document.getElementById('sc-orders');
  const list=Object.values(orders).filter(o=>o.status!=='kapali'&&o.date===today()).sort((a,b)=>b.id.localeCompare(a.id));
  if(!list.length){el.innerHTML=`<div class="empty-st"><div class="empty-ico">🍽️</div><div class="empty-txt">Bugün henüz sipariş yok</div></div>`;return;}
  el.innerHTML=list.map(o=>`
    <div class="ocard">
      <div class="oc-top">
        <div style="display:flex;align-items:center;gap:5px">
          <span class="oc-masa">${o.masa}</span>
          <span class="oc-badge ${o.masaType||'loca'}">${{bungalov:'Bungalov',sezlong:'Şezlong',masa:'Masa',loca:'Loca'}[o.masaType]||'Loca'}</span>
        </div>
        <span class="oc-time">${o.time}</span>
      </div>
      <div class="oc-items">
        ${(o.items||[]).map(i=>`<div style="margin-bottom:3px">
          <span style="font-weight:500">${i.name}</span> <span style="color:var(--tm)">× ${i.qty}</span>
          ${i.options?`<span class="oc-opt">${i.options}</span>`:''}
          ${i.note?`<span class="oc-note">"${i.note}"</span>`:''}
        </div>`).join('')}
      </div>
      <div class="oc-total">₺${o.total}</div>
      <div class="sbtns">
        <button class="sbtn${o.status==='hazirlaniyor'?' s1':''}" onclick="doSetStatus('${o.id}','hazirlaniyor')">⏳ Hazırlanıyor</button>
        <button class="sbtn${o.status==='hazir'?' s2':''}" onclick="doSetStatus('${o.id}','hazir')">✓ Hazırlandı</button>
        <button class="sbtn${o.status==='teslim'?' s3':''}" onclick="doSetStatus('${o.id}','teslim')">✅ Teslim</button>
      </div>
    </div>`).join('');
}
window.doSetStatus=async(id,status)=>await update(ref(db,'orders/'+id),{status});

function renderGarson(){
  const el=document.getElementById('sc-garson');
  const list=Object.values(garsonCalls);
  if(!list.length){el.innerHTML=`<div class="empty-st"><div class="empty-ico">🔔</div><div class="empty-txt">Garson çağrısı yok</div></div>`;return;}
  el.innerHTML=list.map(g=>`
    <div class="gcard">
      <div class="gc-l">
        <div class="gc-ico">🔔</div>
        <div><div class="gc-masa">${g.masa}</div><div class="gc-time">${g.time}</div></div>
      </div>
      <button class="gc-ok" onclick="doDismissGarson('${g.id}')">Tamam</button>
    </div>`).join('');
}
window.doDismissGarson=async id=>await remove(ref(db,'garson/'+id));

// ─── MANUEL SİPARİŞ ──────────────────────────────────
function masaGrid(type){
  const items=MASALAR.filter(m=>m.type===type);
  // 5'li satırlar, son tek eleman ortada
  let rows=[];
  for(let i=0;i<items.length;i+=5){
    rows.push(items.slice(i,i+5));
  }
  return rows.map((row,ri)=>{
    const isLast=ri===rows.length-1&&row.length<5;
    const leftPad=isLast?Math.floor((5-row.length)/2):0;
    let html=`<div class="msip-masa-grid" style="margin-bottom:${ri<rows.length-1?'5px':'0'}">`;
    for(let i=0;i<leftPad;i++)html+=`<div></div>`;
    row.forEach(m=>{
      const sel=msipMasa?.id===m.id;
      html+=`<button class="msip-masa-btn${sel?' sel':''}" onclick="selMsipMasa('${m.id}','${m.name}','${m.type}')">${m.name}</button>`;
    });
    for(let i=0;i<(5-row.length-leftPad);i++)html+=`<div></div>`;
    html+=`</div>`;
    return html;
  }).join('');
}

function renderMsip(){
  const el=document.getElementById('sc-msip');
  if(!el)return;

  const groups=[
    {label:'Bungalovlar',type:'bungalov'},
    {label:'Localar',type:'loca'},
    {label:'Şezlonglar',type:'sezlong'},
    {label:'Masalar',type:'masa'},
  ];

  const masaHtml=groups.map(g=>`
    <div class="msip-masa-group">
      <div class="msip-masa-lbl">${g.label}</div>
      ${masaGrid(g.type)}
    </div>`).join('');

  const catHtml=menuData.map(c=>
    `<button class="msip-cat-btn${msipActiveCat===c.id?' active':''}" onclick="selMsipCat('${c.id}')">${c.emoji} ${c.name}</button>`
  ).join('');

  const cat=menuData.find(c=>c.id===msipActiveCat);
  const urunHtml=(cat?.items||[]).filter(u=>!u.soldOut).map(u=>{
    const inCart=msipSepet.find(s=>s.id===u.id);
    const qty=inCart?inCart.qty:0;
    return `<div class="msip-urun">
      <div class="msip-urun-img">
        ${u.img?`<img src="${u.img}" alt="${u.name}">`:`<span>${u.emoji||'🍽️'}</span>`}
      </div>
      <div class="msip-urun-body">
        <div class="msip-urun-ad">${u.name}</div>
        <div class="msip-urun-fiyat">₺${u.price}</div>
      </div>
      <div class="msip-qty">
        ${qty>0?`<button class="msip-qb" onclick="msipQty('${u.id}',-1)">−</button><span class="msip-qn">${qty}</span>`:''}
        <button class="msip-qb" style="background:var(--gl);color:var(--gd);border-color:var(--g)" onclick="msipQty('${u.id}',1,'${u.name}',${u.price})">+</button>
      </div>
    </div>`;
  }).join('');

  const ekHtml=KALEMLER.map(k=>{
    const inCart=msipSepet.find(s=>s.id===k.id);
    const qty=inCart?inCart.qty:0;
    return `<button class="msip-ek-btn${qty>0?' sel':''}" onclick="msipQty('${k.id}',1,'${k.name}',${k.price})">
      ${k.emoji}<br>${k.name}<br><span style="font-size:10px">₺${k.price.toLocaleString('tr-TR')}${qty>0?' × '+qty:''}</span>
    </button>`;
  }).join('');

  const sepetHtml=msipSepet.length
    ?msipSepet.map((s,i)=>`<div class="msip-sep-item">
        <span>${s.name} × ${s.qty}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-weight:500;color:var(--g)">₺${s.price*s.qty}</span>
          <button onclick="msipDel(${i})" style="background:none;border:none;color:var(--th);cursor:pointer;font-size:13px">✕</button>
        </div>
      </div>`).join('')
    :'<div style="font-size:12px;color:var(--th);text-align:center;padding:10px">Henüz ürün eklenmedi</div>';

  const total=msipSepet.reduce((s,i)=>s+i.price*i.qty,0);

  el.innerHTML=`
    ${masaHtml}
    <div style="margin-top:8px">
      <div class="fl" style="margin-bottom:4px">Kategori</div>
      <div class="msip-cat-row">${catHtml}</div>
    </div>
    <div style="margin-top:8px">
      <div class="fl" style="margin-bottom:6px">Ürünler</div>
      ${urunHtml}
    </div>
    <div style="margin-top:8px">
      <div class="fl" style="margin-bottom:6px">Ek Kalemler</div>
      <div class="msip-ek-grid">${ekHtml}</div>
    </div>
    <div style="margin-top:10px">
      <div class="fl" style="margin-bottom:6px">Sepet</div>
      <div class="msip-sepet">${sepetHtml}</div>
      <div class="msip-total"><span>Toplam</span><span>₺${total}</span></div>
    </div>
    <button class="msip-gonder" onclick="doManuelSiparis()">✓ Siparişi Gönder</button>`;
}

window.selMsipMasa=(id,name,type)=>{msipMasa={id,name,type};renderMsip();};
window.selMsipCat=(id)=>{msipActiveCat=id;renderMsip();};
window.msipQty=(id,delta,name,price)=>{
  const idx=msipSepet.findIndex(s=>s.id===id);
  if(idx===-1&&delta>0)msipSepet.push({id,name,price,qty:1});
  else if(idx!==-1){msipSepet[idx].qty+=delta;if(msipSepet[idx].qty<=0)msipSepet.splice(idx,1);}
  renderMsip();
};
window.msipDel=(i)=>{msipSepet.splice(i,1);renderMsip();};
window.doManuelSiparis=async()=>{
  if(!msipMasa){alert('Masa seçin');return;}
  if(!msipSepet.length){alert('Sepet boş');return;}
  const total=msipSepet.reduce((s,i)=>s+i.price*i.qty,0);
  const r=push(ref(db,'orders'));
  await set(r,{id:r.key,masa:msipMasa.name,masaId:msipMasa.id,masaType:msipMasa.type,time:ftime(),date:today(),items:msipSepet.map(i=>({name:i.name,price:i.price,qty:i.qty,options:'',note:''})),status:'hazirlaniyor',total,kaynakAdmin:true});
  alert('✓ Sipariş oluşturuldu!');
  msipMasa=null;msipSepet=[];
  switchSub('orders');
};

// ─── QR ──────────────────────────────────────────────
function renderQR(){
  const el=document.getElementById('qbody');
  const groups=[
    {title:'Bungalovlar (5)', items:MASALAR.filter(m=>m.type==='bungalov')},
    {title:'Localar (11)',    items:MASALAR.filter(m=>m.type==='loca')},
    {title:'Şezlonglar (11)',items:MASALAR.filter(m=>m.type==='sezlong')},

    <div class="qgrid">${g.items.map(m=>`
      <div class="qcard">
        <div id="qr-${m.id}" style="display:flex;justify-content:center"></div>
        <div class="qcard-name">${m.name}</div>
        <div class="qcard-url">${BASE}?masa=${m.id}</div>
      </div>`).join('')}

// ─── HESAP ───────────────────────────────────────────
window.switchHTab=tab=>{
  activeHTab=tab;
  ['hesap','rapor'].forEach(t=>{
    document.getElementById('stab-'+t).classList.toggle('active',t===tab);
    document.getElementById('sc-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='hesap'){selMasa=null;renderHesap();}
  if(tab==='rapor')renderRapor();
};

function dateSelector(fn){
  const days=getLast7();
  if(!selDate)selDate=days[0];
  return `<div class="date-row">${days.map(d=>`<button class="dpill${d===selDate?' active':''}" onclick="${fn}('${d}')">${d===today()?'Bugün':fmtD(d)}</button>`).join('')}</div>`;
}

function renderHesap(){
  const el=document.getElementById('sc-hesap');
  if(selMasa){
    // Hesap kapatılmamış TÜM siparişler - tarih sınırı yok, günler birikir
    const masaOrds=Object.values(orders).filter(o=>o.masaId===selMasa.id&&o.status!=='kapali');
    const tarihler=[...new Set(masaOrds.map(o=>o.date))].sort();

    const itemMap={};
    masaOrds.forEach(o=>{
      if(!o.items)return;
      o.items.forEach(i=>{
        const key=i.name+(i.options?'|'+i.options:'');
        if(!itemMap[key])itemMap[key]={name:i.name,options:i.options||'',qty:0,total:0};
        itemMap[key].qty+=Number(i.qty)||1;
        itemMap[key].total+=(Number(i.price)||0)*(Number(i.qty)||1);
      });
    });

    const kalemMap={};
    masaOrds.forEach(o=>{
      if(!o._kalemler)return;
      o._kalemler.forEach(k=>{
        if(!kalemMap[k.name])kalemMap[k.name]={name:k.name,qty:0,total:0};
        kalemMap[k.name].qty+=k.qty||1;
        kalemMap[k.name].total+=k.price*(k.qty||1);
      });
    });

    const sipTot=masaOrds.reduce((s,o)=>s+(Number(o.total)||0),0);
    const ekTot=masaOrds.reduce((s,o)=>s+(Number(o._kalemTotal)||0),0);
    const genelTot=sipTot+ekTot;
    const itemRows=Object.values(itemMap);
    const kalemRows=Object.values(kalemMap);

    el.innerHTML=`
      <button class="hd-back" onclick="selMasa=null;renderHesap()">← Geri</button>
      <div class="hd-title">${selMasa.name}</div>
      ${tarihler.length>1?`<div style="font-size:11px;color:var(--am);background:var(--aml);padding:7px 10px;border-radius:8px;margin-bottom:12px">⚠️ ${tarihler.length} günden birikmiş (${fmtD(tarihler[0])} — ${fmtD(tarihler[tarihler.length-1])})</div>`:`<div class="hd-date">${tarihler[0]?fmtD(tarihler[0]):today()}</div>`}

      <div class="hd-sec">Sipariş Detayı</div>
      ${itemRows.length?itemRows.map(r=>`
        <div class="hd-row">
          <div class="hd-rn">${r.name}${r.options?` <span style="font-size:10px;color:#6B35A8">(${r.options})</span>`:''} × ${r.qty}</div>
          <span class="hd-rp">₺${r.total.toLocaleString('tr-TR')}</span>
        </div>`).join(''):'<div style="font-size:12px;color:var(--th);padding:8px 0">Sipariş yok</div>'}

      ${kalemRows.length?`
        <div class="hd-sec">Ek Kalemler</div>
        ${kalemRows.map(r=>`
          <div class="hd-row">
            <span class="hd-rn" style="color:var(--amd)">${r.name} × ${r.qty}</span>
            <span class="hd-rp" style="color:var(--amd)">₺${r.total.toLocaleString('tr-TR')}</span>
          </div>`).join('')}`:''}

      <div class="hd-sec">Kalem Ekle</div>
      <div class="kalem-btns">
        ${KALEMLER.map(k=>`<button class="kalem-btn" onclick="doAddKalem('${selMasa.id}','${k.name}',${k.price})">+ ${k.name}<br><small>₺${k.price.toLocaleString('tr-TR')}</small></button>`).join('')}
      </div>

      <div class="hd-total-box">
        <span class="hd-total-lbl">Genel Toplam</span>
        <span class="hd-total-val">₺${genelTot.toLocaleString('tr-TR')}</span>
      </div>

      ${masaOrds.length?`<button class="odeme-btn" onclick="doOdemeKapat('${selMasa.id}')">✓ Ödeme Alındı — Hesabı Kapat</button>`:''}
    `;
    return;
  }

  // Kapanmamış siparişi olan tüm masalar (tarih sınırı yok)
  const aktif=MASALAR.filter(m=>Object.values(orders).some(o=>o.masaId===m.id&&o.status!=='kapali'));
  el.innerHTML=dateSelector('doSetHesapDate')+(aktif.length?
    `<div style="font-size:11px;color:var(--th);margin:6px 0 10px">Açık hesap için masa seçin</div>`+
    aktif.map(m=>{
      const mOrds=Object.values(orders).filter(o=>o.masaId===m.id&&o.status!=='kapali');
      const sip=mOrds.reduce((s,o)=>s+(Number(o.total)||0),0);
      const ek=mOrds.reduce((s,o)=>s+(Number(o._kalemTotal)||0),0);
      const tarihler=[...new Set(mOrds.map(o=>o.date))];
      return `<div class="hmcard" onclick="doSelectMasa('${m.id}')">
        <div>
          <div class="hm-name">${m.name}</div>
          <div class="hm-cnt">${mOrds.length} sipariş${tarihler.length>1?` · ${tarihler.length} gün`:''}</div>
        </div>
        <div class="hm-tot">₺${(sip+ek).toLocaleString('tr-TR')}</div>
      </div>`;
    }).join(''):
    `<div class="empty-st"><div class="empty-ico">💳</div><div class="empty-txt">Açık hesap yok</div></div>`
  );
}

window.doSetHesapDate=d=>{selDate=d;selMasa=null;renderHesap();};
window.doSelectMasa=id=>{const m=MASALAR.find(x=>x.id===id);if(m){selMasa=m;renderHesap();}};
window.doAddKalem=async(masaId,name,price)=>{
  const mOrds=Object.values(orders).filter(o=>o.masaId===masaId&&o.status!=='kapali');
  if(!mOrds.length){alert('Aktif sipariş yok');return;}
  const ord=mOrds[0];
  const kalemler=[...(ord._kalemler||[]),{name,price,qty:1}];
  const kalemTotal=kalemler.reduce((s,k)=>s+k.price*(k.qty||1),0);
  await update(ref(db,'orders/'+ord.id),{_kalemler:kalemler,_kalemTotal:kalemTotal});
};
window.doOdemeKapat=async masaId=>{
  if(!confirm('Ödeme alındı ve hesap kapatılsın mı?'))return;
  const mOrds=Object.values(orders).filter(o=>o.masaId===masaId&&o.status!=='kapali');
  for(const o of mOrds)await update(ref(db,'orders/'+o.id),{status:'kapali'});
  selMasa=null;renderHesap();
};

// ─── RAPOR ───────────────────────────────────────────
function renderRapor(){
  const el=document.getElementById('sc-rapor');
  const list=Object.values(orders).filter(o=>o.date===selDate);
  const kapatilan=list.filter(o=>o.status==='kapali');
  const ciro=kapatilan.reduce((s,o)=>s+(Number(o.total)||0)+(Number(o._kalemTotal)||0),0);
  const acik=list.filter(o=>o.status!=='kapali').reduce((s,o)=>s+(Number(o.total)||0)+(Number(o._kalemTotal)||0),0);
  const uc={};
  list.forEach(o=>o.items&&o.items.forEach(i=>{if(!uc[i.name])uc[i.name]=0;uc[i.name]+=Number(i.qty)||1;}));
  const top=Object.entries(uc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  el.innerHTML=dateSelector('doSetRaporDate')+`
    <div class="rapor-card" style="margin-top:8px">
      <div style="font-size:12px;font-weight:500;color:var(--tm);margin-bottom:10px">📊 ${selDate===today()?'Bugün':fmtD(selDate)}</div>
      <div class="r-row"><span class="r-lbl">Toplam Sipariş</span><span class="r-val">${list.length}</span></div>
      <div class="r-row"><span class="r-lbl">Tahsil Edilen</span><span class="r-val green">₺${ciro.toLocaleString('tr-TR')}</span></div>
      <div class="r-row"><span class="r-lbl">Açık Hesaplar</span><span class="r-val">₺${acik.toLocaleString('tr-TR')}</span></div>
      <div class="r-row"><span class="r-lbl">Toplam Ciro</span><span class="r-val green">₺${(ciro+acik).toLocaleString('tr-TR')}</span></div>
    </div>
    ${top.length?`<div class="rapor-card">
      <div style="font-size:12px;font-weight:500;color:var(--tm);margin-bottom:10px">🏆 En Çok Satanlar</div>
      ${top.map(([n,q],i)=>`<div class="r-row"><span class="r-lbl">${i+1}. ${n}</span><span class="r-val">${q} adet</span></div>`).join('')}
    </div>`:''}`;
}
window.doSetRaporDate=d=>{selDate=d;renderRapor();};

// ─── ÜRÜNLER ─────────────────────────────────────────
function renderUrun(){
  const el=document.getElementById('ubody');
  if(!menuData||!menuData.length){el.innerHTML='<div class="empty-st"><div class="empty-ico">⏳</div><div class="empty-txt">Yükleniyor...</div></div>';return;}
  el.innerHTML=menuData.map(cat=>`
    <div>
      <div class="ucat-hd">
        <div class="ucat-nm">${cat.emoji} ${cat.name} (${(cat.items||[]).length})</div>
        <button class="ucat-add" onclick="openAddModal('${cat.id}')">+ Ekle</button>
      </div>
      ${(cat.items||[]).map((item,idx)=>`
        <div class="ucard" draggable="true" id="uc-${cat.id}-${idx}"
          ondragstart="doDragStart('${cat.id}',${idx})"
          ondragover="doDragOver(event)"
          ondrop="doDragDrop('${cat.id}',${idx})"
          ondragend="doDragEnd()">
          <div class="drag-h">⠿</div>
          <div class="uc-img" onclick="document.getElementById('uimg-${item.id}').click()">
            ${item.img?`<img src="${item.img}" alt="${item.name}">`:`<span>${item.emoji||'🍽️'}</span>`}
            <div class="uc-img-ov">📷</div>
          </div>
          <input type="file" accept="image/*" id="uimg-${item.id}" style="display:none" onchange="doUrunImg('${item.id}',this)">
          <div class="uc-body">
            <div class="uc-nm">${item.name}</div>
            <div class="uc-pr">₺${item.price}${item.price2?' / Menü ₺'+item.price2:''}</div>
            ${item.options?.length?`<div class="uc-opts">🎯 ${item.options.map(o=>o.label+': '+o.choices.join(', ')).join(' | ')}</div>`:''}
          </div>
          <div class="uc-acts">
            <button class="edit-btn" onclick="openEditModal('${item.id}')">Düzenle</button>
            <button class="stoggle ${item.soldOut?'sold':'ok'}" onclick="doToggleSold('${item.id}')">${item.soldOut?'Tükendi':'Mevcut'}</button>
            <button class="del-btn" onclick="doDelItem('${item.id}')">🗑️</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

window.doDragStart=(c,i)=>{dSrcCat=c;dSrcIdx=i;setTimeout(()=>document.getElementById(`uc-${c}-${i}`)?.classList.add('dragging'),0);};
window.doDragOver=e=>e.preventDefault();
window.doDragDrop=async(c,i)=>{
  if(dSrcCat===null||dSrcIdx===null)return;
  if(dSrcCat===c&&dSrcIdx===i){dSrcCat=null;dSrcIdx=null;return;}
  const src=menuData.find(x=>x.id===dSrcCat),dst=menuData.find(x=>x.id===c);
  if(!src||!dst)return;
  const [item]=src.items.splice(dSrcIdx,1);dst.items.splice(i,0,item);
  dSrcCat=null;dSrcIdx=null;
  await set(ref(db,'menu'),menuData);
};
window.doDragEnd=()=>document.querySelectorAll('.ucard').forEach(el=>el.classList.remove('dragging'));

window.doUrunImg=(id,input)=>{
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=async()=>{
      const canvas=document.createElement('canvas');
      const MAX=400;let w=img.width,h=img.height;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const comp=canvas.toDataURL('image/jpeg',0.75);
      for(const c of menuData){const it=c.items?.find(i=>i.id==id);if(it){it.img=comp;break;}}
      await set(ref(db,'menu'),menuData);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
};
window.doToggleSold=async id=>{for(const c of menuData){const it=c.items?.find(i=>i.id==id);if(it){it.soldOut=!it.soldOut;break;}}await set(ref(db,'menu'),menuData);};
window.doDelItem=async id=>{
  if(!confirm('Bu ürünü silmek istiyor musunuz?'))return;
  for(const c of menuData){const idx=c.items?.findIndex(i=>i.id==id);if(idx!==-1){c.items.splice(idx,1);break;}}
  await set(ref(db,'menu'),menuData);
};

// ─── ÜRÜN MODAL ──────────────────────────────────────
function fillCatSelect(selCatId){document.getElementById('fcat').innerHTML=menuData.map(c=>`<option value="${c.id}"${c.id===selCatId?' selected':''}>${c.emoji} ${c.name}</option>`).join('');}

window.openAddModal=catId=>{
  editId=null;ogList=[];
  document.getElementById('urun-modal-ttl').textContent='Ürün Ekle';
  document.getElementById('edit-id').value='';
  ['fn','fd','fp','fp2','femo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fpop').value='0';
  document.getElementById('fimg').value='';
  document.getElementById('fimg-prev').style.display='none';
  fillCatSelect(catId||menuData[0]?.id);
  renderOGList();
  document.getElementById('urun-ov').classList.add('open');
};
window.openEditModal=id=>{
  let foundItem=null,foundCat=null;
  for(const c of menuData){const it=c.items?.find(i=>i.id==id);if(it){foundItem=it;foundCat=c;break;}}
  if(!foundItem)return;
  editId=id;ogList=JSON.parse(JSON.stringify(foundItem.options||[]));
  document.getElementById('urun-modal-ttl').textContent='Ürün Düzenle';
  document.getElementById('edit-id').value=id;
  document.getElementById('fn').value=foundItem.name||'';
  document.getElementById('fd').value=foundItem.desc||'';
  document.getElementById('fp').value=foundItem.price||0;
  document.getElementById('fp2').value=foundItem.price2||'';
  document.getElementById('femo').value=foundItem.emoji||'';
  document.getElementById('fpop').value=foundItem.popular?'1':'0';
  document.getElementById('fimg').value=foundItem.img||'';
  const prev=document.getElementById('fimg-prev');
  if(foundItem.img){prev.src=foundItem.img;prev.style.display='block';}else prev.style.display='none';
  fillCatSelect(foundCat.id);
  renderOGList();
  document.getElementById('urun-ov').classList.add('open');
};
window.closeUrunModal=()=>document.getElementById('urun-ov').classList.remove('open');

function syncOG(){ogList.forEach((g,gi)=>{const l=document.getElementById(`og-l-${gi}`),r=document.getElementById(`og-r-${gi}`);if(l)g.label=l.value;if(r)g.required=r.value==='1';});}
window.doAddOG=()=>{syncOG();ogList.push({label:'',choices:[],required:true});renderOGList();};
window.doDelOG=idx=>{syncOG();ogList.splice(idx,1);renderOGList();};
window.doAddChoice=idx=>{syncOG();const inp=document.getElementById(`og-inp-${idx}`);const val=inp?.value.trim();if(!val)return;ogList[idx].choices.push(val);inp.value='';renderOGList();};
window.doDelChoice=(gi,ci)=>{syncOG();ogList[gi].choices.splice(ci,1);renderOGList();};
function renderOGList(){
  const el=document.getElementById('og-list');
  el.innerHTML=ogList.map((g,gi)=>`
    <div class="og-wrap">
      <div class="og-top">
        <input class="og-inp" id="og-l-${gi}" placeholder="Grup adı (örn. Aroma)" value="${g.label}">
        <select class="og-req" id="og-r-${gi}">
          <option value="1" ${g.required?'selected':''}>Zorunlu</option>
          <option value="0" ${!g.required?'selected':''}>İsteğe bağlı</option>
        </select>
        <button class="og-del" onclick="doDelOG(${gi})">Sil</button>
      </div>
      <div class="og-chips">${g.choices.map((ch,ci)=>`<div class="og-chip"><span>${ch}</span><button class="chip-x" onclick="doDelChoice(${gi},${ci})">×</button></div>`).join('')}</div>
      <div class="og-row">
        <input class="og-ch-inp" id="og-inp-${gi}" placeholder="Seçenek ekle..." onkeydown="if(event.key==='Enter'){event.preventDefault();doAddChoice(${gi})}">
        <button class="og-ch-add" onclick="doAddChoice(${gi})">Ekle</button>
      </div>
    </div>`).join('');
}
window.doHandleImg=input=>{
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=400;let w=img.width,h=img.height;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const comp=canvas.toDataURL('image/jpeg',0.75);
      document.getElementById('fimg').value=comp;
      const prev=document.getElementById('fimg-prev');
      prev.src=comp;prev.style.display='block';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
};
window.doSaveProduct=async()=>{
  syncOG();
  const name=document.getElementById('fn').value.trim();
  if(!name){alert('Ürün adı gerekli');return;}
  const catId=document.getElementById('fcat').value;
  const price=parseInt(document.getElementById('fp').value)||0;
  const p2v=document.getElementById('fp2').value;
  const price2=p2v?parseInt(p2v):null;
  const desc=document.getElementById('fd').value.trim();
  const emoji=document.getElementById('femo').value||'🍽️';
  const popular=document.getElementById('fpop').value==='1';
  const img=document.getElementById('fimg').value;
  const options=ogList.filter(g=>g.label.trim()&&g.choices.length>0);
  if(editId){
    let foundItem=null,foundCat=null;
    for(const c of menuData){const it=c.items?.find(i=>i.id==editId);if(it){foundItem=it;foundCat=c;break;}}
    if(!foundItem)return;
    foundItem.name=name;foundItem.desc=desc;foundItem.price=price;foundItem.price2=price2;
    foundItem.emoji=emoji;foundItem.popular=popular;foundItem.options=options;
    if(img)foundItem.img=img;
    if(foundCat.id!==catId){
      foundCat.items.splice(foundCat.items.indexOf(foundItem),1);
      const dst=menuData.find(c=>c.id===catId);
      if(dst){if(!dst.items)dst.items=[];dst.items.push(foundItem);}
    }
  } else {
    const cat=menuData.find(c=>c.id===catId);if(!cat)return;
    if(!cat.items)cat.items=[];
    cat.items.push({id:'u'+Date.now(),name,desc,price,price2,emoji,popular,soldOut:false,img,options});
  }
  await set(ref(db,'menu'),menuData);
  document.getElementById('urun-ov').classList.remove('open');
};
</script>
