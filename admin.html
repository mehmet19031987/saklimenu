<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Saklıdoğa — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;--gddd:#04342C;
  --am:#BA7517;--aml:#FAEEDA;--amd:#854F0B;
  --rd:#E24B4A;--rdl:#FCEBEB;
  --bg:#fff;--bg2:#f7f7f5;
  --t:#1a1a1a;--tm:#666;--th:#aaa;
  --br:rgba(0,0,0,0.08);--br2:rgba(0,0,0,0.16)
}
html,body{min-height:100%;background:var(--bg2)}
body{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--t);padding-bottom:72px}

/* TOPBAR */
.topbar{background:var(--gddd);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-logo{font-family:'Playfair Display',serif;font-size:17px;color:#9FE1CB}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-clock{font-size:10px;color:rgba(159,225,203,.45)}
.tb-btn{background:#9FE1CB;color:#04342C;border:none;border-radius:7px;padding:5px 11px;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;display:none}
.nb{background:var(--rd);color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;display:none}
.nb.on{display:inline-block;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* PAGE */
.page{display:none}.page.active{display:block}

/* TABS */
.stabs{display:flex;gap:6px;padding:10px 10px 4px;overflow-x:auto;scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:8px 14px;font-size:12px;border:.5px solid var(--br2);border-radius:8px;cursor:pointer;color:var(--tm);background:var(--bg);font-family:'DM Sans',sans-serif;white-space:nowrap;position:relative;transition:all .2s}
.stab.active{background:var(--g);color:#fff;border-color:var(--g);font-weight:500}
.sdot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--rd);border-radius:50%;display:none}
.sdot.on{display:block}
.scontent{display:none;padding:8px 10px 0}
.scontent.active{display:block}

/* SİPARİŞ */
.ocard{background:var(--bg);border:.5px solid var(--br);border-radius:13px;padding:12px 14px;margin-bottom:8px}
.oc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.oc-masa{font-size:15px;font-weight:600;color:var(--t)}
.oc-time{font-size:10px;color:var(--th)}
.oc-tip{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:500;margin-left:5px}
.oc-tip.loca{background:#E6F1FB;color:#185FA5}
.oc-tip.sezlong{background:var(--aml);color:var(--amd)}
.oc-tip.bungalov{background:var(--gl);color:var(--gd)}
.oc-tip.masa{background:#F3F0FB;color:#5B35A8}
.oc-items{font-size:12px;color:var(--tm);line-height:1.9;margin-bottom:6px}
.oc-opt{font-size:10px;color:#6B35A8;background:#F0E6FB;padding:2px 7px;border-radius:5px;margin-left:4px}
.oc-note{font-size:10px;color:var(--am);background:var(--aml);padding:2px 7px;border-radius:5px;margin-left:4px;font-style:italic}
.oc-total{font-size:14px;font-weight:600;color:var(--g);margin-bottom:8px}
.sbtns{display:flex;gap:5px}
.sbtn{flex:1;padding:8px 2px;font-size:11px;border-radius:8px;border:.5px solid var(--br2);background:var(--bg2);color:var(--tm);cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s}
.sbtn.s1{background:#FFF8E6;color:var(--am);border-color:var(--am);font-weight:500}
.sbtn.s2{background:var(--gl);color:var(--gd);border-color:var(--g);font-weight:500}
.sbtn.s3{background:#E1F5EE;color:var(--gddd);border-color:var(--gddd);font-weight:500}

/* GARSON */
.gcard{background:var(--aml);border:.5px solid var(--am);border-radius:13px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.gc-l{display:flex;align-items:center;gap:10px}
.gc-ico{width:36px;height:36px;background:var(--am);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.gc-masa{font-size:13px;font-weight:500;color:var(--amd)}
.gc-time{font-size:10px;color:var(--am);margin-top:1px}
.gc-ok{background:var(--am);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* QR */
.qsec{font-size:11px;font-weight:500;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;padding:0 10px}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 10px;margin-bottom:4px}
.qcard{background:var(--bg);border:.5px solid var(--br);border-radius:12px;padding:12px 10px;text-align:center}
.qcard-nm{font-size:11px;font-weight:500;color:var(--t);margin-top:6px;margin-bottom:2px}
.qcard-url{font-size:8px;color:var(--th);word-break:break-all}
.qprint{display:flex;align-items:center;justify-content:center;gap:7px;margin:14px 10px 4px;padding:13px;background:var(--g);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;width:calc(100% - 20px)}

/* HESAP */
.date-row{display:flex;gap:6px;padding:8px 0 4px;overflow-x:auto;scrollbar-width:none}
.date-row::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:5px 12px;border-radius:20px;border:.5px solid var(--br2);background:var(--bg);color:var(--tm);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s}
.dpill.active{background:var(--g);color:#fff;border-color:var(--g);font-weight:500}
.hmcard{background:var(--bg);border:.5px solid var(--br);border-radius:12px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .2s}
.hmcard:active{border-color:var(--g)}
.hm-name{font-size:14px;font-weight:600;color:var(--t)}
.hm-cnt{font-size:11px;color:var(--tm);margin-top:2px}
.hm-tot{font-size:15px;font-weight:600;color:var(--g)}
.hd-back{display:flex;align-items:center;gap:6px;background:var(--bg);border:.5px solid var(--br2);color:var(--t);font-size:13px;cursor:pointer;padding:8px 14px;font-family:'DM Sans',sans-serif;border-radius:9px;margin-bottom:12px;width:fit-content}
.hd-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--t);margin-bottom:4px}
.hd-date{font-size:11px;color:var(--tm);margin-bottom:14px}
.hd-sec{font-size:11px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 7px}
.hd-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--br);font-size:13px}
.hd-rn{color:var(--t);flex:1}
.hd-rp{font-weight:500;color:var(--g);margin-left:8px;flex-shrink:0}
.hd-sil{background:var(--rdl);color:var(--rd);border:none;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-left:6px;flex-shrink:0}
.hd-total-box{background:var(--gddd);border-radius:12px;padding:14px 16px;margin-top:14px;display:flex;justify-content:space-between;align-items:center}
.hd-tl{font-size:13px;color:rgba(159,225,203,.8)}
.hd-tv{font-size:20px;font-weight:600;color:#9FE1CB}
.kalem-btns{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.kalem-btn{padding:9px 12px;border:.5px solid var(--g);border-radius:9px;background:var(--gl);color:var(--gd);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.kapat-btn{width:100%;background:var(--g);color:#fff;border:none;border-radius:13px;padding:14px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px}

/* RAPOR */
.rc{background:var(--bg);border:.5px solid var(--br);border-radius:13px;padding:14px;margin-bottom:8px}
.rr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:.5px solid var(--br)}
.rr:last-child{border-bottom:none}
.rl{font-size:12px;color:var(--tm)}
.rv{font-size:14px;font-weight:600;color:var(--t)}
.rv.green{color:var(--g)}

/* ÜRÜNLER */
.ucat-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 0 6px}
.ucat-nm{font-size:12px;font-weight:500;color:var(--tm)}
.ucat-add{font-size:10px;color:var(--g);background:var(--gl);border:none;border-radius:6px;padding:3px 9px;cursor:pointer;font-family:'DM Sans',sans-serif}
.ucard{background:var(--bg);border:.5px solid var(--br);border-radius:12px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ucard.dragging{opacity:.4}
.drag-h{font-size:20px;color:var(--th);cursor:grab;flex-shrink:0}
.uc-img{width:44px;height:44px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;cursor:pointer;border:.5px solid var(--br);position:relative}
.uc-img img{width:100%;height:100%;object-fit:cover}
.uc-img-ov{position:absolute;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;border-radius:8px;font-size:15px;color:#fff}
.uc-img:hover .uc-img-ov,.uc-img:active .uc-img-ov{display:flex}
.uc-body{flex:1;min-width:0}
.uc-nm{font-size:12px;font-weight:500;color:var(--t);margin-bottom:2px}
.uc-pr{font-size:11px;color:var(--tm)}
.uc-opts{font-size:10px;color:#6B35A8;margin-top:2px}
.uc-acts{display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0}
.stoggle{padding:4px 10px;font-size:10px;border-radius:7px;cursor:pointer;border:.5px solid;font-weight:500;font-family:'DM Sans',sans-serif}
.stoggle.ok{background:var(--gl);color:var(--gd);border-color:var(--g)}
.stoggle.sold{background:var(--rdl);color:var(--rd);border-color:var(--rd)}
.edit-btn{background:var(--bg2);border:.5px solid var(--br2);color:var(--tm);border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.del-btn{background:none;border:none;color:var(--th);cursor:pointer;font-size:14px}

/* ŞİFRE */
.lock{position:fixed;inset:0;background:var(--gddd);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;padding:30px 24px}
.lock.hidden{display:none}
.lock-logo{font-family:'Playfair Display',serif;font-size:24px;color:#9FE1CB}
.lock-sub{font-size:12px;color:rgba(159,225,203,.5);margin-top:-10px}
.lock-box{background:rgba(255,255,255,.08);border:.5px solid rgba(159,225,203,.2);border-radius:16px;padding:24px;width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px}
.lock-inp{width:100%;padding:12px;border-radius:10px;border:.5px solid rgba(159,225,203,.3);background:rgba(255,255,255,.08);color:#9FE1CB;font-size:24px;font-family:'DM Sans',sans-serif;letter-spacing:8px;text-align:center}
.lock-inp:focus{outline:none;border-color:#9FE1CB}
.lock-inp::placeholder{letter-spacing:0;font-size:13px;color:rgba(159,225,203,.3)}
.lock-btn{width:100%;background:#9FE1CB;color:#04342C;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.lock-err{font-size:12px;color:#ff8a8a;text-align:center;display:none}
.lock-err.on{display:block}
.lock-cancel{background:none;border:none;color:rgba(159,225,203,.5);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.ov.open{opacity:1;pointer-events:all}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.ov.open .sheet{transform:translateY(0)}
.shandle{width:36px;height:4px;background:var(--br2);border-radius:2px;margin:14px auto 16px}
.sttl{font-family:'Playfair Display',serif;font-size:18px;padding:0 16px 13px;color:var(--t)}
.sbd{padding:0 16px 28px;display:flex;flex-direction:column;gap:11px}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;color:var(--tm);font-weight:500}
.fi{padding:9px 11px;border:.5px solid var(--br2);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);width:100%}
.fi:focus{outline:none;border-color:var(--g)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.img-up{border:.5px dashed var(--br2);border-radius:8px;padding:16px;text-align:center;cursor:pointer;background:var(--bg2)}
.img-up-ico{font-size:22px;display:block;margin-bottom:5px}
.img-up span{font-size:11px;color:var(--tm)}
.img-prev{width:100%;height:110px;object-fit:cover;border-radius:8px;display:none;margin-top:8px}
.save-btn{background:var(--g);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%}
.og-wrap{background:var(--bg2);border-radius:10px;padding:10px;margin-bottom:8px}
.og-top{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.og-inp{flex:1;font-size:12px;padding:5px 8px;border:.5px solid var(--br2);border-radius:6px;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif}
.og-inp:focus{outline:none;border-color:var(--g)}
.og-req{font-size:11px;padding:4px 6px;border:.5px solid var(--br2);border-radius:6px;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif}
.og-del{background:var(--rdl);color:var(--rd);border:none;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}
.og-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.og-chip{background:var(--bg);border:.5px solid var(--br2);border-radius:6px;padding:4px 8px;font-size:11px;display:flex;align-items:center;gap:4px}
.chip-x{background:none;border:none;color:var(--th);cursor:pointer;font-size:13px;line-height:1;padding:0}
.og-row{display:flex;gap:5px}
.og-ch-inp{flex:1;font-size:12px;padding:5px 8px;border:.5px solid var(--br2);border-radius:6px;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif}
.og-ch-inp:focus{outline:none;border-color:var(--g)}
.og-ch-add{background:var(--gl);color:var(--gd);border:none;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}
.add-og-btn{width:100%;background:var(--bg2);border:.5px dashed var(--br2);border-radius:8px;padding:9px;font-size:12px;color:var(--tm);cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:4px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:.5px solid var(--br);display:flex;z-index:90;padding-bottom:env(safe-area-inset-bottom,0px)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 10px;cursor:pointer;color:var(--th);font-size:9px;gap:2px;font-family:'DM Sans',sans-serif;position:relative;transition:color .2s}
.bni.active{color:var(--g)}
.bni-ico{font-size:20px}
.bnbadge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--rd);color:#fff;font-size:8px;min-width:15px;height:15px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px}
.bnbadge.on{display:flex}
.empty-st{text-align:center;padding:50px 20px;color:var(--th)}
.empty-ico{font-size:36px;margin-bottom:10px}
.empty-txt{font-size:13px;line-height:1.6}
.padded{padding:0 10px}
@media print{.bnav,.topbar,.stabs,.date-row{display:none!important}.qcard{page-break-inside:avoid}}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo" id="tb-logo">Saklıdoğa</div>
  <div class="tb-right">
    <span class="nb" id="nb"></span>
    <div class="tb-clock" id="tb-clock"></div>
    <button class="tb-btn" id="tb-add" onclick="openAddModal(null)">+ Ürün</button>
    <button class="tb-btn" id="tb-kat" onclick="openKatModal()" style="display:none;background:rgba(159,225,203,.15);color:#9FE1CB;border-color:rgba(159,225,203,.3)">+ Kategori</button>
  </div>
</div>

<!-- SİPARİŞLER -->
<div class="page active" id="page-siparis">
  <div class="stabs">
    <div class="stab active" id="stab-orders" onclick="switchSub('orders')">📋 Siparişler <span class="sdot" id="dot-orders"></span></div>
    <div class="stab" id="stab-garson" onclick="switchSub('garson')">🔔 Garson <span class="sdot" id="dot-garson"></span></div>
    <div class="stab" id="stab-msip" onclick="switchSub('msip')">➕ Sipariş Ekle</div>
  </div>
  <div class="scontent active" id="sc-orders"></div>
  <div class="scontent" id="sc-garson"></div>
  <div class="scontent" id="sc-msip" style="padding:10px"></div>
</div>

<!-- QR -->
<div class="page" id="page-qr">
  <div id="qbody" style="padding-bottom:16px"></div>
</div>

<!-- ÜRÜNLER -->
<div class="page" id="page-urun">
  <div style="padding:0 10px 20px" id="ubody"></div>
</div>

<!-- HESAP & RAPOR -->
<div class="page" id="page-hesap">
  <div class="stabs">
    <div class="stab active" id="stab-hesap" onclick="switchHTab('hesap')">💳 Hesap</div>
    <div class="stab" id="stab-rapor" onclick="switchHTab('rapor')">📊 Rapor</div>
  </div>
  <div class="scontent active padded" id="sc-hesap"></div>
  <div class="scontent padded" id="sc-rapor"></div>
</div>

<!-- ŞİFRE -->
<div class="lock hidden" id="lock">
  <div class="lock-logo">Saklıdoğa</div>
  <div class="lock-sub">Yönetici Girişi</div>
  <div class="lock-box">
    <input class="lock-inp" id="lock-inp" type="password" placeholder="••••" maxlength="10"
      onkeydown="if(event.key==='Enter')doCheckPin()">
    <button class="lock-btn" onclick="doCheckPin()">Giriş Yap</button>
    <div class="lock-err" id="lock-err">Hatalı şifre!</div>
    <button class="lock-cancel" onclick="doCancelLock()">← Geri dön</button>
  </div>
</div>

<!-- KATEGORİ MODAL -->
<div class="ov" id="katov" onclick="if(event.target===this)closeKatov()">
  <div class="sheet">
    <div class="shandle"></div>
    <div class="sttl">Kategori Ekle</div>
    <div class="sbd">
      <div class="fg"><label class="fl">Kategori Adı *</label><input class="fi" id="kat-ad" type="text" placeholder="örn. Soğuk İçecekler"></div>
      <div class="fg"><label class="fl">Emoji</label><input class="fi" id="kat-emoji" type="text" placeholder="🥤" maxlength="4"></div>
      <button class="save-btn" onclick="doSaveKat()">Kaydet</button>
    </div>
  </div>
</div>

<!-- ÜRÜN MODAL -->
<div class="ov" id="uov" onclick="if(event.target===this)closeUov()">
  <div class="sheet">
    <div class="shandle"></div>
    <div class="sttl" id="uov-ttl">Ürün Ekle</div>
    <div class="sbd">
      <input type="hidden" id="edit-id">
      <div class="fg"><label class="fl">Ürün Adı *</label><input class="fi" id="fn" type="text" placeholder="örn. Limonata"></div>
      <div class="fg"><label class="fl">Açıklama</label><input class="fi" id="fd" type="text" placeholder="Kısa açıklama"></div>
      <div class="fg"><label class="fl">Kategori</label><select class="fi" id="fcat"></select></div>
      <div class="frow">
        <div class="fg"><label class="fl">Fiyat (₺) *</label><input class="fi" id="fp" type="number" placeholder="0" min="0"></div>
        <div class="fg"><label class="fl">Menü Fiyatı (₺)</label><input class="fi" id="fp2" type="number" placeholder="boş bırak" min="0"></div>
      </div>
      <div class="frow">

function playSound(type) {
  try {
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    (type==='garson'?[440,550,440,550]:[600,800,1000,1200]).forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='sine';
      const t=ac.currentTime+i*0.14;
      g.gain.setValueAtTime(0.3,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
      o.start(t);o.stop(t+0.2);
    });
  } catch(e){}
}

function masaGrid(type) {
  const items=MASALAR.filter(m=>m.type===type);
  let html='';
  for(let i=0;i<items.length;i+=5) {
    const row=items.slice(i,i+5);
    const isLast=(i+row.length)===items.length && row.length<5;
    const lp=isLast?Math.floor((5-row.length)/2):0;
    const rp=isLast?(5-row.length-lp):0;
    html+=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:4px">`;
    for(let p=0;p<lp;p++) html+=`<div></div>`;
    row.forEach(m=>{
      const sel=msipMasa?.id===m.id;
      html+=`<button
        style="padding:7px 2px;border-radius:8px;border:.5px solid ${sel?'var(--g)':'var(--br2)'};background:${sel?'var(--g)':'var(--bg2)'};color:${sel?'#fff':'var(--tm)'};cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif;font-weight:500;text-align:center;line-height:1.3"
        data-mid="${m.id}" data-mname="${m.name}" data-mtype="${m.type}"
        onclick="doSelMasa(this)">${m.name}</button>`;
    });
    for(let p=0;p<rp;p++) html+=`<div></div>`;
    html+=`</div>`;
  }
  return html;
}

      <div style="display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:4px 0">${catHtml}</div>
    </div>

};

  const id=el.dataset.kid, name=el.dataset.kname, price=parseInt(el.dataset.kprice);

};

    <div class="qsec">${g.title}</div>
    <div class="qgrid">${g.items.map(m=>`
      <div class="qcard">
        <div id="qr-${m.id}" style="display:flex;justify-content:center"></div>
        <div class="qcard-nm">${m.name}</div>
        <div class="qcard-url">${BASE}?masa=${m.id}</div>
      </div>`).join('')}
    </div>`).join('')+`<button class="qprint" onclick="window.print()">🖨️ Tümünü Yazdır</button>`;
  setTimeout(()=>{
    MASALAR.forEach(m=>{
      const w=document.getElementById('qr-'+m.id);
      if(w&&window.QRCode) new QRCode(w,{text:BASE+'?masa='+m.id,width:80,height:80,colorDark:'#04342C',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
    });
  },200);
}

// ─── HESAP ───────────────────────────────────────────
window.switchHTab = tab => {
  activeHTab=tab;
  ['hesap','rapor'].forEach(t=>{
    document.getElementById('stab-'+t).classList.toggle('active',t===tab);
    document.getElementById('sc-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='hesap') { hesapMasa=null; renderHesap(); }
  if(tab==='rapor') renderRapor();
};

function renderHesap() {
  const el=document.getElementById('sc-hesap');
  if(!el) return;

  if(hesapMasa) {
    // DETAY
    const mOrds=Object.values(orders).filter(o=>o.masaId===hesapMasa.id&&o.date===selDate&&o.status!=='kapali');

    // Sipariş kalemleri
    const sipItems=[];
    mOrds.forEach(o=>{
      (o.items||[]).forEach(i=>{
        sipItems.push({orderId:o.id,name:i.name+(i.options?` (${i.options})`:''),qty:Number(i.qty)||1,price:Number(i.price)||0,total:(Number(i.price)||0)*(Number(i.qty)||1)});
      });
    });

    // Ek kalemler
    const ekItems=[];
    mOrds.forEach(o=>{
      (o._kalemler||[]).forEach((k,ki)=>{
        ekItems.push({orderId:o.id,ki,name:k.name,qty:k.qty||1,price:k.price,total:k.price*(k.qty||1)});
      });
    });

    const sipTot=mOrds.reduce((s,o)=>s+(Number(o.total)||0),0);
    const ekTot =mOrds.reduce((s,o)=>s+(Number(o._kalemTotal)||0),0);
    const genel =sipTot+ekTot;

    const sipHtml=sipItems.length
      ?sipItems.map((r,ri)=>`
        <div class="hd-row">
          <span class="hd-rn">${r.name} × ${r.qty}</span>
          <span class="hd-rp">${fmtTL(r.total)}</span>
          <button class="hd-sil"
            data-oid="${r.orderId}" data-iname="${r.name.split(' (')[0].replace(/"/g,'')}"
            onclick="doSilSip(this)">Sil</button>
        </div>`).join('')
      :'<div style="font-size:13px;color:var(--th);padding:8px 0">Sipariş yok</div>';

    const ekHtml=ekItems.length
      ?`<div class="hd-sec">Ek Kalemler</div>`+ekItems.map(r=>`
        <div class="hd-row">
          <span class="hd-rn" style="color:var(--amd)">${r.name} × ${r.qty}</span>
          <span class="hd-rp" style="color:var(--amd)">${fmtTL(r.total)}</span>
          <button class="hd-sil" data-oid="${r.orderId}" data-ki="${r.ki}" onclick="doSilEk(this)">Sil</button>
        </div>`).join('')
      :'';

    const kalemBtns=KALEMLER.map(k=>`
      <button class="kalem-btn"
        data-mid="${hesapMasa.id}" data-kname="${k.name}" data-kprice="${k.price}"
        onclick="doAddKalem(this)">${k.emoji} ${k.name}<br><small>${fmtTL(k.price)}</small></button>`).join('');

    el.innerHTML=`
      <button class="hd-back" onclick="doGeriHesap()">← Geri</button>
      <div class="hd-title">${hesapMasa.name}</div>
      <div class="hd-date">${selDate}</div>
      <div class="hd-sec">Sipariş Detayı</div>
      ${sipHtml}
      ${ekHtml}
      <div class="hd-sec">Kalem Ekle</div>
      <div class="kalem-btns">${kalemBtns}</div>
      <div class="hd-total-box">
        <span class="hd-tl">Genel Toplam</span>
        <span class="hd-tv">${fmtTL(genel)}</span>
      </div>
      ${mOrds.length?`<button class="kapat-btn" data-mid="${hesapMasa.id}" onclick="doKapat(this)">✓ Ödeme Alındı — Hesabı Kapat</button>`:''}`;
    return;
  }

  // MASA LİSTESİ
  if(!selDate) selDate=today();
  const days=getLast7();
  let dateHtml=`<div class="date-row">`;
  days.forEach(d=>{
    dateHtml+=`<button class="dpill${d===selDate?' active':''}" data-d="${d}" onclick="doSelDate(this)">${d===today()?'Bugün':d}</button>`;
  });
  dateHtml+=`</div>`;

  const aktif=MASALAR.filter(m=>Object.values(orders).some(o=>o.masaId===m.id&&o.date===selDate&&o.status!=='kapali'));

  let masaHtml='';
  if(aktif.length) {
    masaHtml=`<div style="font-size:12px;color:var(--th);margin:6px 0 10px">Açık hesap için masa seçin</div>`;
    aktif.forEach(m=>{
      const mOrds=Object.values(orders).filter(o=>o.masaId===m.id&&o.date===selDate&&o.status!=='kapali');
      const sip=mOrds.reduce((s,o)=>s+(Number(o.total)||0),0);
      const ek =mOrds.reduce((s,o)=>s+(Number(o._kalemTotal)||0),0);
      masaHtml+=`<div class="hmcard"
        data-mid="${m.id}" data-mname="${m.name}" data-mtype="${m.type}"
        onclick="doSelMasaHesap(this)">
        <div>
          <div class="hm-name">${m.name}</div>
          <div class="hm-cnt">${mOrds.length} sipariş</div>
        </div>
        <div class="hm-tot">${fmtTL(sip+ek)}</div>
      </div>`;
    });
  } else {
    masaHtml=`<div class="empty-st"><div class="empty-ico">💳</div><div class="empty-txt">Açık hesap yok</div></div>`;
  }

  el.innerHTML=dateHtml+masaHtml;
}

window.doSelMasaHesap = el => {
  hesapMasa={id:el.dataset.mid, name:el.dataset.mname, type:el.dataset.mtype};
  renderHesap();
};
window.doGeriHesap = () => { hesapMasa=null; renderHesap(); };
window.doSelDate   = el  => { selDate=el.dataset.d; hesapMasa=null; renderHesap(); };

window.doSilSip = async el => {
  if(!confirm('Bu sipariş kalemini silmek istiyor musunuz?')) return;
  const oid=el.dataset.oid, iname=el.dataset.iname;
  const ord=orders[oid]; if(!ord) return;
  const newItems=(ord.items||[]).filter(i=>i.name!==iname);
  const newTotal=newItems.reduce((s,i)=>s+(Number(i.price)||0)*(Number(i.qty)||1),0);
  if(newItems.length===0) await remove(ref(db,'orders/'+oid));
  else await update(ref(db,'orders/'+oid),{items:newItems,total:newTotal});
};

window.doSilEk = async el => {
  if(!confirm('Bu kalemi silmek istiyor musunuz?')) return;
  const oid=el.dataset.oid, ki=parseInt(el.dataset.ki);
  const ord=orders[oid]; if(!ord||!ord._kalemler) return;
  const newK=ord._kalemler.filter((_,i)=>i!==ki);
  const newKT=newK.reduce((s,k)=>s+k.price*(k.qty||1),0);
  await update(ref(db,'orders/'+oid),{_kalemler:newK,_kalemTotal:newKT});
};

window.doAddKalem = async el => {
  const mid=el.dataset.mid, name=el.dataset.kname, price=parseInt(el.dataset.kprice);
  const mOrds=Object.values(orders).filter(o=>o.masaId===mid&&o.date===selDate&&o.status!=='kapali');
  if(!mOrds.length) { alert('Aktif sipariş yok'); return; }
  const ord=mOrds[0];
  const newK=[...(ord._kalemler||[]),{name,price,qty:1}];
  const newKT=newK.reduce((s,k)=>s+k.price*(k.qty||1),0);
  await update(ref(db,'orders/'+ord.id),{_kalemler:newK,_kalemTotal:newKT});
};

window.doKapat = async el => {
  if(!confirm('Ödeme alındı ve hesap kapatılsın mı?')) return;
  const mid=el.dataset.mid;
  const mOrds=Object.values(orders).filter(o=>o.masaId===mid&&o.date===selDate&&o.status!=='kapali');
  for(const o of mOrds) await update(ref(db,'orders/'+o.id),{status:'kapali'});
  hesapMasa=null; renderHesap();
};

// ─── RAPOR ───────────────────────────────────────────
function renderRapor() {
  const el=document.getElementById('sc-rapor');
  if(!selDate) selDate=today();
  const days=getLast7();
  let dateHtml=`<div class="date-row">`;
  days.forEach(d=>{
    dateHtml+=`<button class="dpill${d===selDate?' active':''}" data-d="${d}" onclick="doSelDateR(this)">${d===today()?'Bugün':d}</button>`;
  });
  dateHtml+=`</div>`;

  const list=Object.values(orders).filter(o=>o.date===selDate);
  const ciro=list.filter(o=>o.status==='kapali').reduce((s,o)=>s+(Number(o.total)||0)+(Number(o._kalemTotal)||0),0);
  const acik=list.filter(o=>o.status!=='kapali').reduce((s,o)=>s+(Number(o.total)||0)+(Number(o._kalemTotal)||0),0);
  const uc={};
  list.forEach(o=>(o.items||[]).forEach(i=>{if(!uc[i.name])uc[i.name]=0;uc[i.name]+=Number(i.qty)||1;}));
  const top=Object.entries(uc).sort((a,b)=>b[1]-a[1]).slice(0,5);

  el.innerHTML=dateHtml+`
    <div class="rc" style="margin-top:8px">
      <div style="font-size:12px;font-weight:500;color:var(--tm);margin-bottom:10px">📊 ${selDate===today()?'Bugün':selDate}</div>
      <div class="rr"><span class="rl">Toplam Sipariş</span><span class="rv">${list.length}</span></div>
      <div class="rr"><span class="rl">Tahsil Edilen</span><span class="rv green">${fmtTL(ciro)}</span></div>
      <div class="rr"><span class="rl">Açık Hesaplar</span><span class="rv">${fmtTL(acik)}</span></div>
      <div class="rr"><span class="rl">Toplam Ciro</span><span class="rv green">${fmtTL(ciro+acik)}</span></div>
    </div>
    ${top.length?`<div class="rc">
      <div style="font-size:12px;font-weight:500;color:var(--tm);margin-bottom:10px">🏆 En Çok Satanlar</div>
      ${top.map(([n,q],i)=>`<div class="rr"><span class="rl">${i+1}. ${n}</span><span class="rv">${q} adet</span></div>`).join('')}
    </div>`:''}`;
}
window.doSelDateR = el => { selDate=el.dataset.d; renderRapor(); };

// ─── ÜRÜNLER ─────────────────────────────────────────
function renderUrun() {
  const el=document.getElementById('ubody');
  if(!menuData||!menuData.length) { el.innerHTML='<div class="empty-st"><div class="empty-ico">⏳</div><div class="empty-txt">Yükleniyor...</div></div>'; return; }
  el.innerHTML=menuData.map(cat=>`
    <div>
      <div class="ucat-hd">
        <div class="ucat-nm">${cat.emoji} ${cat.name} (${(cat.items||[]).length})</div>
        <div style="display:flex;gap:5px">
          <button class="ucat-add" onclick="openAddModal('${cat.id}')">+ Ürün</button>
          <button style="font-size:10px;color:var(--rd);background:var(--rdl);border:.5px solid var(--rd);border-radius:6px;padding:3px 9px;cursor:pointer;font-family:'DM Sans',sans-serif" onclick="doDelKat('${cat.id}')">Sil</button>
        </div>
      </div>
      ${(cat.items||[]).map((item,idx)=>`
        <div class="ucard" draggable="true" id="uc-${cat.id}-${idx}"
          ondragstart="doDragStart('${cat.id}',${idx})"
          ondragover="doDragOver(event)"
          ondrop="doDragDrop('${cat.id}',${idx})"
          ondragend="doDragEnd()">
          <div class="drag-h">⠿</div>
          <div class="uc-img" onclick="document.getElementById('uimg-${item.id}').click()">
            ${item.img?`<img src="${item.img}" alt="${item.name}" loading="lazy">`:`<span>${item.emoji||'🍽️'}</span>`}
            <div class="uc-img-ov">📷</div>
          </div>
          <input type="file" accept="image/*" id="uimg-${item.id}" style="display:none" onchange="doUrunImg('${item.id}',this)">
          <div class="uc-body">
            <div class="uc-nm">${item.name}</div>
            <div class="uc-pr">${fmtTL(item.price)}${item.price2?' / Menü '+fmtTL(item.price2):''}</div>
            ${item.options?.length?`<div class="uc-opts">🎯 ${item.options.map(o=>o.label+': '+o.choices.join(', ')).join(' | ')}</div>`:''}
          </div>
          <div class="uc-acts">
            <button class="edit-btn" onclick="openEditModal('${item.id}')">Düzenle</button>
            <button class="stoggle ${item.soldOut?'sold':'ok'}" onclick="doToggleSold('${item.id}')">${item.soldOut?'Tükendi':'Mevcut'}</button>
            <button class="del-btn" onclick="doDelItem('${item.id}')">🗑️</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

window.doDragStart=(c,i)=>{dSrcCat=c;dSrcIdx=i;setTimeout(()=>document.getElementById(`uc-${c}-${i}`)?.classList.add('dragging'),0);};
window.doDragOver=e=>e.preventDefault();
window.doDragDrop=async(c,i)=>{
  if(dSrcCat===null||dSrcIdx===null)return;
  if(dSrcCat===c&&dSrcIdx===i){dSrcCat=null;dSrcIdx=null;return;}
  const src=menuData.find(x=>x.id===dSrcCat),dst=menuData.find(x=>x.id===c);
  if(!src||!dst)return;
  const [item]=src.items.splice(dSrcIdx,1);
  dst.items.splice(i,0,item);
  dSrcCat=null;dSrcIdx=null;
  await set(ref(db,'menu'),menuData);
};
window.doDragEnd=()=>document.querySelectorAll('.ucard').forEach(el=>el.classList.remove('dragging'));
window.doUrunImg=(id,input)=>{
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=async()=>{
      const canvas=document.createElement('canvas');
      const MAX=250;let w=img.width,h=img.height;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const comp=canvas.toDataURL('image/jpeg',0.55);
      for(const c of menuData){const it=c.items?.find(i=>i.id==id);if(it){it.img=comp;break;}}
      await set(ref(db,'menu'),menuData);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
};
window.doToggleSold=async id=>{for(const c of menuData){const it=c.items?.find(i=>i.id==id);if(it){it.soldOut=!it.soldOut;break;}}await set(ref(db,'menu'),menuData);};
window.doDelItem=async id=>{if(!confirm('Bu ürünü silmek istiyor musunuz?'))return;for(const c of menuData){const idx=c.items?.findIndex(i=>i.id==id);if(idx!==-1){c.items.splice(idx,1);break;}}await set(ref(db,'menu'),menuData);};

// ─── ÜRÜN MODAL ──────────────────────────────────────
function fillCatSel(selId){document.getElementById('fcat').innerHTML=menuData.map(c=>`<option value="${c.id}"${c.id===selId?' selected':''}>${c.emoji} ${c.name}</option>`).join('');}

window.openAddModal=catId=>{
  editId=null;ogList=[];
  document.getElementById('uov-ttl').textContent='Ürün Ekle';
  document.getElementById('edit-id').value='';
  ['fn','fd','fp','fp2','femo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fpop').value='0';
  document.getElementById('fimg').value='';
  document.getElementById('fimg-prev').style.display='none';
  fillCatSel(catId||menuData[0]?.id);
  renderOGList();
  document.getElementById('uov').classList.add('open');
};
window.openEditModal=id=>{
  let fi=null,fc=null;
  for(const c of menuData){const it=c.items?.find(i=>i.id==id);if(it){fi=it;fc=c;break;}}
  if(!fi)return;
  editId=id;ogList=JSON.parse(JSON.stringify(fi.options||[]));
  document.getElementById('uov-ttl').textContent='Ürün Düzenle';
  document.getElementById('edit-id').value=id;
  document.getElementById('fn').value=fi.name||'';
  document.getElementById('fd').value=fi.desc||'';
  document.getElementById('fp').value=fi.price||0;
  document.getElementById('fp2').value=fi.price2||'';
  document.getElementById('femo').value=fi.emoji||'';
  document.getElementById('fpop').value=fi.popular?'1':'0';
  document.getElementById('fimg').value=fi.img||'';
  const prev=document.getElementById('fimg-prev');
  if(fi.img){prev.src=fi.img;prev.style.display='block';}else prev.style.display='none';
  fillCatSel(fc.id);
  renderOGList();
  document.getElementById('uov').classList.add('open');
};
window.closeUov=()=>document.getElementById('uov').classList.remove('open');

function syncOG(){ogList.forEach((g,gi)=>{const l=document.getElementById(`og-l-${gi}`),r=document.getElementById(`og-r-${gi}`);if(l)g.label=l.value;if(r)g.required=r.value==='1';});}
window.doAddOG=()=>{syncOG();ogList.push({label:'',choices:[],required:true});renderOGList();};
window.doDelOG=idx=>{syncOG();ogList.splice(idx,1);renderOGList();};
window.doAddChoice=idx=>{syncOG();const inp=document.getElementById(`og-inp-${idx}`);const val=inp?.value.trim();if(!val)return;ogList[idx].choices.push(val);inp.value='';renderOGList();};
window.doDelChoice=(gi,ci)=>{syncOG();ogList[gi].choices.splice(ci,1);renderOGList();};
function renderOGList(){
  document.getElementById('og-list').innerHTML=ogList.map((g,gi)=>`
    <div class="og-wrap">
      <div class="og-top">
        <input class="og-inp" id="og-l-${gi}" placeholder="Grup adı (örn. Aroma)" value="${g.label}">
        <select class="og-req" id="og-r-${gi}">
          <option value="1" ${g.required?'selected':''}>Zorunlu</option>
          <option value="0" ${!g.required?'selected':''}>İsteğe bağlı</option>
        </select>
        <button class="og-del" onclick="doDelOG(${gi})">Sil</button>
      </div>
      <div class="og-chips">${g.choices.map((ch,ci)=>`<div class="og-chip"><span>${ch}</span><button class="chip-x" onclick="doDelChoice(${gi},${ci})">×</button></div>`).join('')}</div>
      <div class="og-row">
        <input class="og-ch-inp" id="og-inp-${gi}" placeholder="Seçenek ekle..." onkeydown="if(event.key==='Enter'){event.preventDefault();doAddChoice(${gi})}">
        <button class="og-ch-add" onclick="doAddChoice(${gi})">Ekle</button>
      </div>
    </div>`).join('');
}
window.doHandleImg=input=>{
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=250;let w=img.width,h=img.height;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const comp=canvas.toDataURL('image/jpeg',0.55);
      document.getElementById('fimg').value=comp;
      const prev=document.getElementById('fimg-prev');
      prev.src=comp;prev.style.display='block';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
};
window.openKatModal = () => {
  document.getElementById('kat-ad').value='';
  document.getElementById('kat-emoji').value='';
  document.getElementById('katov').classList.add('open');
};
window.closeKatov = () => document.getElementById('katov').classList.remove('open');
window.doSaveKat = async () => {
  const ad = document.getElementById('kat-ad').value.trim();
  if(!ad) { alert('Kategori adı gerekli'); return; }
  const emoji = document.getElementById('kat-emoji').value || '🍽️';
  const id = 'cat-' + Date.now();
  menuData.push({id, name:ad, emoji, items:[]});
  await set(ref(db,'menu'), menuData);
  document.getElementById('katov').classList.remove('open');
};
window.doDelKat = async id => {
  const cat = menuData.find(c=>c.id===id);
  if(!cat) return;
  if((cat.items||[]).length > 0) {
    if(!confirm(`"${cat.name}" kategorisinde ${cat.items.length} ürün var. Hepsi silinecek. Emin misin?`)) return;
  } else {
    if(!confirm(`"${cat.name}" kategorisini silmek istiyor musunuz?`)) return;
  }
  menuData = menuData.filter(c=>c.id!==id);
  await set(ref(db,'menu'), menuData);
};

window.doSaveProduct=async()=>{
  syncOG();
  const name=document.getElementById('fn').value.trim();
  if(!name){alert('Ürün adı gerekli');return;}
  const catId=document.getElementById('fcat').value;
  const price=parseInt(document.getElementById('fp').value)||0;
  const p2v=document.getElementById('fp2').value;
  const price2=p2v?parseInt(p2v):null;
  const desc=document.getElementById('fd').value.trim();
  const emoji=document.getElementById('femo').value||'🍽️';
  const popular=document.getElementById('fpop').value==='1';
  const img=document.getElementById('fimg').value;
  const options=ogList.filter(g=>g.label.trim()&&g.choices.length>0);
  if(editId){
    let fi=null,fc=null;
    for(const c of menuData){const it=c.items?.find(i=>i.id==editId);if(it){fi=it;fc=c;break;}}
    if(!fi)return;
    fi.name=name;fi.desc=desc;fi.price=price;fi.price2=price2;fi.emoji=emoji;fi.popular=popular;fi.options=options;
    if(img)fi.img=img;
    if(fc.id!==catId){
      fc.items.splice(fc.items.indexOf(fi),1);
      const dst=menuData.find(c=>c.id===catId);
      if(dst){if(!dst.items)dst.items=[];dst.items.push(fi);}
    }
  } else {
    const cat=menuData.find(c=>c.id===catId);if(!cat)return;
    if(!cat.items)cat.items=[];
    cat.items.push({id:'u'+Date.now(),name,desc,price,price2,emoji,popular,soldOut:false,img,options});
  }
  await set(ref(db,'menu'),menuData);
  document.getElementById('uov').classList.remove('open');
};
</script>
