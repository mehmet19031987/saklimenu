<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Saklıdoğa — Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--g:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;--gddd:#04342C;--am:#BA7517;--aml:#FAEEDA;--amd:#854F0B;--rd:#E24B4A;--rdl:#FCEBEB;--bg:#fff;--bg2:#f7f7f5;--bg3:#efefeb;--t:#1a1a1a;--tm:#666;--th:#aaa;--br:rgba(0,0,0,0.08);--br2:rgba(0,0,0,0.16)}
html,body{min-height:100%;background:var(--bg2)}
body{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--t);padding-bottom:72px}
.topbar{background:var(--gddd);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-logo{font-family:'Playfair Display',serif;font-size:17px;color:#9FE1CB}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-clock{font-size:10px;color:rgba(159,225,203,.45)}
.topbar-btn{background:rgba(159,225,203,.15);border:.5px solid rgba(159,225,203,.3);color:#9FE1CB;border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.topbar-btn.green{background:#9FE1CB;color:#04342C;border-color:#9FE1CB;font-weight:500}
.new-badge{background:var(--rd);color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;display:none;animation:pulse 1s infinite}
.new-badge.on{display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.page{display:none;min-height:60vh}
.page.active{display:block}
.subtabs{display:flex;gap:6px;padding:10px 10px 4px;overflow-x:auto;scrollbar-width:none}
.subtabs::-webkit-scrollbar{display:none}
.subtab{flex-shrink:0;padding:8px 14px;text-align:center;font-size:12px;border:.5px solid var(--br2);border-radius:8px;cursor:pointer;color:var(--tm);background:var(--bg);transition:all .2s;position:relative;font-family:'DM Sans',sans-serif;white-space:nowrap}
.subtab.active{background:var(--g);color:#fff;border-color:var(--g);font-weight:500}
.sdot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--rd);border-radius:50%;display:none}
.sdot.on{display:block}
.subcontent{display:none;padding:8px 10px 0}
.subcontent.active{display:block}
.ocard{background:var(--bg);border:.5px solid var(--br);border-radius:13px;padding:11px 13px;margin-bottom:8px}
.oc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.oc-masa{font-size:14px;font-weight:500;color:var(--t)}
.oc-time{font-size:10px;color:var(--th)}
.oc-type{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:500;margin-left:5px}
.oc-type.loca{background:#E6F1FB;color:#185FA5}
.oc-type.sezlong{background:var(--aml);color:var(--amd)}
.oc-type.bungalov{background:var(--gl);color:var(--gd)}
.oc-items{font-size:11px;color:var(--tm);line-height:1.7;margin-bottom:5px}
.oc-opt{font-size:10px;color:#6B35A8;background:#F0E6FB;padding:2px 7px;border-radius:5px;margin:2px 3px 2px 0;display:inline-block}
.oc-note{font-size:10px;color:var(--am);background:var(--aml);padding:2px 8px;border-radius:5px;margin:2px 3px 2px 0;font-style:italic;display:inline-block}
.oc-total{font-size:12px;font-weight:500;color:var(--g);margin-bottom:8px}
.sbtns{display:flex;gap:5px}
.sbtn{flex:1;padding:6px 2px;font-size:10px;border-radius:7px;border:.5px solid var(--br2);background:var(--bg2);color:var(--tm);cursor:pointer;text-align:center;transition:all .2s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.sbtn.s1{background:#FFF8E6;color:var(--am);border-color:var(--am);font-weight:500}
.sbtn.s2{background:var(--gl);color:var(--gd);border-color:var(--g);font-weight:500}
.sbtn.s3{background:#E1F5EE;color:var(--gddd);border-color:var(--gddd);font-weight:500}
.gcard{background:var(--aml);border:.5px solid var(--am);border-radius:13px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.gc-l{display:flex;align-items:center;gap:9px}
.gc-ico{width:36px;height:36px;background:var(--am);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.gc-masa{font-size:13px;font-weight:500;color:var(--amd)}
.gc-time{font-size:10px;color:var(--am);margin-top:1px}
.gc-ok{background:var(--am);color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.qsec-ttl{font-size:11px;font-weight:500;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;padding:0 10px}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 10px;margin-bottom:4px}
.qcard{background:var(--bg);border:.5px solid var(--br);border-radius:12px;padding:12px 10px;text-align:center}
.qcard-name{font-size:11px;font-weight:500;color:var(--t);margin-top:7px;margin-bottom:2px}
.qcard-url{font-size:8px;color:var(--th);word-break:break-all}
.qprint-btn{display:flex;align-items:center;justify-content:center;gap:7px;margin:14px 10px 0;padding:13px;background:var(--g);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;width:calc(100% - 20px)}
.hmcard{background:var(--bg);border:.5px solid var(--br);border-radius:12px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.hmcard:active{border-color:var(--g)}
.hm-name{font-size:13px;font-weight:500;color:var(--t)}
.hm-cnt{font-size:11px;color:var(--tm);margin-top:1px}
.hm-tot{font-size:14px;font-weight:500;color:var(--g)}
.hd-back{display:flex;align-items:center;gap:6px;background:var(--bg);border:.5px solid var(--br2);color:var(--t);font-size:13px;cursor:pointer;padding:8px 14px;font-family:'DM Sans',sans-serif;border-radius:9px;margin-bottom:12px;width:fit-content}
.hd-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--t);margin-bottom:14px}
.hd-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--br);font-size:12px}
.hd-rn{color:var(--t)}
.hd-rp{font-weight:500;color:var(--g)}
.hd-total{display:flex;justify-content:space-between;padding:14px 0 0;font-size:16px;font-weight:500;color:var(--t)}
.kapat-btn{width:100%;background:var(--rd);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:14px}
.rapor-card{background:var(--bg);border:.5px solid var(--br);border-radius:13px;padding:14px;margin-bottom:8px}
.rapor-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:.5px solid var(--br)}
.rapor-row:last-child{border-bottom:none}
.rapor-label{font-size:12px;color:var(--tm)}
.rapor-val{font-size:14px;font-weight:600;color:var(--t)}
.rapor-val.green{color:var(--g)}
.date-selector{display:flex;gap:6px;padding:10px 10px 4px;overflow-x:auto;scrollbar-width:none}
.date-selector::-webkit-scrollbar{display:none}
.date-pill{flex-shrink:0;padding:5px 12px;border-radius:20px;border:.5px solid var(--br2);background:var(--bg);color:var(--tm);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif}
.date-pill.active{background:var(--g);color:#fff;border-color:var(--g);font-weight:500}
.ucat-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 0 6px}
.ucat-nm{font-size:12px;font-weight:500;color:var(--tm)}
.ucat-add{font-size:10px;color:var(--g);background:var(--gl);border:none;border-radius:6px;padding:3px 9px;cursor:pointer;font-family:'DM Sans',sans-serif}
.ucard{background:var(--bg);border:.5px solid var(--br);border-radius:12px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ucard.dragging{opacity:.4;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.drag-handle{font-size:20px;color:var(--th);cursor:grab;flex-shrink:0;padding:0 2px}
.uc-img{width:44px;height:44px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;cursor:pointer;border:.5px solid var(--br);position:relative}
.uc-img img{width:100%;height:100%;object-fit:cover}
.uc-img-ov{position:absolute;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;border-radius:8px;font-size:15px;color:#fff}
.uc-img:hover .uc-img-ov,.uc-img:active .uc-img-ov{display:flex}
.uc-body{flex:1;min-width:0}
.uc-nm{font-size:12px;font-weight:500;color:var(--t);margin-bottom:3px}
.uc-pr-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pf{width:65px;font-size:12px;padding:4px 7px;border:.5px solid var(--br2);border-radius:6px;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;text-align:right}
.pf:focus{outline:none;border-color:var(--g)}
.pl{font-size:10px;color:var(--th)}
.uc-acts{display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0}
.stoggle{padding:4px 10px;font-size:10px;border-radius:7px;cursor:pointer;border:.5px solid;font-weight:500;font-family:'DM Sans',sans-serif;white-space:nowrap}
.stoggle.ok{background:var(--gl);color:var(--gd);border-color:var(--g)}
.stoggle.sold{background:var(--rdl);color:var(--rd);border-color:var(--rd)}
.del-btn{background:none;border:none;color:var(--th);cursor:pointer;font-size:14px}
.opt-tag{font-size:9px;background:#F0E6FB;color:#6B35A8;padding:2px 6px;border-radius:5px;font-weight:500}
.uc-opts{font-size:10px;color:#6B35A8;margin-top:2px;display:flex;flex-wrap:wrap;gap:3px}
.opt-chip{background:#F0E6FB;padding:2px 6px;border-radius:4px}
.lock-screen{position:fixed;inset:0;background:var(--gddd);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;padding:30px 24px}
.lock-screen.hidden{display:none}
.lock-logo{font-family:'Playfair Display',serif;font-size:24px;color:#9FE1CB}
.lock-sub{font-size:12px;color:rgba(159,225,203,.5);margin-top:-10px}
.lock-box{background:rgba(255,255,255,.08);border:.5px solid rgba(159,225,203,.2);border-radius:16px;padding:24px;width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px}
.lock-input{width:100%;padding:12px;border-radius:10px;border:.5px solid rgba(159,225,203,.3);background:rgba(255,255,255,.08);color:#9FE1CB;font-size:24px;font-family:'DM Sans',sans-serif;letter-spacing:8px;text-align:center}
.lock-input:focus{outline:none;border-color:#9FE1CB}
.lock-input::placeholder{letter-spacing:0;font-size:13px;color:rgba(159,225,203,.3)}
.lock-btn{width:100%;background:#9FE1CB;color:#04342C;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.lock-err{font-size:12px;color:#ff8a8a;text-align:center;display:none}
.lock-err.show{display:block}
.lock-cancel{background:none;border:none;color:rgba(159,225,203,.5);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.add-sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.overlay.open .add-sheet{transform:translateY(0)}
.shandle{width:36px;height:4px;background:var(--br2);border-radius:2px;margin:14px auto 16px}
.sttl{font-family:'Playfair Display',serif;font-size:18px;padding:0 16px 13px;color:var(--t)}
.sbody-modal{padding:0 16px 28px}
.fg{margin-bottom:12px}
.fl{font-size:11px;color:var(--tm);margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;padding:9px 11px;border:.5px solid var(--br2);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t)}
.fi:focus{outline:none;border-color:var(--g)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.img-up{border:.5px dashed var(--br2);border-radius:8px;padding:18px;text-align:center;cursor:pointer;background:var(--bg2)}
.img-up-icon{font-size:22px;display:block;margin-bottom:5px}
.img-up span{font-size:11px;color:var(--tm)}
.img-prev{width:100%;height:110px;object-fit:cover;border-radius:8px;display:none;margin-top:8px}
.save-btn{width:100%;background:var(--g);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px}
.opt-group-wrap{background:var(--bg2);border-radius:10px;padding:10px;margin-bottom:8px}
.opt-group-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.opt-group-label{font-size:12px;font-weight:500;color:var(--t)}
.opt-del-btn{background:var(--rdl);color:var(--rd);border:none;border-radius:5px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.opt-choices-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.opt-choice-chip{background:var(--bg);border:.5px solid var(--br2);border-radius:6px;padding:4px 8px;font-size:11px;display:flex;align-items:center;gap:4px}
.opt-choice-del{background:none;border:none;color:var(--th);cursor:pointer;font-size:12px;line-height:1}
.opt-choice-input{flex:1;font-size:12px;padding:5px 8px;border:.5px solid var(--br2);border-radius:6px;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-width:120px}
.opt-choice-input:focus{outline:none;border-color:var(--g)}
.opt-add-choice-btn{background:var(--gl);color:var(--gd);border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.add-opt-group-btn{width:100%;background:var(--bg2);border:.5px dashed var(--br2);border-radius:8px;padding:9px;font-size:12px;color:var(--tm);cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:10px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:.5px solid var(--br);display:flex;z-index:90;padding-bottom:env(safe-area-inset-bottom,0px)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 10px;cursor:pointer;color:var(--th);font-size:9px;gap:2px;transition:color .2s;font-family:'DM Sans',sans-serif;position:relative}
.bni.active{color:var(--g)}
.bni-icon{font-size:20px}
.bnbadge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--rd);color:#fff;font-size:8px;min-width:15px;height:15px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px}
.bnbadge.on{display:flex}
.empty-st{text-align:center;padding:50px 20px;color:var(--th)}
.empty-ico{font-size:36px;margin-bottom:10px}
.empty-txt{font-size:13px;line-height:1.6}
.padded{padding:0 10px}
@media print{.bnav,.topbar,.subtabs,.date-selector{display:none!important}.qcard{page-break-inside:avoid}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo" id="topbar-logo">Saklıdoğa</div>
  <div class="topbar-right">
    <span class="new-badge" id="new-badge">YENİ!</span>
    <div class="topbar-clock" id="a-clock"></div>
    <button class="topbar-btn green" id="topbar-add-btn" style="display:none" onclick="openAddModal(null)">+ Ekle</button>
  </div>
</div>

<!-- SİPARİŞLER & GARSON -->
<div class="page active" id="page-siparis">
  <div class="subtabs">
    <div class="subtab active" id="stab-orders" onclick="switchSub('orders')">📋 Siparişler <span class="sdot" id="dot-orders"></span></div>
    <div class="subtab" id="stab-garson" onclick="switchSub('garson')">🔔 Garson <span class="sdot" id="dot-garson"></span></div>
  </div>
  <div class="subcontent active" id="sc-orders"></div>
  <div class="subcontent" id="sc-garson"></div>
</div>

<!-- QR KODLAR -->
<div class="page" id="page-qr">
  <div id="qbody" style="padding-bottom:16px"></div>
</div>

<!-- ÜRÜNLER -->
<div class="page" id="page-urun">
  <div style="padding:0 10px 20px" id="ubody"></div>
</div>

<!-- HESAP & RAPOR -->
<div class="page" id="page-hesap">
  <div class="subtabs">
    <div class="subtab active" id="stab-hesap" onclick="switchHesap('hesap')">💳 Hesap</div>
    <div class="subtab" id="stab-rapor" onclick="switchHesap('rapor')">📊 Rapor</div>
  </div>
  <div class="subcontent active padded" id="sc-hesap"></div>
  <div class="subcontent padded" id="sc-rapor"></div>
</div>

<!-- ŞİFRE -->
<div class="lock-screen hidden" id="lock-screen">
  <div class="lock-logo">Saklıdoğa</div>
  <div class="lock-sub">Yönetici Girişi</div>
  <div class="lock-box">
    <input class="lock-input" id="lock-input" type="password" placeholder="••••" maxlength="10" onkeydown="if(event.key==='Enter')checkPin()">
    <button class="lock-btn" onclick="checkPin()">Giriş</button>
    <div class="lock-err" id="lock-err">Hatalı şifre!</div>
    <button class="lock-cancel" onclick="cancelLock()">← Geri dön</button>
  </div>
</div>

<!-- ÜRÜN EKLE MODAL -->
<div class="overlay" id="add-ov" onclick="closeAddModal(event)">
  <div class="add-sheet">
    <div class="shandle"></div>
    <div class="sttl" id="add-modal-title">Ürün Ekle</div>
    <div class="sbody-modal">
      <div class="fg"><label class="fl">Ürün Adı *</label><input class="fi" id="fn" type="text" placeholder="örn. Limonata"></div>
      <div class="fg"><label class="fl">Açıklama</label><input class="fi" id="fd" type="text" placeholder="Kısa açıklama"></div>
      <div class="fg"><label class="fl">Kategori</label><select class="fi" id="fcat" style="cursor:pointer"></select></div>
      <div class="frow">
        <div class="fg"><label class="fl">Fiyat (₺) *</label><input class="fi" id="fp" type="number" placeholder="0" min="0"></div>
        <div class="fg"><label class="fl">Menü Fiyatı (₺)</label><input class="fi" id="fp2" type="number" placeholder="boş bırak" min="0"></div>
      </div>
      <div class="fg"><label class="fl">Emoji</label><input class="fi" id="femo" type="text" placeholder="🍔" maxlength="4"></div>
      <div class="fg"><label class="fl">Popüler?</label><select class="fi" id="fpop" style="cursor:pointer"><option value="0">Hayır</option><option value="1">Evet</option></select></div>
      <div class="fg">
        <label class="fl">Fotoğraf</label>
        <div class="img-up" onclick="document.getElementById('fimg-file').click()">
          <span class="img-up-icon">📷</span><span>Fotoğraf yükle</span>
          <img class="img-prev" id="fimg-prev">
        </div>
        <input type="file" id="fimg-file" accept="image/*" style="display:none" onchange="handleImgUp(this)">
        <input type="hidden" id="fimg">
      </div>
      <div class="fg">
        <label class="fl">Seçenekler (Aroma, Şeker vb.)</label>
        <div id="opt-groups-admin"></div>
        <button class="add-opt-group-btn" onclick="addOptGroup()">+ Seçenek Grubu Ekle</button>
      </div>
      <button class="save-btn" onclick="saveProduct()">Kaydet</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <div class="bni active" id="bni-siparis" onclick="gotoPage('siparis')" style="position:relative">
    <div class="bni-icon">📋</div>Siparişler
    <span class="bnbadge" id="bnbadge"></span>
  </div>
  <div class="bni" id="bni-qr" onclick="gotoPage('qr')">
    <div class="bni-icon">📱</div>QR Kodlar
  </div>
  <div class="bni" id="bni-urun" onclick="requestLock('urun')">
    <div class="bni-icon">⚙️</div>Ürünler
  </div>
  <div class="bni" id="bni-hesap" onclick="requestLock('hesap')">
    <div class="bni-icon">💳</div>Hesap
  </div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-HliZQmaKsCNqBiOHnL--6dSPtE0ALXU",
  authDomain: "saklidoga-e05f5.firebaseapp.com",
  databaseURL: "https://saklidoga-e05f5-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "saklidoga-e05f5",
  storageBucket: "saklidoga-e05f5.firebasestorage.app",
  messagingSenderId: "236887108719",
  appId: "1:236887108719:web:deaecdabce23764a35319a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const SIFRE='1903';
const BASE_URL='https://abdurrahmankismiherbalife-lang.github.io/saklimenu/';
const MASALAR=[
  ...Array.from({length:11},(_,i)=>({id:`loca-${i+1}`,name:`Loca ${i+1}`,type:'loca'})),
  ...Array.from({length:13},(_,i)=>({id:`sezlong-${i+1}`,name:`Şezlong ${i+1}`,type:'sezlong'})),
  ...Array.from({length:5},(_,i)=>({id:`bungalov-${i+1}`,name:`Bungalov ${i+1}`,type:'bungalov'})),
];

let menuData=[], orders={}, garsonCalls={};
let activePage='siparis', activeSub='orders', activeHesap='hesap';
let hesapMasa=null, selectedDate=null, lockTarget=null, addCatId=null;
let dragSrcCatId=null, dragSrcIdx=null;
let editingItemId=null;
let adminOptGroups=[];

const fdate=d=>{
  const dt=d||new Date();
  return `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}.${dt.getFullYear()}`;
};
const ftime=()=>new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});

function getLast7Days(){
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date();
    d.setDate(d.getDate()-i);
    days.push(fdate(d));
  }
  return days;
}

function playSound(type){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const freqs=type==='garson'?[440,550,440,550]:[600,800,1000,1200];
    freqs.forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='sine';
      const t0=ac.currentTime+i*0.14;
      g.gain.setValueAtTime(0.3,t0);
      g.gain.exponentialRampToValueAtTime(0.001,t0+0.2);
      o.start(t0);o.stop(t0+0.2);
    });
  }catch(e){}
}

let prevOrdCnt=null, prevGarCnt=null;

onValue(ref(db,'orders'),snap=>{
  orders=snap.val()||{};
  const today=fdate();
  if(!selectedDate) selectedDate=today;
  const cnt=Object.values(orders).filter(o=>o.date===today&&o.status!=='kapali').length;
  if(prevOrdCnt!==null&&cnt>prevOrdCnt){playSound('order');showBadge('YENİ SİPARİŞ!');}
  prevOrdCnt=cnt;
  const pending=Object.values(orders).filter(o=>o.status==='hazirlaniyor'&&o.date===today).length;
  document.getElementById('bnbadge').classList.toggle('on',pending>0);
  if(pending>0) document.getElementById('bnbadge').textContent=pending;
  document.getElementById('dot-orders').classList.toggle('on',pending>0);
  if(activeSub==='orders') renderOrders();
  if(activeHesap==='hesap'&&activePage==='hesap') renderHesapList();
  if(activeHesap==='rapor'&&activePage==='hesap') renderRapor();
});

onValue(ref(db,'garson'),snap=>{
  garsonCalls=snap.val()||{};
  const cnt=Object.keys(garsonCalls).length;
  if(prevGarCnt!==null&&cnt>prevGarCnt){playSound('garson');showBadge('GARSON!');}
  prevGarCnt=cnt;
  document.getElementById('dot-garson').classList.toggle('on',cnt>0);
  if(activeSub==='garson') renderGarson();
});

onValue(ref(db,'menu'),snap=>{
  menuData=snap.val()||[];
  if(activePage==='urun') renderUrun();
});

function showBadge(txt){
  const b=document.getElementById('new-badge');
  b.textContent=txt;b.classList.add('on');
  setTimeout(()=>b.classList.remove('on'),5000);
}

function updateClock(){
  const el=document.getElementById('a-clock');
  if(el) el.textContent=new Date().toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,30000); updateClock();

window.gotoPage=p=>{
  activePage=p;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.bni').forEach(el=>el.classList.remove('active'));
  const bniMap={siparis:'bni-siparis',qr:'bni-qr',urun:'bni-urun',hesap:'bni-hesap'};
  document.getElementById(bniMap[p]).classList.add('active');
  const logos={siparis:'📋 Siparişler & Garson',qr:'📱 QR Kodlar',urun:'⚙️ Ürün Yönetimi',hesap:'💳 Hesap & Rapor'};
  document.getElementById('topbar-logo').textContent=logos[p];
  const addBtn=document.getElementById('topbar-add-btn');
  addBtn.style.display=p==='urun'?'block':'none';
  if(p==='qr') renderQR();
  if(p==='urun') renderUrun();
  if(p==='hesap'){selectedDate=fdate();renderHesapList();}
};

window.requestLock=target=>{
  if(sessionStorage.getItem('admin_ok')==='1'){gotoPage(target);return;}
  lockTarget=target;
  document.getElementById('lock-input').value='';
  document.getElementById('lock-err').classList.remove('show');
  document.getElementById('lock-screen').classList.remove('hidden');
};
window.checkPin=()=>{
  if(document.getElementById('lock-input').value===SIFRE){
    sessionStorage.setItem('admin_ok','1');
    document.getElementById('lock-screen').classList.add('hidden');
    gotoPage(lockTarget);
  } else {
    document.getElementById('lock-err').classList.add('show');
    document.getElementById('lock-input').value='';
    setTimeout(()=>document.getElementById('lock-err').classList.remove('show'),2000);
  }
};
window.cancelLock=()=>{document.getElementById('lock-screen').classList.add('hidden');};

window.switchSub=sub=>{
  activeSub=sub;
  ['orders','garson'].forEach(t=>{
    document.getElementById('stab-'+t).classList.toggle('active',t===sub);
    document.getElementById('sc-'+t).classList.toggle('active',t===sub);
  });
  if(sub==='orders'){document.getElementById('dot-orders').classList.remove('on');renderOrders();}
  if(sub==='garson'){document.getElementById('dot-garson').classList.remove('on');renderGarson();}
};

function renderOrders(){
  const el=document.getElementById('sc-orders');
  const today=fdate();
  const active=Object.values(orders).filter(o=>o.status!=='kapali'&&o.date===today).sort((a,b)=>b.id.localeCompare(a.id));
  if(!active.length){el.innerHTML=`<div class="empty-st"><div class="empty-ico">🍽️</div><div class="empty-txt">Bugün henüz sipariş yok</div></div>`;return;}
  el.innerHTML=active.map(o=>`
    <div class="ocard">
      <div class="oc-top">
        <div style="display:flex;align-items:center;gap:5px">
          <span class="oc-masa">${o.masa}</span>
          <span class="oc-type ${o.masaType}">${o.masaType==='loca'?'Loca':o.masaType==='sezlong'?'Şezlong':'Bungalov'}</span>
        </div>
        <span class="oc-time">${o.time}</span>
      </div>
      <div class="oc-items">${o.items.map(i=>`${i.name} × ${i.qty}`).join(' · ')}</div>
      ${o.items.filter(i=>i.options||i.note).length?`<div style="margin-bottom:5px">${o.items.filter(i=>i.options||i.note).map(i=>`
        ${i.options?`<span class="oc-opt">${i.name}: ${i.options}</span>`:''}
        ${i.note?`<span class="oc-note">${i.name}: "${i.note}"</span>`:''}
      `).join('')}</div>`:''}
      <div class="oc-total">₺${o.total}</div>
      <div class="sbtns">
        <button class="sbtn${o.status==='hazirlaniyor'?' s1':''}" onclick="setStatus('${o.id}','hazirlaniyor')">⏳ Hazırlanıyor</button>
        <button class="sbtn${o.status==='hazir'?' s2':''}" onclick="setStatus('${o.id}','hazir')">✓ Hazırlandı</button>
        <button class="sbtn${o.status==='teslim'?' s3':''}" onclick="setStatus('${o.id}','teslim')">✅ Teslim</button>
      </div>
    </div>`).join('');
}
window.setStatus=async(id,status)=>{ await update(ref(db,'orders/'+id),{status}); };

function renderGarson(){
  const el=document.getElementById('sc-garson');
  const calls=Object.values(garsonCalls);
  if(!calls.length){el.innerHTML=`<div class="empty-st"><div class="empty-ico">🔔</div><div class="empty-txt">Garson çağrısı yok</div></div>`;return;}
  el.innerHTML=calls.map(g=>`
    <div class="gcard">
      <div class="gc-l">
        <div class="gc-ico">🔔</div>
        <div><div class="gc-masa">${g.masa}</div><div class="gc-time">${g.time}</div></div>
      </div>
      <button class="gc-ok" onclick="dismissGarson('${g.id}')">Tamam</button>
    </div>`).join('');
}
window.dismissGarson=async id=>{ await remove(ref(db,'garson/'+id)); };

// HESAP
window.switchHesap=tab=>{
  activeHesap=tab;
  ['hesap','rapor'].forEach(t=>{
    document.getElementById('stab-'+t).classList.toggle('active',t===tab);
    document.getElementById('sc-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='hesap'){hesapMasa=null;renderHesapList();}
  if(tab==='rapor') renderRapor();
};

function renderDateSelector(containerId, onSelect){
  const days=getLast7Days();
  if(!selectedDate) selectedDate=days[0];
  const today=fdate();
  return `<div class="date-selector">
    ${days.map(d=>`<button class="date-pill${d===selectedDate?' active':''}" onclick="(${onSelect})('${d}')">${d===today?'Bugün':d}</button>`).join('')}
  </div>`;
}

function renderHesapList(){
  const el=document.getElementById('sc-hesap');
  if(hesapMasa){
    const mo=Object.values(orders).filter(o=>o.masaId===hesapMasa.id&&o.status!=='kapali'&&o.date===selectedDate);
    const total=mo.reduce((s,o)=>s+o.total,0);
    const m={};
    mo.forEach(o=>o.items.forEach(i=>{
      const key=i.name+(i.options?'-'+i.options:'');
      if(!m[key])m[key]={name:i.name+(i.options?' ('+i.options+')':''),qty:0,price:0};
      m[key].qty+=i.qty;m[key].price+=i.price*i.qty;
    }));
    el.innerHTML=`
      <button class="hd-back" onclick="hesapMasa=null;renderHesapList()">← Geri</button>
      <div class="hd-title">${hesapMasa.name} — ${selectedDate}</div>
      ${Object.values(m).length?Object.values(m).map(r=>`<div class="hd-row"><span class="hd-rn">${r.name} × ${r.qty}</span><span class="hd-rp">₺${r.price}</span></div>`).join(''):'<div style="padding:20px 0;text-align:center;color:var(--th);font-size:13px">Bu tarihte sipariş yok</div>'}
      ${Object.values(m).length?`<div class="hd-total"><span>Toplam</span><span>₺${total}</span></div>
      <button class="kapat-btn" onclick="kapatiHesap('${hesapMasa.id}')">✓ Hesabı Kapat & Temizle</button>`:''}`;
    return;
  }
  const dateSel=renderDateSelector('sc-hesap', (d)=>{selectedDate=d;hesapMasa=null;renderHesapList();});
  const aktif=MASALAR.filter(m=>Object.values(orders).some(o=>o.masaId===m.id&&o.status!=='kapali'&&o.date===selectedDate));
  el.innerHTML=dateSel+(aktif.length?aktif.map(m=>{
    const tot=Object.values(orders).filter(o=>o.masaId===m.id&&o.status!=='kapali'&&o.date===selectedDate).reduce((s,o)=>s+o.total,0);
    const cnt=Object.values(orders).filter(o=>o.masaId===m.id&&o.status!=='kapali'&&o.date===selectedDate).length;
    return `<div class="hmcard" onclick="hesapMasa={id:'${m.id}',name:'${m.name}',type:'${m.type}'};renderHesapList()">
      <div><div class="hm-name">${m.name}</div><div class="hm-cnt">${cnt} sipariş</div></div>
      <div class="hm-tot">₺${tot}</div>
    </div>`;
  }).join(''):`<div class="empty-st"><div class="empty-ico">💳</div><div class="empty-txt">${selectedDate===fdate()?'Bugün açık hesap yok':'Bu tarihte açık hesap yok'}</div></div>`);
}
window.renderHesapList=renderHesapList;
window.kapatiHesap=async masaId=>{
  for(const o of Object.values(orders).filter(o=>o.masaId===masaId&&o.status!=='kapali'&&o.date===selectedDate))
    await update(ref(db,'orders/'+o.id),{status:'kapali'});
  hesapMasa=null; renderHesapList();
};

function renderRapor(){
  const el=document.getElementById('sc-rapor');
  const dateSel=renderDateSelector('sc-rapor',(d)=>{selectedDate=d;renderRapor();});
  const to=Object.values(orders).filter(o=>o.date===selectedDate);
  const ciro=to.filter(o=>o.status==='kapali').reduce((s,o)=>s+o.total,0);
  const acik=to.filter(o=>o.status!=='kapali').reduce((s,o)=>s+o.total,0);
  const uc={};
  to.forEach(o=>o.items.forEach(i=>{if(!uc[i.name])uc[i.name]=0;uc[i.name]+=i.qty;}));
  const top=Object.entries(uc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  el.innerHTML=dateSel+`
    <div class="rapor-card" style="margin-top:8px">
      <div style="font-size:12px;font-weight:500;color:var(--tm);margin-bottom:10px">📊 ${selectedDate===fdate()?'Bugün':'Seçilen Gün'} — ${selectedDate}</div>
      <div class="rapor-row"><span class="rapor-label">Toplam Sipariş</span><span class="rapor-val">${to.length}</span></div>
      <div class="rapor-row"><span class="rapor-label">Tahsil Edilen</span><span class="rapor-val green">₺${ciro}</span></div>
      <div class="rapor-row"><span class="rapor-label">Açık Hesaplar</span><span class="rapor-val">₺${acik}</span></div>
      <div class="rapor-row"><span class="rapor-label">Toplam Ciro</span><span class="rapor-val green">₺${ciro+acik}</span></div>
    </div>
    ${top.length?`<div class="rapor-card">
      <div style="font-size:12px;font-weight:500;color:var(--tm);margin-bottom:10px">🏆 En Çok Satanlar</div>
      ${top.map(([name,qty],i)=>`<div class="rapor-row"><span class="rapor-label">${i+1}. ${name}</span><span class="rapor-val">${qty} adet</span></div>`).join('')}
    </div>`:''}`;
}

// QR
function renderQR(){
  const el=document.getElementById('qbody');
  const groups=[
    {title:'Localar (11)',items:MASALAR.filter(m=>m.type==='loca')},
    {title:'Şezlonglar (13)',items:MASALAR.filter(m=>m.type==='sezlong')},
    {title:'Bungalovlar (5)',items:MASALAR.filter(m=>m.type==='bungalov')},
  ];
  el.innerHTML=groups.map(g=>`
    <div class="qsec-ttl">${g.title}</div>
    <div class="qgrid">${g.items.map(m=>`
      <div class="qcard">
        <div id="qr-${m.id}" style="display:flex;justify-content:center"></div>
        <div class="qcard-name">${m.name}</div>
        <div class="qcard-url">${BASE_URL}?masa=${m.id}</div>
      </div>`).join('')}
    </div>`).join('')+`<button class="qprint-btn" onclick="window.print()">🖨️ Tümünü Yazdır</button>`;
  setTimeout(()=>{
    MASALAR.forEach(m=>{
      const wrap=document.getElementById('qr-'+m.id);
      if(wrap&&window.QRCode){
        new QRCode(wrap,{text:BASE_URL+'?masa='+m.id,width:80,height:80,colorDark:'#04342C',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
      }
    });
  },300);
}

// ÜRÜNLER
function renderUrun(){
  const el=document.getElementById('ubody');
  if(!menuData.length){el.innerHTML='<div class="empty-st"><div class="empty-ico">🍽️</div><div class="empty-txt">Yükleniyor...</div></div>';return;}
  el.innerHTML=menuData.map(cat=>`
    <div>
      <div class="ucat-hd">
        <div class="ucat-nm">${cat.emoji} ${cat.name} (${(cat.items||[]).length})</div>
        <button class="ucat-add" onclick="openAddModal('${cat.id}')">+ Ekle</button>
      </div>
      ${(cat.items||[]).map((item,idx)=>`
        <div class="ucard" draggable="true" id="ucard-${cat.id}-${idx}"
          ondragstart="dragStart('${cat.id}',${idx})"
          ondragover="dragOver(event)"
          ondrop="dragDrop('${cat.id}',${idx})"
          ondragend="dragEnd()">
          <div class="drag-handle">⠿</div>
          <div class="uc-img" onclick="document.getElementById('uimg-${item.id}').click()">
            ${item.img?`<img src="${item.img}" alt="${item.name}">`:`<span>${item.emoji||'🍽️'}</span>`}
            <div class="uc-img-ov">📷</div>
          </div>
          <input type="file" accept="image/*" id="uimg-${item.id}" style="display:none" onchange="handleUrunImg('${item.id}',this)">
          <div class="uc-body">
            <div class="uc-nm">${item.name} ${item.options&&item.options.length?'<span class="opt-tag">Seçenek</span>':''}</div>
            <div class="uc-pr-row">
              <span class="pl">₺</span>
              <input class="pf" type="number" value="${item.price}" min="0" onchange="updatePrice('${item.id}','price',this.value)">
              ${item.price2!=null?`<span class="pl">Menü ₺</span><input class="pf" type="number" value="${item.price2}" min="0" onchange="updatePrice('${item.id}','price2',this.value)">`:''}
            </div>
            ${item.options&&item.options.length?`<div class="uc-opts">${item.options.map(o=>`<span class="opt-chip">${o.label}: ${o.choices.join(', ')}</span>`).join('')}</div>`:''}
          </div>
          <div class="uc-acts">
            <button class="stoggle ${item.soldOut?'sold':'ok'}" onclick="toggleSoldOut('${item.id}')">${item.soldOut?'Tükendi':'Mevcut'}</button>
            <button class="del-btn" onclick="deleteItem('${item.id}')">🗑️</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

window.dragStart=(catId,idx)=>{ dragSrcCatId=catId;dragSrcIdx=idx;setTimeout(()=>{const el=document.getElementById(`ucard-${catId}-${idx}`);if(el)el.classList.add('dragging');},0); };
window.dragOver=(e)=>{ e.preventDefault(); };
window.dragDrop=async(catId,idx)=>{
  if(dragSrcCatId===null||dragSrcIdx===null)return;
  if(dragSrcCatId===catId&&dragSrcIdx===idx){dragSrcCatId=null;dragSrcIdx=null;return;}
  const srcCat=menuData.find(c=>c.id===dragSrcCatId);
  const dstCat=menuData.find(c=>c.id===catId);
  if(!srcCat||!dstCat)return;
  const [item]=srcCat.items.splice(dragSrcIdx,1);
  dstCat.items.splice(idx,0,item);
  dragSrcCatId=null;dragSrcIdx=null;
  await set(ref(db,'menu'),menuData);
};
window.dragEnd=()=>{ document.querySelectorAll('.ucard').forEach(el=>el.classList.remove('dragging')); };

window.handleUrunImg=(id,input)=>{
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    for(const c of menuData){const it=c.items&&c.items.find(i=>i.id==id);if(it){it.img=e.target.result;break;}}
    await set(ref(db,'menu'),menuData);
  };
  reader.readAsDataURL(file);
};
window.updatePrice=(id,field,val)=>{
  const v=parseInt(val)||0;
  for(const c of menuData){const it=c.items&&c.items.find(i=>i.id==id);if(it){it[field]=v;break;}}
  clearTimeout(window._st);
  window._st=setTimeout(()=>set(ref(db,'menu'),menuData),800);
};
window.toggleSoldOut=async id=>{
  for(const c of menuData){const it=c.items&&c.items.find(i=>i.id==id);if(it){it.soldOut=!it.soldOut;break;}}
  await set(ref(db,'menu'),menuData);
};
window.deleteItem=async id=>{
  if(!confirm('Bu ürünü silmek istiyor musunuz?'))return;
  for(const c of menuData){const idx=c.items&&c.items.findIndex(i=>i.id==id);if(idx!==-1){c.items.splice(idx,1);break;}}
  await set(ref(db,'menu'),menuData);
};

// ÜRÜN EKLE MODAL + SEÇENEK YÖNETİMİ
window.openAddModal=catId=>{
  addCatId=catId||menuData[0]?.id;
  editingItemId=null;
  adminOptGroups=[];
  document.getElementById('add-modal-title').textContent='Ürün Ekle';
  ['fn','fd','fp','fp2','femo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fpop').value='0';
  document.getElementById('fimg').value='';
  document.getElementById('fimg-prev').style.display='none';
  document.getElementById('fcat').innerHTML=menuData.map(c=>`<option value="${c.id}"${c.id===addCatId?' selected':''}>${c.emoji} ${c.name}</option>`).join('');
  renderAdminOptGroups();
  document.getElementById('add-ov').classList.add('open');
};
window.closeAddModal=e=>{ if(!e||e.target===document.getElementById('add-ov')) document.getElementById('add-ov').classList.remove('open'); };

window.addOptGroup=()=>{
  adminOptGroups.push({label:'',choices:[],required:true});
  renderAdminOptGroups();
};

window.removeOptGroup=idx=>{
  adminOptGroups.splice(idx,1);
  renderAdminOptGroups();
};

window.addOptChoice=idx=>{
  const inp=document.getElementById(`opt-choice-inp-${idx}`);
  const val=inp.value.trim();
  if(!val)return;
  adminOptGroups[idx].choices.push(val);
  inp.value='';
  renderAdminOptGroups();
};

window.removeOptChoice=(gi,ci)=>{
  adminOptGroups[gi].choices.splice(ci,1);
  renderAdminOptGroups();
};

window.updateOptLabel=(idx,val)=>{ adminOptGroups[idx].label=val; };
window.updateOptRequired=(idx,val)=>{ adminOptGroups[idx].required=val==='1'; };

function renderAdminOptGroups(){
  const el=document.getElementById('opt-groups-admin');
  el.innerHTML=adminOptGroups.map((g,gi)=>`
    <div class="opt-group-wrap">
      <div class="opt-group-header">
        <input style="flex:1;font-size:12px;padding:4px 8px;border:.5px solid var(--br2);border-radius:6px;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif" 
          placeholder="Grup adı (örn. Aroma, Şeker...)" value="${g.label}" 
          oninput="updateOptLabel(${gi},this.value)">
        <button class="opt-del-btn" onclick="removeOptGroup(${gi})" style="margin-left:6px">Sil</button>
      </div>
      <div style="display:flex;gap:4px;align-items:center;margin-bottom:8px">
        <label style="font-size:11px;color:var(--tm)">Zorunlu:</label>
        <select style="font-size:11px;padding:3px 6px;border:.5px solid var(--br2);border-radius:5px;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif" onchange="updateOptRequired(${gi},this.value)">
          <option value="1" ${g.required?'selected':''}>Evet</option>
          <option value="0" ${!g.required?'selected':''}>Hayır</option>
        </select>
      </div>
      <div class="opt-choices-wrap">
        ${g.choices.map((ch,ci)=>`
          <div class="opt-choice-chip">
            <span>${ch}</span>
            <button class="opt-choice-del" onclick="removeOptChoice(${gi},${ci})">×</button>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:5px;margin-top:4px">
        <input class="opt-choice-input" id="opt-choice-inp-${gi}" placeholder="Seçenek ekle..." onkeydown="if(event.key==='Enter'){event.preventDefault();addOptChoice(${gi})}">
        <button class="opt-add-choice-btn" onclick="addOptChoice(${gi})">+ Ekle</button>
      </div>
    </div>`).join('');
}

window.handleImgUp=input=>{
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('fimg').value=e.target.result;
    const prev=document.getElementById('fimg-prev');
    prev.src=e.target.result;prev.style.display='block';
  };
  reader.readAsDataURL(file);
};

window.saveProduct=async()=>{
  const name=document.getElementById('fn').value.trim();
  if(!name){alert('Ürün adı gerekli');return;}
  const catId=document.getElementById('fcat').value;
  const price=parseInt(document.getElementById('fp').value)||0;
  const p2v=document.getElementById('fp2').value;
  const cat=menuData.find(c=>c.id===catId);if(!cat)return;
  if(!cat.items)cat.items=[];
  const validOpts=adminOptGroups.filter(g=>g.label&&g.choices.length>0);
  cat.items.push({
    id:'u'+Date.now(),
    name,
    desc:document.getElementById('fd').value.trim(),
    price,
    price2:p2v?parseInt(p2v):null,
    emoji:document.getElementById('femo').value||'🍽️',
    popular:document.getElementById('fpop').value==='1',
    soldOut:false,
    img:document.getElementById('fimg').value,
    options:validOpts
  });
  await set(ref(db,'menu'),menuData);
  document.getElementById('add-ov').classList.remove('open');
};
</script>
</body>
</html>
