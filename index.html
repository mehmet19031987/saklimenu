<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Saklıdoğa — Menü</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;--gddd:#04342C;
  --am:#BA7517;--aml:#FAEEDA;--amd:#854F0B;
  --rd:#E24B4A;--rdl:#FCEBEB;
  --bg:#fff;--bg2:#f7f7f5;--bg3:#efefeb;
  --t:#1a1a1a;--tm:#666;--th:#aaa;
  --br:rgba(0,0,0,0.08);--br2:rgba(0,0,0,0.16)
}
html,body{min-height:100%;background:var(--bg2)}
body{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--t)}

/* HEADER */
.mhdr{background:var(--gddd);padding:16px 14px 11px;position:sticky;top:0;z-index:50}
.mh-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.mh-logo{font-family:'Playfair Display',serif;font-size:21px;font-weight:600;color:#9FE1CB}
.mh-masa{background:rgba(159,225,203,.15);color:#9FE1CB;font-size:10px;padding:4px 11px;border-radius:20px;border:.5px solid rgba(159,225,203,.3);font-weight:500}
.mh-sub{font-size:10px;color:rgba(159,225,203,.4);margin-bottom:11px}
.catrow{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.catrow::-webkit-scrollbar{display:none}
.cpill{flex-shrink:0;padding:6px 14px;border-radius:20px;border:.5px solid rgba(159,225,203,.25);background:transparent;color:rgba(159,225,203,.6);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .2s}
.cpill.active{background:#9FE1CB;color:#04342C;font-weight:500;border-color:#9FE1CB}

/* ITEMS */
.sec-hd{display:flex;align-items:center;gap:8px;padding:16px 13px 8px}
.sec-nm{font-family:'Playfair Display',serif;font-size:16px;color:var(--t)}
.items{padding:0 10px;display:flex;flex-direction:column;gap:8px;padding-bottom:170px}
.icard{background:var(--bg);border:.5px solid var(--br);border-radius:13px;overflow:hidden;transition:border-color .15s}
.icard.sold{opacity:.5;pointer-events:none}
.irow{display:flex;align-items:stretch}
.iphoto{width:88px;height:88px;flex-shrink:0;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden}
.iphoto img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.sold-ov{position:absolute;inset:0;background:rgba(255,255,255,.65);display:flex;align-items:center;justify-content:center}
.sold-tag{background:var(--rdl);color:var(--rd);font-size:10px;font-weight:500;padding:2px 8px;border-radius:6px}
.ibody{flex:1;padding:10px 12px 10px 10px;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.iname{font-size:13px;font-weight:500;color:var(--t);line-height:1.3;margin-bottom:3px}
.idesc{font-size:11px;color:var(--tm);line-height:1.4;margin-bottom:5px}
.ibadges{display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap}
.bp{font-size:9px;background:var(--aml);color:var(--amd);padding:2px 7px;border-radius:5px;font-weight:500}
.bm{font-size:9px;background:#E6F1FB;color:#185FA5;padding:2px 7px;border-radius:5px;font-weight:500}
.bopt{font-size:9px;background:#F0E6FB;color:#6B35A8;padding:2px 7px;border-radius:5px;font-weight:500}
.ifoot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.iprice{font-size:15px;font-weight:600;color:var(--g)}
.iprice2{font-size:10px;color:var(--tm);margin-top:1px}
.sold-lbl{font-size:10px;background:var(--rdl);color:var(--rd);padding:3px 10px;border-radius:6px;font-weight:500}
.add-btn{width:34px;height:34px;border-radius:50%;background:var(--g);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s}
.add-btn:active{transform:scale(.85)}
.qctrl{display:flex;align-items:center;gap:7px}
.qb{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--br2);background:var(--bg2);color:var(--t);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qb:active{background:var(--bg3)}
.qn{font-size:14px;font-weight:600;min-width:18px;text-align:center;color:var(--t)}
.note-btn{font-size:11px;color:var(--g);cursor:pointer;padding:4px 12px 8px;display:block;background:none;border:none;text-align:left;font-family:'DM Sans',sans-serif}
.note-wrap{padding:0 12px 10px;display:none}
.note-wrap.open{display:block}
.note-ta{width:100%;font-size:12px;padding:8px 10px;border:.5px solid var(--br2);border-radius:8px;background:var(--bg);color:var(--t);resize:none;font-family:'DM Sans',sans-serif;line-height:1.5}
.note-ta:focus{outline:none;border-color:var(--g)}

/* CART BAR */
.cart-fixed{position:fixed;bottom:0;left:0;right:0;padding:10px 12px 28px;background:linear-gradient(transparent,var(--bg2) 28%);z-index:40}
.cbar{background:var(--gddd);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:opacity .3s,transform .3s}
.cbar.hidden{opacity:0;transform:translateY(6px);pointer-events:none}
.cbadge{background:#9FE1CB;color:#04342C;font-size:11px;font-weight:600;min-width:24px;height:24px;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0}
.clbl{flex:1;font-size:12px;color:rgba(159,225,203,.85)}
.ctot{font-size:15px;font-weight:600;color:#9FE1CB}
.csee{background:#9FE1CB;color:#04342C;border:none;border-radius:9px;padding:8px 15px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif}
.garson-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:.5px solid var(--am);border-radius:12px;background:var(--aml);color:var(--amd);font-size:13px;font-weight:500;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;transition:all .2s}
.garson-btn:active{transform:scale(.98)}
.garson-btn.ok{background:var(--gl);border-color:var(--g);color:var(--gd)}

/* SEÇENEK MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--bg);border-radius:22px 22px 0 0;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.modal-bg.open .modal-sheet{transform:translateY(0)}
.shandle{width:36px;height:4px;background:var(--br2);border-radius:2px;margin:14px auto 12px}
.opt-name{font-family:'Playfair Display',serif;font-size:18px;padding:0 16px;color:var(--t);margin-bottom:3px}
.opt-price{font-size:14px;font-weight:500;color:var(--g);padding:0 16px;margin-bottom:14px}
.opt-group{margin-bottom:14px}
.opt-group-label{font-size:12px;font-weight:500;color:var(--tm);padding:0 16px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.opt-req-badge{font-size:9px;background:var(--rdl);color:var(--rd);padding:2px 7px;border-radius:5px;font-weight:500}
.opt-choices{display:flex;flex-direction:column;gap:6px;padding:0 16px}
.opt-choice{display:flex;align-items:center;gap:10px;padding:11px 14px;border:.5px solid var(--br2);border-radius:10px;cursor:pointer;transition:all .2s;background:var(--bg)}
.opt-choice.sel{border-color:var(--g);background:var(--gl)}
.opt-circle{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--br2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.opt-choice.sel .opt-circle{border-color:var(--g);background:var(--g)}
.opt-check{color:#fff;font-size:11px;display:none}
.opt-choice.sel .opt-check{display:block}
.opt-choice-name{font-size:13px;color:var(--t);font-weight:500}
.opt-divider{height:.5px;background:var(--br);margin:10px 16px}
.opt-note-lbl{font-size:12px;font-weight:500;color:var(--tm);padding:0 16px;margin-bottom:6px}
.opt-note-ta{width:calc(100% - 32px);margin:0 16px;font-size:12px;padding:8px 10px;border:.5px solid var(--br2);border-radius:8px;background:var(--bg);color:var(--t);resize:none;font-family:'DM Sans',sans-serif;line-height:1.5;display:block}
.opt-note-ta:focus{outline:none;border-color:var(--g)}
.opt-add-btn{margin:14px 16px 0;width:calc(100% - 32px);background:var(--g);color:#fff;border:none;border-radius:13px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s}
.opt-add-btn:disabled{background:var(--th);cursor:not-allowed}
.opt-cancel{width:100%;background:transparent;border:none;color:var(--tm);font-size:12px;padding:10px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:8px}

/* CART MODAL */
.cart-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.cart-modal-bg.open{opacity:1;pointer-events:all}
.cart-sheet{background:var(--bg);border-radius:22px 22px 0 0;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.cart-modal-bg.open .cart-sheet{transform:translateY(0)}
.sttl{font-family:'Playfair Display',serif;font-size:19px;padding:0 16px 13px;color:var(--t)}
.sbody{padding:0 16px 24px}
.ci{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:.5px solid var(--br);gap:10px}
.ci-nm{font-size:13px;font-weight:500;color:var(--t)}
.ci-sub{font-size:11px;color:var(--tm);margin-top:2px}
.ci-opt{font-size:10px;color:#6B35A8;background:#F0E6FB;padding:2px 7px;border-radius:5px;margin-top:3px;display:inline-block}
.ci-note{font-size:10px;color:var(--am);background:var(--aml);padding:2px 7px;border-radius:5px;margin-top:3px;font-style:italic;display:inline-block}
.ci-pr{font-size:14px;font-weight:600;color:var(--g);white-space:nowrap}
.stotal{display:flex;justify-content:space-between;padding:14px 0 4px;font-size:16px;font-weight:600;color:var(--t)}
.sconfirm{width:100%;background:var(--g);color:#fff;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin:13px 0 6px}
.sconfirm:active{transform:scale(.98)}
.scancel{width:100%;background:transparent;border:none;color:var(--tm);font-size:13px;padding:10px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:8px}

/* SUCCESS */
.success-page{display:none;min-height:100vh;background:var(--gddd);flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px 24px}
.success-page.show{display:flex}
.sico{width:72px;height:72px;border-radius:50%;background:rgba(159,225,203,.14);border:.5px solid rgba(159,225,203,.3);display:flex;align-items:center;justify-content:center;font-size:36px}
.s-ttl{font-family:'Playfair Display',serif;font-size:24px;color:#9FE1CB}
.s-sub{font-size:13px;color:rgba(159,225,203,.6);text-align:center;line-height:1.8}
.s-back{background:rgba(159,225,203,.13);border:.5px solid rgba(159,225,203,.3);color:#9FE1CB;border-radius:12px;padding:13px 36px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px}
</style>
</head>

<div id="page-menu">

    <div class="catrow" id="catrow"></div>
  </div>
  <div id="mbody"></div>
</div>

<div class="success-page" id="success-page">

  <div class="s-ttl">Sipariş Alındı!</div>

  <button class="s-back" onclick="backToMenu()">Menüye Dön</button>
</div>

<div class="cart-fixed" id="cart-fixed">
  <div class="cbar hidden" id="cbar">

  </div>

</div>

<!-- SEÇENEK MODAL -->
<div class="modal-bg" id="opt-modal" onclick="bgClickOpt(event)">
  <div class="modal-sheet">
    <div class="shandle"></div>
    <div class="opt-name" id="opt-item-name"></div>
    <div class="opt-price" id="opt-item-price"></div>
    <div id="opt-groups-wrap"></div>

    <textarea class="opt-note-ta" id="opt-note" rows="2" placeholder="Özel isteğinizi yazın..."></textarea>
    <button class="opt-add-btn" id="opt-add-btn" onclick="confirmOptAdd()">Sepete Ekle</button>
    <button class="opt-cancel" onclick="closeOptModal()">Vazgeç</button>
  </div>
</div>

<!-- CART MODAL -->
<div class="cart-modal-bg" id="cart-modal" onclick="bgClickCart(event)">
  <div class="cart-sheet">
    <div class="shandle"></div>
    <div class="sttl">Siparişim</div>
    <div class="sbody">
      <div id="cart-list"></div>
      <div class="stotal"><span>Toplam</span><span id="cart-total">₺0</span></div>
      <button class="sconfirm" onclick="placeOrder()">✓ Siparişi Gönder</button>
      <button class="scancel" onclick="closeCartModal()">Vazgeç</button>
    </div>
  </div>
</div>

    {id:'i13',name:'Churchill',desc:'',price:100,price2:null,emoji:'🥤',popular:false,soldOut:false,img:'',options:[]},

  {id:'dondurmalar',name:'Dondurmalar',emoji:'🍦',items:[

  ]},
  {id:'tatlilar',name:'Tatlılar',emoji:'🧇',items:[
    {id:'t1',name:'Waffle',desc:'Muzlu-çikolatalı sos',price:450,price2:null,emoji:'🧇',popular:true,soldOut:false,img:'',options:[]},
    {id:'t2',name:'Meyve Tabağı',desc:'Taze mevsim meyveleri',price:300,price2:null,emoji:'🍓',popular:false,soldOut:false,img:'',options:[]},
    {id:'t3',name:'Makarna Çeşitleri',desc:'Günlük menü',price:400,price2:null,emoji:'🍝',popular:false,soldOut:false,img:'',options:[]},
  ]},
];

let menuData = DEFAULT_MENU; // Hemen göster
let cart = [], activeCat = DEFAULT_MENU[0].id;
let currentOptItem = null, selectedOpts = {};

const ftime = ()=>new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
const fdate = ()=>new Date().toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'});

// Menüyü hemen göster, Firebase güncellemesi gelince yenile
// Masa parametresi yoksa masa adı, sepet ve garson gizle
const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get('masa')) {
  document.getElementById('mh-masa').textContent = CURRENT_MASA.name;
} else {
  document.getElementById('mh-masa').style.display = 'none';
  document.getElementById('cart-fixed').style.display = 'none';
  // Masa yoksa popup gösterme
  document.getElementById('karsılama-ov').style.display = 'none';
}
renderCats();
renderMenu();

// Firebase'den güncelleme al
onValue(ref(db,'menu'), snap=>{
  const data = snap.val();
  if(data){
    menuData = data;
  } else {
    set(ref(db,'menu'), DEFAULT_MENU);
  }
  renderCats();
  renderMenu();
});

function findItem(id){
  for(const c of menuData){ const f=c.items&&c.items.find(i=>i.id==id); if(f) return f; }
  return null;
}
function getTotal(){ return cart.reduce((s,i)=>s+i.price*i.qty,0); }
function getCount(){ return cart.reduce((s,i)=>s+i.qty,0); }

function renderCats(){
  document.getElementById('catrow').innerHTML = menuData.map(c=>
    `<button class="cpill${c.id===activeCat?' active':''}" onclick="setCat('${c.id}')">${c.emoji} ${c.name}</button>`
  ).join('');
}

window.setCat = id=>{ activeCat=id; renderCats(); renderMenu(); window.scrollTo(0,0); };

function renderMenu(){
  const cat = menuData.find(c=>c.id===activeCat);
  if(!cat){ document.getElementById('mbody').innerHTML=''; return; }
  document.getElementById('mbody').innerHTML = `
    <div class="sec-hd"><span style="font-size:20px">${cat.emoji}</span><span class="sec-nm">${cat.name}</span></div>
    <div class="items">
      ${(cat.items||[]).map(it=>`
        <div class="icard${it.soldOut?' sold':''}">
          <div class="irow">
            <div class="iphoto">
              <span>${it.emoji||'🍽️'}</span>
              ${it.img?`<img src="${it.img}" alt="${it.name}" loading="lazy">`:''}
              ${it.soldOut?`<div class="sold-ov"><span class="sold-tag">Tükendi</span></div>`:''}
            </div>
            <div class="ibody">
              <div>
                <div class="iname">${it.name}</div>
                <div class="idesc">${it.desc||''}</div>
                <div class="ibadges">
                  ${it.popular?'<span class="bp">Popüler</span>':''}
                  ${it.price2?'<span class="bm">Menü mevcut</span>':''}
                  ${it.options&&it.options.length?'<span class="bopt">Seçenek var</span>':''}
                </div>
              </div>
              <div class="ifoot">
                <div>
                  <div class="iprice">₺${it.price}</div>
                  ${it.price2?`<div class="iprice2">Menü ₺${it.price2}</div>`:''}
                </div>
                ${it.soldOut?'<span class="sold-lbl">Tükendi</span>':
                  it.options&&it.options.length
                    ?`<button class="add-btn" onclick="openOptModal('${it.id}')">+</button>`
                    :`<div id="qty-${it.id}"><button class="add-btn" onclick="directAdd('${it.id}')">+</button></div>`
                }
              </div>
            </div>
          </div>
          ${!it.soldOut&&!(it.options&&it.options.length)?`
            <button class="note-btn" id="nb-${it.id}" onclick="toggleNote('${it.id}')">+ Not ekle</button>
            <div class="note-wrap" id="nw-${it.id}">
              <textarea class="note-ta" rows="2" placeholder="Özel isteğinizi yazın..." id="nta-${it.id}"></textarea>
            </div>
          `:''}
        </div>
      `).join('')}
    </div>`;
  // Sepetteki ürünlerin miktarlarını güncelle
  cart.forEach(c=>{ if(!c.optText) renderQtyEl(c.itemId); });
}

window.toggleNote = id=>{
  const w=document.getElementById('nw-'+id), b=document.getElementById('nb-'+id);
  if(!w||!b) return;
  const o=w.classList.toggle('open');
  b.textContent = o?'− Notu kapat':'+ Not ekle';
};

function renderQtyEl(id){
  const el=document.getElementById('qty-'+id); if(!el) return;
  const existing=cart.find(c=>c.itemId===id&&!c.optText);
  const qty=existing?existing.qty:0;
  el.innerHTML=qty===0
    ?`<button class="add-btn" onclick="directAdd('${id}')">+</button>`
    :`<div class="qctrl"><button class="qb" onclick="directRemove('${id}')">−</button><span class="qn">${qty}</span><button class="qb" onclick="directAdd('${id}')">+</button></div>`;
}

window.directAdd = id=>{
  const it=findItem(id); if(!it) return;
  const note=document.getElementById('nta-'+id)?.value||'';
  const existing=cart.find(c=>c.itemId===id&&!c.optText);
  if(existing){ existing.qty++; existing.note=note; }
  else { cart.push({itemId:id,name:it.name,price:it.price,qty:1,optText:'',note}); }
  renderQtyEl(id); updateBar();
};

window.directRemove = id=>{
  const existing=cart.find(c=>c.itemId===id&&!c.optText);
  if(!existing) return;
  existing.qty--;
  if(existing.qty<=0) cart.splice(cart.indexOf(existing),1);
  renderQtyEl(id); updateBar();
};

// SEÇENEK MODAL
window.openOptModal = id=>{
  const it=findItem(id); if(!it) return;
  currentOptItem=it; selectedOpts={};
  document.getElementById('opt-item-name').textContent=it.name;
  document.getElementById('opt-item-price').textContent='₺'+it.price;
  document.getElementById('opt-note').value='';
  const wrap=document.getElementById('opt-groups-wrap');
  wrap.innerHTML=(it.options||[]).map((opt,gi)=>`
    <div class="opt-group">
      <div class="opt-group-label">
        ${opt.label}
        ${opt.required?'<span class="opt-req-badge">Zorunlu</span>':'<span style="font-size:10px;color:var(--th)">(İsteğe bağlı)</span>'}
      </div>
      <div class="opt-choices">
        ${opt.choices.map((ch,ci)=>`
          <div class="opt-choice" id="oc-${gi}-${ci}" onclick="selectOpt(${gi},${ci},'${ch}','${opt.label}',${opt.required})">
            <div class="opt-circle"><span class="opt-check">✓</span></div>
            <div class="opt-choice-name">${ch}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  updateOptBtn();
  document.getElementById('opt-modal').classList.add('open');
};

window.selectOpt = (gi,ci,val,label,required)=>{
  const it=currentOptItem; if(!it) return;
  const opt=it.options[gi];
  opt.choices.forEach((_,i)=>document.getElementById(`oc-${gi}-${i}`)?.classList.remove('sel'));
  document.getElementById(`oc-${gi}-${ci}`)?.classList.add('sel');
  selectedOpts[gi]={label,value:val};
  updateOptBtn();
};

function updateOptBtn(){
  const it=currentOptItem; if(!it) return;
  const reqIdxs=(it.options||[]).map((o,i)=>o.required?i:-1).filter(i=>i>=0);
  const ok=reqIdxs.every(i=>selectedOpts[i]);
  const btn=document.getElementById('opt-add-btn');
  btn.disabled=!ok;
  btn.textContent=ok?'Sepete Ekle ✓':'Seçim yapın...';
}

window.confirmOptAdd = ()=>{
  const it=currentOptItem; if(!it) return;
  const optText=Object.values(selectedOpts).map(o=>o.value).join(', ');
  const note=document.getElementById('opt-note').value;
  cart.push({itemId:it.id,name:it.name,price:it.price,qty:1,optText,note});
  updateBar();
  closeOptModal();
};

window.closeOptModal = ()=>{ document.getElementById('opt-modal').classList.remove('open'); };
window.bgClickOpt = e=>{ if(e.target===document.getElementById('opt-modal')) closeOptModal(); };

function updateBar(){
  const c=getCount(), bar=document.getElementById('cbar');
  if(c===0){ bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  document.getElementById('cbadge').textContent=c;
  document.getElementById('ctot').textContent='₺'+getTotal();
  document.getElementById('clbl').textContent=c+' ürün seçildi';
}

window.openCartModal = ()=>{
  document.getElementById('cart-list').innerHTML=cart.filter(i=>i.qty>0).map((item,idx)=>`
    <div class="ci">
      <div style="flex:1;min-width:0">
        <div class="ci-nm">${item.name} <span style="font-weight:400;color:var(--tm)">× ${item.qty}</span></div>
        <div class="ci-sub">₺${item.price} / adet</div>
        ${item.optText?`<span class="ci-opt">${item.optText}</span>`:''}
        ${item.note?`<span class="ci-note">"${item.note}"</span>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="ci-pr">₺${item.price*item.qty}</div>
        <button onclick="removeFromCart(${idx})" style="background:var(--rdl);color:var(--rd);border:none;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif">Sil</button>
      </div>
    </div>`).join('');
  document.getElementById('cart-total').textContent='₺'+getTotal();
  document.getElementById('cart-modal').classList.add('open');
};

window.removeFromCart = idx=>{
  cart.splice(idx,1);
  updateBar();
  openCartModal(); // Sepeti yenile
};
window.closeCartModal = ()=>{ document.getElementById('cart-modal').classList.remove('open'); };
window.bgClickCart = e=>{ if(e.target===document.getElementById('cart-modal')) closeCartModal(); };

window.placeOrder = async()=>{
  if(!cart.length) return;
  const orderRef=push(ref(db,'orders'));
  await set(orderRef,{
    id:orderRef.key,
    masa:CURRENT_MASA.name,
    masaId:CURRENT_MASA.id,
    masaType:CURRENT_MASA.type,
    time:ftime(),
    date:fdate(),
    items:cart.map(i=>({name:i.name,price:i.price,qty:i.qty,options:i.optText||'',note:i.note||''})),
    status:'hazirlaniyor',
    total:getTotal()
  });
  cart=[];
  updateBar();
  closeCartModal();
  document.getElementById('page-menu').style.display='none';
  document.getElementById('cart-fixed').style.display='none';
  document.getElementById('success-page').classList.add('show');
};

window.backToMenu = ()=>{
  document.getElementById('success-page').classList.remove('show');
  document.getElementById('page-menu').style.display='block';
  document.getElementById('cart-fixed').style.display='block';
  renderMenu();
};

window.callGarson = async()=>{
  const btn=document.getElementById('gbtn');
  const gref=push(ref(db,'garson'));
  await set(gref,{id:gref.key,masa:CURRENT_MASA.name,masaId:CURRENT_MASA.id,time:ftime()});
  btn.classList.add('ok');
  btn.textContent='✓ Garson Çağrıldı';
  setTimeout(()=>{ btn.classList.remove('ok'); btn.textContent='🔔 Garson Çağır'; },4000);
};
</script>
</body>
