<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Saklıdoğa — Menü</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;--gddd:#04342C;
  --am:#BA7517;--aml:#FAEEDA;--amd:#854F0B;
  --rd:#E24B4A;--rdl:#FCEBEB;
  --bg:#fff;--bg2:#f7f7f5;--bg3:#efefeb;
  --t:#1a1a1a;--tm:#666;--th:#aaa;
  --br:rgba(0,0,0,0.08);--br2:rgba(0,0,0,0.16)
}
html,body{min-height:100%;background:var(--bg2)}
body{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--t)}
.mhdr{background:var(--gddd);padding:16px 14px 11px;position:sticky;top:0;z-index:50}
.mh-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.mh-logo{font-family:'Playfair Display',serif;font-size:21px;font-weight:600;color:#9FE1CB}
.mh-masa{background:rgba(159,225,203,.15);color:#9FE1CB;font-size:10px;padding:4px 11px;border-radius:20px;border:.5px solid rgba(159,225,203,.3);font-weight:500}
.mh-sub{font-size:10px;color:rgba(159,225,203,.4);margin-bottom:11px}
.catrow{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.catrow::-webkit-scrollbar{display:none}
.cpill{flex-shrink:0;padding:6px 14px;border-radius:20px;border:.5px solid rgba(159,225,203,.25);background:transparent;color:rgba(159,225,203,.6);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif}
.cpill.active{background:#9FE1CB;color:#04342C;font-weight:500;border-color:#9FE1CB}
.sec-hd{display:flex;align-items:center;gap:8px;padding:16px 13px 8px}
.sec-nm{font-family:'Playfair Display',serif;font-size:16px;color:var(--t)}
.items{padding:0 10px;display:flex;flex-direction:column;gap:8px;padding-bottom:170px}
.icard{background:var(--bg);border:.5px solid var(--br);border-radius:13px;overflow:hidden}
.icard.sold{opacity:.5}
.irow{display:flex;align-items:stretch}
.iphoto{width:88px;height:88px;flex-shrink:0;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden}
.iphoto img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.sold-ov{position:absolute;inset:0;background:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center}
.sold-tag{background:var(--rdl);color:var(--rd);font-size:10px;font-weight:500;padding:2px 8px;border-radius:6px}
.ibody{flex:1;padding:10px 12px 10px 10px;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.iname{font-size:13px;font-weight:500;color:var(--t);line-height:1.3;margin-bottom:3px}
.idesc{font-size:11px;color:var(--tm);line-height:1.4;margin-bottom:5px}
.ibadges{display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap}
.bp{font-size:9px;background:var(--aml);color:var(--amd);padding:2px 7px;border-radius:5px;font-weight:500}
.bm{font-size:9px;background:#E6F1FB;color:#185FA5;padding:2px 7px;border-radius:5px;font-weight:500}
.ifoot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.iprice{font-size:15px;font-weight:600;color:var(--g)}
.iprice2{font-size:10px;color:var(--tm);margin-top:1px}
.sold-lbl{font-size:10px;background:var(--rdl);color:var(--rd);padding:3px 10px;border-radius:6px;font-weight:500}
.add-btn{width:36px;height:36px;border-radius:50%;background:var(--g);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:300}
.add-btn:active{transform:scale(.85)}
.qctrl{display:flex;align-items:center;gap:8px}
.qb{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--br2);background:var(--bg2);color:var(--t);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:400}
.qb:active{background:var(--bg3)}
.qn{font-size:15px;font-weight:600;min-width:20px;text-align:center;color:var(--t)}
.note-btn{font-size:11px;color:var(--g);cursor:pointer;padding:4px 12px 8px;display:block;background:none;border:none;text-align:left;font-family:'DM Sans',sans-serif}
.note-wrap{padding:0 12px 10px;display:none}
.note-wrap.open{display:block}
.note-ta{width:100%;font-size:12px;padding:8px 10px;border:.5px solid var(--br2);border-radius:8px;background:var(--bg);color:var(--t);resize:none;font-family:'DM Sans',sans-serif;line-height:1.5}
.note-ta:focus{outline:none;border-color:var(--g)}
.cart-fixed{position:fixed;bottom:0;left:0;right:0;padding:10px 12px 28px;background:linear-gradient(transparent,var(--bg2) 28%)}
.cbar{background:var(--gddd);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:opacity .3s}
.cbar.hidden{opacity:0;pointer-events:none}
.cbadge{background:#9FE1CB;color:#04342C;font-size:11px;font-weight:600;min-width:24px;height:24px;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0}
.clbl{flex:1;font-size:12px;color:rgba(159,225,203,.85)}
.ctot{font-size:16px;font-weight:600;color:#9FE1CB}
.csee{background:#9FE1CB;color:#04342C;border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif}
.garson-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border:.5px solid var(--am);border-radius:12px;background:var(--aml);color:var(--amd);font-size:13px;font-weight:500;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif}
.garson-btn:active{transform:scale(.98)}
.garson-btn.ok{background:var(--gl);border-color:var(--g);color:var(--gd)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--bg);border-radius:22px 22px 0 0;width:100%;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom,0)}
.modal-bg.open .modal-sheet{transform:translateY(0)}
.shandle{width:36px;height:4px;background:var(--br2);border-radius:2px;margin:14px auto 16px}
.sttl{font-family:'Playfair Display',serif;font-size:19px;padding:0 16px 13px;color:var(--t)}
.sbody{padding:0 16px 24px}
.ci{display:flex;align-items:flex-start;justify-content:space-between;padding:11px 0;border-bottom:.5px solid var(--br);gap:10px}
.ci-nm{font-size:13px;font-weight:500;color:var(--t)}
.ci-sub{font-size:11px;color:var(--tm);margin-top:2px}
.ci-note{font-size:10px;color:var(--am);background:var(--aml);padding:2px 7px;border-radius:5px;margin-top:4px;font-style:italic;display:inline-block}
.ci-pr{font-size:14px;font-weight:600;color:var(--g);white-space:nowrap}
.stotal{display:flex;justify-content:space-between;padding:14px 0 4px;font-size:17px;font-weight:600;color:var(--t)}
.sconfirm{width:100%;background:var(--g);color:#fff;border:none;border-radius:13px;padding:16px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin:14px 0 6px}
.sconfirm:active{transform:scale(.98)}
.scancel{width:100%;background:transparent;border:none;color:var(--tm);font-size:13px;padding:10px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:8px}
.success-page{display:none;min-height:100vh;background:var(--gddd);flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px 24px}
.success-page.show{display:flex}
.sico{width:72px;height:72px;border-radius:50%;background:rgba(159,225,203,.14);border:.5px solid rgba(159,225,203,.3);display:flex;align-items:center;justify-content:center;font-size:36px}
.s-ttl{font-family:'Playfair Display',serif;font-size:24px;color:#9FE1CB}
.s-sub{font-size:13px;color:rgba(159,225,203,.6);text-align:center;line-height:1.8}
.s-back{background:rgba(159,225,203,.13);border:.5px solid rgba(159,225,203,.3);color:#9FE1CB;border-radius:12px;padding:13px 36px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px}
</style>
</head>
<body>

<div id="page-menu">
  <div class="mhdr">
    <div class="mh-top">
      <div class="mh-logo">Saklıdoğa</div>
      <div class="mh-masa" id="mh-masa">—</div>
    </div>
    <div class="mh-sub">Bungalov & Havuz Tesisi</div>
    <div class="catrow" id="catrow"></div>
  </div>
  <div id="mbody"></div>

<div class="success-page" id="success-page">
  <div class="sico">✓</div>
  <div class="s-ttl">Sipariş Alındı!</div>
  <div class="s-sub">Siparişiniz mutfağa iletildi.<br>En kısa sürede hazırlanacak.<br>Teşekkürler 🌿</div>
  <button class="s-back" onclick="backToMenu()">Menüye Dön</button>
</div>

<div class="cart-fixed" id="cart-fixed">
  <div class="cbar hidden" id="cbar">
    <div class="cbadge" id="cbadge">0</div>
    <div class="clbl" id="clbl">Sepetim</div>
    <div class="ctot" id="ctot">₺0</div>
    <button class="csee" onclick="openModal()">Görüntüle</button>
  </div>
  <button class="garson-btn" id="gbtn" onclick="callGarson()">🔔 Garson Çağır</button>
</div>

<div class="modal-bg" id="modal-bg" onclick="bgClick(event)">
  <div class="modal-sheet">
    <div class="shandle"></div>
    <div class="sttl">Siparişim</div>
    <div class="sbody">
      <div id="cart-list"></div>
      <div class="stotal"><span>Toplam</span><span id="cart-total">₺0</span></div>
      <button class="sconfirm" onclick="placeOrder()">✓ Siparişi Gönder</button>
      <button class="scancel" onclick="closeModal()">Vazgeç</button>
    </div>
  </div>
</div>

let menuData = JSON.parse(JSON.stringify(MENU));
let cart = {}, notes = {}, activeCat = MENU[0].id;

const fi = id => { for(const c of menuData){const f=c.items&&c.items.find(i=>i.id==id);if(f)return f;} return null; };
const cnt = () => Object.values(cart).reduce((a,b)=>a+b,0);
const tot = () => { let t=0; for(const[id,q]of Object.entries(cart)){const it=fi(id);if(it)t+=it.price*q;} return t; };
const ftime = () => new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
const fdate = () => new Date().toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'});

// Önce menüyü hemen göster, Firebase güncellemesi gelirse uygula
renderCats();
renderMenu();
document.getElementById('mh-masa').textContent = CURRENT_MASA.name;

// Firebase'den güncelleme gelirse menüyü güncelle
onValue(ref(db,'menu'), snap=>{
  const data = snap.val();
  if(data){ menuData = data; renderCats(); renderMenu(); }
  else { set(ref(db,'menu'), MENU); }
});

function renderCats(){
  document.getElementById('catrow').innerHTML = menuData.map(c=>
    `<button class="cpill${c.id===activeCat?' active':''}" onclick="setCat('${c.id}')">${c.emoji} ${c.name}</button>`
  ).join('');
}

window.setCat = id => { activeCat=id; renderCats(); renderMenu(); window.scrollTo(0,0); };

function renderMenu(){
  const cat = menuData.find(c=>c.id===activeCat);
  if(!cat){ document.getElementById('mbody').innerHTML=''; return; }
  document.getElementById('mbody').innerHTML = `
    <div class="sec-hd"><span style="font-size:20px">${cat.emoji}</span><span class="sec-nm">${cat.name}</span></div>
    <div class="items">
      ${(cat.items||[]).map(it=>`
        <div class="icard${it.soldOut?' sold':''}">
          <div class="irow">
            <div class="iphoto">
              <span>${it.emoji||'🍽️'}</span>
              ${it.img?`<img src="${it.img}" alt="${it.name}">`:''}
              ${it.soldOut?`<div class="sold-ov"><span class="sold-tag">Tükendi</span></div>`:''}
            </div>
            <div class="ibody">
              <div>
                <div class="iname">${it.name}</div>
                <div class="idesc">${it.desc||''}</div>
                <div class="ibadges">
                  ${it.popular?'<span class="bp">Popüler</span>':''}
                  ${it.price2?'<span class="bm">Menü mevcut</span>':''}
                </div>
              </div>
              <div class="ifoot">
                <div>
                  <div class="iprice">₺${it.price}</div>
                  ${it.price2?`<div class="iprice2">Menü ₺${it.price2}</div>`:''}

                ${it.soldOut
                  ? '<span class="sold-lbl">Tükendi</span>'
                  : `<div id="qty-${it.id}"><button class="add-btn" onclick="setQty('${it.id}',1)">+</button></div>`
                }
              </div>
            </div>
          </div>
          ${!it.soldOut?`
            <button class="note-btn" id="nb-${it.id}" onclick="toggleNote('${it.id}')">+ Not ekle</button>
            <div class="note-wrap" id="nw-${it.id}">
              <textarea class="note-ta" rows="2" placeholder="Özel isteğinizi yazın..." oninput="notes['${it.id}']=this.value">${notes[it.id]||''}</textarea>
            </div>
          `:''}
        </div>
      `).join('')}
    </div>`;
  for(const id of Object.keys(cart)){
    const q = cart[id];
    const el = document.getElementById('qty-'+id);
    if(el && q>0) el.innerHTML = `<div class="qctrl"><button class="qb" onclick="setQty('${id}',${q-1})">−</button><span class="qn">${q}</span><button class="qb" onclick="setQty('${id}',${q+1})">+</button></div>`;
  }
}

window.toggleNote = id => {
  const w=document.getElementById('nw-'+id), b=document.getElementById('nb-'+id);
  if(!w||!b) return;
  const o=w.classList.toggle('open');
  b.textContent = o ? '− Notu kapat' : '+ Not ekle';
};

window.setQty = (id,q) => {
  if(q<=0){ delete cart[id]; } else { cart[id]=q; }
  const el = document.getElementById('qty-'+id);
  if(el){
    if(!cart[id]){
      el.innerHTML = `<button class="add-btn" onclick="setQty('${id}',1)">+</button>`;
    } else {
      el.innerHTML = `<div class="qctrl"><button class="qb" onclick="setQty('${id}',${cart[id]-1})">−</button><span class="qn">${cart[id]}</span><button class="qb" onclick="setQty('${id}',${cart[id]+1})">+</button></div>`;
    }
  }
  updateBar();
};

function updateBar(){
  const c=cnt(), bar=document.getElementById('cbar');
  if(c===0){ bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  document.getElementById('cbadge').textContent = c;
  document.getElementById('ctot').textContent = '₺'+tot();
  document.getElementById('clbl').textContent = c+' ürün seçildi';
}

window.openModal = () => {
  const entries = Object.entries(cart).filter(([,q])=>q>0);
  document.getElementById('cart-list').innerHTML = entries.map(([id,qty])=>{
    const it=fi(id), note=notes[id];
    return `<div class="ci">
      <div style="flex:1;min-width:0">
        <div class="ci-nm">${it.name} <span style="font-weight:400;color:var(--tm)">× ${qty}</span></div>
        <div class="ci-sub">₺${it.price} / adet</div>
        ${note?`<span class="ci-note">"${note}"</span>`:''}
      </div>
      <div class="ci-pr">₺${it.price*qty}</div>
    </div>`;
  }).join('');
  document.getElementById('cart-total').textContent = '₺'+tot();
  document.getElementById('modal-bg').classList.add('open');
};

window.closeModal = () => { document.getElementById('modal-bg').classList.remove('open'); };
window.bgClick = e => { if(e.target===document.getElementById('modal-bg')) closeModal(); };

window.placeOrder = async () => {
  const entries = Object.entries(cart).filter(([,q])=>q>0);
  if(!entries.length) return;
  const orderRef = push(ref(db,'orders'));
  await set(orderRef, {
    id: orderRef.key,
    masa: CURRENT_MASA.name,
    masaId: CURRENT_MASA.id,
    masaType: CURRENT_MASA.type,
    time: ftime(),
    date: fdate(),
    items: entries.map(([id,qty])=>({
      itemId:id, name:fi(id).name, price:fi(id).price, qty, note:notes[id]||''
    })),
    status: 'hazirlaniyor',
    total: tot()
  });
  cart={}; notes={};
  updateBar();
  closeModal();
  document.getElementById('page-menu').style.display = 'none';
  document.getElementById('cart-fixed').style.display = 'none';
  document.getElementById('success-page').classList.add('show');
};

window.backToMenu = () => {
  document.getElementById('success-page').classList.remove('show');
  document.getElementById('page-menu').style.display = 'block';
  document.getElementById('cart-fixed').style.display = 'block';
  renderMenu();
};

window.callGarson = async () => {
  const btn = document.getElementById('gbtn');
  const gref = push(ref(db,'garson'));
  await set(gref, {id:gref.key, masa:CURRENT_MASA.name, masaId:CURRENT_MASA.id, time:ftime()});
  btn.classList.add('ok');
  btn.textContent = '✓ Garson Çağrıldı';
  setTimeout(()=>{ btn.classList.remove('ok'); btn.textContent='🔔 Garson Çağır'; }, 4000);
};
</script>
</body>
</html>
